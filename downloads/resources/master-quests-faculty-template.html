elite: [
  { id: 300, q: "A city caps rent below equilibrium to help renters. In the short run, some renters pay less, but many cannot find apartments and landlords reduce maintenance. Which answer best explains the full economic result?", options: ["The legal price falls, but shortage, rationing, and quality decline create hidden costs", "The policy eliminates scarcity because rent is lower", "The policy creates a surplus because quantity supplied rises", "The market reaches equilibrium because demand and supply adjust immediately"], a: 0, tag: "price_ceiling", type: "integration", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "ceiling_unintended_consequences", secondarySkills: ["shortage_identification", "nonmoney_rationing_costs"], repairSkill: "binding_price_ceiling", commonError: "focuses_only_on_lower_legal_price", feedback: "A binding rent ceiling lowers the legal price but creates a shortage, rationing, search costs, and weaker maintenance incentives." },
  { id: 301, q: "A minimum wage is set above equilibrium. Some workers earn more, firms demand fewer workers, and more workers want jobs. What is the best synthesis?", options: ["The wage floor benefits some employed workers but creates a labor surplus for others", "The wage floor increases both labor demanded and labor supplied", "The wage floor is nonbinding because workers prefer higher wages", "The wage floor eliminates the opportunity cost of working"], a: 0, tag: "price_floor", type: "integration", objective: "LO6.2", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "minimum_wage_surplus", secondarySkills: ["binding_price_floor", "incentives_behavior"], repairSkill: "binding_price_floor", commonError: "counts_only_workers_who_keep_jobs", feedback: "A binding minimum wage raises wages for some workers but creates a surplus of labor because labor supplied exceeds labor demanded." },
  { id: 302, q: "A tax on gasoline raises the price paid by drivers, lowers the price received by sellers, and reduces gallons sold. Which concept chain is correct?", options: ["Tax wedge → shared burden → lower quantity traded", "Price ceiling → shortage → higher quantity traded", "Demand increase → higher price → higher quantity", "PPF shift → economic growth → lower price"], a: 0, tag: "taxes", type: "integration", objective: "LO6.3", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_wedge_and_quantity_effect", secondarySkills: ["tax_incidence_definition", "tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "sees_tax_as_only_a_price_increase", feedback: "A tax creates a wedge between buyer and seller prices, splits the burden, and reduces the quantity traded." },
  { id: 303, q: "A policy analyst says a tax legally placed on sellers will be paid entirely by sellers. What is wrong with this claim?", options: ["Legal assignment does not determine economic incidence", "Sellers always pass the entire tax to buyers", "Buyers always avoid taxes completely", "A seller tax is the same as a price floor"], a: 0, tag: "tax_incidence", type: "trap", objective: "LO6.4", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "legal_vs_economic_tax_incidence", secondarySkills: ["buyer_seller_tax_equivalence"], repairSkill: "tax_equivalence", commonError: "thinks_legal_assignment_determines_full_burden", feedback: "Economic tax burden depends on market responses and elasticities, not only on who legally sends payment." },
  { id: 304, q: "A $12 tax causes buyers to pay $7 more and sellers to receive $5 less. Demand is likely less elastic than supply because:", options: ["Buyers bear more of the tax burden", "Sellers bear more of the tax burden", "The legal tax must have been placed on buyers", "The tax increased quantity sold"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "infer_elasticity_from_tax_burden", secondarySkills: ["tax_burden_less_elastic_side", "tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_larger_burden_means_more_elastic_side", feedback: "The less elastic side bears more of the tax burden. Buyers bear $7, so demand is likely less elastic." },
  { id: 305, q: "A drought reduces supply of wheat while a health trend increases demand for wheat bread. What can be predicted with certainty in the wheat market?", options: ["Price rises, but quantity is ambiguous", "Quantity rises, but price is ambiguous", "Both price and quantity must rise", "Both price and quantity must fall"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["demand_increase_market_effect", "supply_decrease_market_effect"], repairSkill: "equilibrium_prediction", commonError: "assumes_demand_effect_dominates_supply_effect", feedback: "Demand increases and supply decreases both push price up, but quantity depends on which shift is larger." },
  { id: 306, q: "Consumer interest in a product falls while new technology lowers production costs. What can be predicted with certainty?", options: ["Price falls, but quantity is ambiguous", "Quantity rises, but price is ambiguous", "Both price and quantity rise", "Both price and quantity fall"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["demand_decrease_market_effect", "supply_increase_market_effect"], repairSkill: "equilibrium_prediction", commonError: "assumes_supply_effect_dominates_demand_effect", feedback: "A demand decrease and supply increase both lower price, but quantity is ambiguous." },
  { id: 307, q: "A celebrity endorsement increases demand for a product at the same time input costs rise. What can be predicted with certainty?", options: ["Equilibrium price rises", "Equilibrium quantity rises", "Equilibrium quantity falls", "Equilibrium price falls"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "demand_increase_supply_decrease", secondarySkills: ["double_shift_ambiguous_quantity"], repairSkill: "equilibrium_prediction", commonError: "claims_quantity_change_is_certain", feedback: "Demand rises and supply falls. Both raise price, but quantity is ambiguous." },
  { id: 308, q: "A city creates a low legal parking fee below equilibrium. Drivers spend extra time circling for spaces, miss class, and compete for limited spots. What is the best economic interpretation?", options: ["The ceiling lowers the money price but raises nonmoney costs through shortage and rationing", "The ceiling creates a surplus of parking spaces", "The ceiling is nonbinding because drivers still pay with time", "The ceiling shifts demand left"], a: 0, tag: "price_ceiling", type: "application", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "nonmoney_rationing_costs", secondarySkills: ["ceiling_shortage_effect"], repairSkill: "binding_price_ceiling", commonError: "ignores_time_cost_as_part_of_full_price", feedback: "A binding price ceiling can lower the posted price while raising search and waiting costs." },
  { id: 309, q: "A government wants to make a good affordable, so it imposes a price ceiling. Which condition must hold for the policy to actually affect the market?", options: ["The ceiling must be below equilibrium price", "The ceiling must be above equilibrium price", "The ceiling must equal quantity demanded", "The ceiling must be imposed on sellers only"], a: 0, tag: "price_ceiling", type: "trap", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "binding_price_ceiling", secondarySkills: ["nonbinding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "thinks_all_price_ceilings_affect_markets", feedback: "A price ceiling only binds if it is below the equilibrium price." },
  { id: 310, q: "A government wants to raise producer income, so it imposes a price floor. Which condition must hold for the policy to actually affect the market?", options: ["The floor must be above equilibrium price", "The floor must be below equilibrium price", "The floor must equal zero", "The floor must reduce supply"], a: 0, tag: "price_floor", type: "trap", objective: "LO6.2", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "binding_price_floor", secondarySkills: ["nonbinding_price_floor"], repairSkill: "binding_price_floor", commonError: "thinks_all_price_floors_affect_markets", feedback: "A price floor only binds if it is above the equilibrium price." },
  { id: 311, q: "A city sets rent below equilibrium. Quantity demanded is 80,000 and quantity supplied is 52,000. Renters who get apartments save $300 each, but 28,000 renters are rationed out. What is the best conclusion?", options: ["The policy creates winners and losers; the lower legal price does not mean all renters benefit", "All renters benefit because the legal price is lower", "Landlords benefit because quantity supplied rises", "The market clears because the legal price is lower"], a: 0, tag: "price_ceiling", type: "integration", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "ceiling_distributional_tradeoff", secondarySkills: ["ceiling_shortage_calculation", "nonmoney_rationing_costs"], repairSkill: "binding_price_ceiling", commonError: "assumes_target_group_all_benefits", feedback: "Some renters gain lower rent, but others lose access because the ceiling creates a shortage." },
  { id: 312, q: "A minimum wage rises from $10 to $15. At $15, firms demand 70,000 workers and 120,000 workers want jobs. What is the labor surplus and what is one likely adjustment?", options: ["50,000 workers; firms may automate or reduce hours", "50,000 workers; firms must hire all workers", "190,000 workers; firms may increase labor demand", "70,000 workers; workers stop supplying labor"], a: 0, tag: "price_floor", type: "multi-step", objective: "LO6.2", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "minimum_wage_surplus_calculation", secondarySkills: ["incentives_behavior"], repairSkill: "floor_surplus_calculation", commonError: "adds_labor_supplied_and_demanded", feedback: "Labor surplus is 120,000 - 70,000 = 50,000. Firms may respond by reducing hours, automating, or hiring fewer workers." },
  { id: 313, q: "A tax is imposed on a good with highly inelastic demand and elastic supply. Which policy outcome is most likely?", options: ["Buyers bear most of the burden and quantity falls relatively little", "Sellers bear most of the burden and quantity falls dramatically", "Buyers bear no burden because sellers legally pay", "The tax creates a surplus equal to the tax"], a: 0, tag: "tax_incidence", type: "integration", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "elasticity_tax_quantity_burden", secondarySkills: ["tax_burden_less_elastic_side", "tax_quantity_effect"], repairSkill: "tax_incidence_less_elastic_side", commonError: "separates_elasticity_from_quantity_response", feedback: "Inelastic demand means buyers bear more and reduce quantity less in response to the tax." },
  { id: 314, q: "A tax is imposed on a good with elastic demand and highly inelastic supply. Which result is most likely?", options: ["Sellers bear most of the burden", "Buyers bear most of the burden", "Demand increases because the tax is high", "The legal assignment alone determines burden"], a: 0, tag: "tax_incidence", type: "integration", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "elasticity_tax_burden", secondarySkills: ["tax_burden_less_elastic_side"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_buyers_always_bear_consumption_taxes", feedback: "The less elastic side bears more. If supply is highly inelastic, sellers bear most of the tax." },
  { id: 315, q: "A market begins in equilibrium. A tax is imposed, and quantity falls from 1,000 to 850. Buyers pay $4 more and sellers receive $6 less. What is the tax revenue?", options: ["$8,500", "$10,000", "$3,400", "$5,100"], a: 0, tag: "taxes", type: "multi-step", objective: "LO6.3", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_revenue_from_burden_split", secondarySkills: ["tax_wedge_calculation", "tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "uses_original_quantity_or_one_side_burden_only", feedback: "The tax is $4 + $6 = $10 per unit. Revenue is $10 × 850 = $8,500." },
  { id: 316, q: "A market starts at price $40. After a tax, buyers pay $46 and sellers receive $34. Quantity sold falls from 500 to 420. What is total tax revenue?", options: ["$5,040", "$2,520", "$6,000", "$12,000"], a: 0, tag: "taxes", type: "multi-step", objective: "LO6.3", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_revenue_calculation", secondarySkills: ["tax_wedge_calculation"], repairSkill: "tax_wedge_incidence", commonError: "uses_pre_tax_quantity_or_buyer_price_change_only", feedback: "The tax is $46 - $34 = $12. Tax revenue is $12 × 420 = $5,040." },
  { id: 317, q: "A market starts at price $40. After a tax, buyers pay $46 and sellers receive $34. Quantity sold is 420. What is the total buyer-side burden?", options: ["$2,520", "$5,040", "$1,680", "$14,280"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "total_buyer_tax_burden", secondarySkills: ["buyer_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_full_tax_instead_of_buyer_price_increase", feedback: "Buyers pay $6 more per unit than before. Total buyer burden is $6 × 420 = $2,520." },
  { id: 318, q: "A market starts at price $40. After a tax, buyers pay $46 and sellers receive $34. Quantity sold is 420. What is the total seller-side burden?", options: ["$2,520", "$5,040", "$1,680", "$14,280"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "total_seller_tax_burden", secondarySkills: ["seller_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_full_tax_instead_of_seller_price_drop", feedback: "Sellers receive $6 less per unit than before. Total seller burden is $6 × 420 = $2,520." },
  { id: 319, q: "A tax is imposed on sellers. Before the tax, price is $20 and quantity is 300. After the tax, buyers pay $24, sellers receive $18, and quantity is 240. Which statement is correct?", options: ["The tax is $6, buyers bear $4 per unit, sellers bear $2 per unit, and quantity falls", "The tax is $4 and sellers bear all of it", "The tax is $2 and buyers bear all of it", "The tax is $42 because buyer and seller prices are added"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_wedge_burden_quantity_synthesis", secondarySkills: ["tax_wedge_calculation", "tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "adds_prices_or_ignores_original_price", feedback: "The wedge is $24 - $18 = $6. Buyers pay $4 more than before and sellers receive $2 less. Quantity falls from 300 to 240." },
  { id: 320, q: "A seller tax and a buyer tax of the same size create the same wedge in the same market. What should students conclude?", options: ["The market outcome is equivalent even if the legal payer differs", "The seller tax always hurts sellers more", "The buyer tax always hurts buyers more", "Only the tax on sellers reduces quantity"], a: 0, tag: "taxes", type: "trap", objective: "LO6.4", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_equivalence", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_equivalence", commonError: "legal_assignment_controls_outcome", feedback: "Equivalent taxes on buyers or sellers create the same wedge and market outcome." },
  { id: 321, q: "A student says, 'The price rose after the tax, so buyers paid the entire tax.' What is the flaw?", options: ["Buyers' burden is only the price increase above the old equilibrium, not the full wedge unless sellers receive the old price", "Any price increase means buyers pay everything", "Sellers cannot bear taxes if buyers pay more", "Tax incidence is unrelated to prices"], a: 0, tag: "tax_incidence", type: "trap", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "buyer_burden_vs_tax_wedge", secondarySkills: ["seller_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "confuses_price_increase_with_full_tax", feedback: "Buyers bear the part of the tax reflected in the higher price they pay; sellers bear the part reflected in the lower price they receive." },
  { id: 322, q: "A product gets cheaper because supply increases. Students say demand increased because quantity sold rose. What is the error?", options: ["They confused an increase in quantity demanded with an increase in demand", "They correctly identified a demand shift", "They confused a price floor with a price ceiling", "They ignored that supply can never change price"], a: 0, tag: "demand", type: "trap", objective: "LO4.2", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "movement_vs_demand_shift", secondarySkills: ["supply_shift_equilibrium_prediction"], repairSkill: "movement_vs_demand_shift", commonError: "calls_quantity_demanded_change_demand_increase", feedback: "If price falls because supply increases, buyers move along the demand curve. Quantity demanded rises, but demand itself does not shift." },
  { id: 323, q: "A product gets more expensive because demand increases. Sellers produce more at the higher price. Students say supply increased. What is the error?", options: ["They confused an increase in quantity supplied with an increase in supply", "They correctly identified a supply shift", "They confused demand with quantity demanded", "They ignored that equilibrium cannot change"], a: 0, tag: "supply", type: "trap", objective: "LO4.3", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "movement_vs_supply_shift", secondarySkills: ["demand_shift_equilibrium_prediction"], repairSkill: "movement_vs_supply_shift", commonError: "calls_quantity_supplied_change_supply_increase", feedback: "Sellers move along the supply curve when price rises. Quantity supplied increases, but supply does not shift." },
  { id: 324, q: "A city subsidizes apartment construction while also imposing a binding rent ceiling. Which combined result is most likely?", options: ["The subsidy pushes supply right, but the binding ceiling can still create rationing if price remains below equilibrium", "The subsidy makes the ceiling irrelevant in all cases", "The ceiling shifts demand left and eliminates scarcity", "The policy must create a surplus because supply increases"], a: 0, tag: "government_policy", type: "integration", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "mixed_policy_supply_ceiling", secondarySkills: ["supply_shifters", "binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "assumes_one_policy_fully_cancels_the_other", feedback: "A supply subsidy can ease shortage pressure, but a binding ceiling can still hold price below equilibrium and cause rationing." },
  { id: 325, q: "A tax on cigarettes reduces smoking less than expected but raises substantial revenue. What is the most likely explanation?", options: ["Demand is relatively inelastic", "Demand is perfectly elastic", "Supply increased after the tax", "The tax created a price floor"], a: 0, tag: "tax_incidence", type: "application", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "infer_inelastic_demand_from_tax_outcome", secondarySkills: ["tax_quantity_effect"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_small_quantity_change_means_tax_failed", feedback: "If quantity falls only a little after a tax, demand is likely relatively inelastic." },
  { id: 326, q: "A luxury tax causes quantity sold to fall sharply and tax revenue disappoints. What is the strongest explanation?", options: ["Demand or supply is relatively elastic, so participants avoid the taxed exchange", "The tax must be too small to matter", "The burden must fall entirely on buyers", "A tax always increases total revenue"], a: 0, tag: "taxes", type: "integration", objective: "LO6.3", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "elasticity_tax_revenue_quantity", secondarySkills: ["tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "assumes_higher_tax_always_means_higher_revenue", feedback: "If market participants respond strongly, quantity falls sharply and tax revenue may be lower than expected." },
  { id: 327, q: "A country invests more in capital goods today, sacrificing consumer goods. In a PPF framework, what is the likely long-run implication?", options: ["More future growth because capital accumulation can expand productive capacity", "No future effect because PPF choices never matter", "Immediate elimination of scarcity", "A binding price floor in the capital market"], a: 0, tag: "ppf", type: "integration", objective: "LO2.2", difficulty: "elite", conceptCluster: "economic_models", primarySkill: "current_vs_future_consumption_ppf", secondarySkills: ["ppf_growth"], repairSkill: "ppf_growth", commonError: "misses_current_consumption_future_growth_tradeoff", feedback: "Choosing more capital goods today can increase future productive capacity and shift the PPF outward later." },
  { id: 328, q: "An economy moves from inside its PPF to a point on the PPF and then later shifts the PPF outward. What sequence is correct?", options: ["First efficiency improves, then productive capacity grows", "First scarcity disappears, then opportunity cost disappears", "First demand shifts, then price controls bind", "First the economy becomes unattainable, then efficient"], a: 0, tag: "ppf", type: "integration", objective: "LO2.2", difficulty: "elite", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_vs_growth_sequence", secondarySkills: ["movement_inside_to_frontier", "ppf_growth"], repairSkill: "ppf_efficiency_status", commonError: "confuses_efficiency_gain_with_growth", feedback: "Moving from inside to the frontier is improved efficiency. Shifting the frontier outward is growth." },
  { id: 329, q: "A new technology improves only production of medical devices, not food. Which PPF interpretation is best?", options: ["The frontier rotates outward on the medical-device axis", "The entire frontier must shift inward", "The economy moves inside the PPF", "The law of demand no longer applies"], a: 0, tag: "ppf", type: "application", objective: "LO2.2", difficulty: "elite", conceptCluster: "economic_models", primarySkill: "ppf_one_good_technology_change", secondarySkills: ["ppf_growth"], repairSkill: "ppf_growth", commonError: "thinks_all_technology_shifts_both_goods_equally", feedback: "Technology that improves only one good expands capacity for that good, rotating the PPF outward along that axis." },
  { id: 330, q: "A student says, 'This point is inside the PPF, so it is impossible.' What is the correction?", options: ["Inside the PPF is attainable but inefficient", "Inside the PPF is unattainable", "Inside the PPF is efficient", "Inside the PPF means economic growth"], a: 0, tag: "ppf", type: "trap", objective: "LO2.2", difficulty: "elite", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_status", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_efficiency_status", commonError: "confuses_inside_ppf_with_outside_ppf", feedback: "A point inside the PPF can be produced, but it wastes or underuses resources." },
  { id: 331, q: "A student says, 'This point is outside the PPF, so it is efficient.' What is the correction?", options: ["Outside the PPF is unattainable with current resources and technology", "Outside the PPF is inefficient but possible", "Outside the PPF means unemployment", "Outside the PPF means a binding ceiling"], a: 0, tag: "ppf", type: "trap", objective: "LO2.2", difficulty: "elite", conceptCluster: "economic_models", primarySkill: "attainable_unattainable", secondarySkills: ["ppf_efficiency_status"], repairSkill: "ppf_efficiency_status", commonError: "confuses_outside_ppf_with_efficient", feedback: "Outside the PPF means the economy cannot reach that point with current resources and technology." },
  { id: 332, q: "A company already spent $80,000 developing software. It can spend $15,000 more to launch and expects $20,000 in revenue. What is the best marginal decision?", options: ["Launch because the additional benefit exceeds the additional cost by $5,000", "Do not launch because total cost is $95,000", "Launch only if revenue covers the sunk $80,000", "Do not launch because sunk costs always matter most"], a: 0, tag: "marginal", type: "multi-step", objective: "LO1.3", difficulty: "elite", conceptCluster: "core_principles", primarySkill: "sunk_cost_avoidance", secondarySkills: ["marginal_benefit_cost_decision"], repairSkill: "marginal_benefit_cost_decision", commonError: "includes_sunk_cost_in_marginal_decision", feedback: "The $80,000 is sunk. The launch decision compares the extra $15,000 cost to the extra $20,000 revenue." },
  { id: 333, q: "A student says college costs $25,000 because tuition and books cost $25,000. The student could also earn $38,000 working full time. What is missing?", options: ["The forgone wages should be included in opportunity cost", "Only tuition matters for opportunity cost", "Forgone wages are sunk costs", "Opportunity cost ignores alternatives"], a: 0, tag: "opportunity_cost", type: "trap", objective: "LO1.2", difficulty: "elite", conceptCluster: "core_principles", primarySkill: "opportunity_cost_full_cost", secondarySkills: ["forgone_wages"], repairSkill: "opportunity_cost_definition", commonError: "counts_only_direct_money_costs", feedback: "Opportunity cost includes explicit costs and the value of the next best alternative, including forgone wages." },
  { id: 334, q: "A student chooses a free ticket to a concert over a work shift that pays $90 and a study session worth $60. What is the opportunity cost of the concert?", options: ["$90", "$150", "$60", "$0 because the ticket is free"], a: 0, tag: "opportunity_cost", type: "trap", objective: "LO1.2", difficulty: "elite", conceptCluster: "core_principles", primarySkill: "next_best_alternative", secondarySkills: ["opportunity_cost_identification"], repairSkill: "opportunity_cost_definition", commonError: "adds_all_forgone_options_instead_of_next_best", feedback: "Opportunity cost is the value of the next best alternative, not every alternative combined. The next best option is the $90 shift." },
  { id: 335, q: "A policy improves equity but reduces total surplus. Which answer best frames the issue?", options: ["It is an efficiency-equity tradeoff, not proof the policy is automatically good or bad", "It is a market equilibrium with no tradeoff", "It proves equality and efficiency always rise together", "It is only a positive statement with no value judgment"], a: 0, tag: "tradeoffs", type: "integration", objective: "LO1.1", difficulty: "elite", conceptCluster: "core_principles", primarySkill: "efficiency_equity_policy_tradeoff", secondarySkills: ["positive_vs_normative"], repairSkill: "efficiency_vs_equality", commonError: "treats_tradeoff_as_automatic_policy_answer", feedback: "Policies often involve tradeoffs. A reduction in efficiency may or may not be justified by equity goals." },
  { id: 336, q: "An economist says, 'A rent ceiling below equilibrium will reduce housing quality over time.' Another says, 'The city should accept that cost to help low-income renters.' Which pairing is correct?", options: ["First is positive; second is normative", "First is normative; second is positive", "Both are positive", "Both are normative"], a: 0, tag: "positive_normative", type: "integration", objective: "LO2.4", difficulty: "elite", conceptCluster: "economic_thinking", primarySkill: "positive_normative_pairing", secondarySkills: ["policy_statement_classification"], repairSkill: "positive_vs_normative", commonError: "treats_all_policy_discussion_as_normative", feedback: "The first is testable. The second recommends what policy should do, so it is normative." },
  { id: 337, q: "A market is efficient before a pollution externality is considered. Once pollution costs to bystanders are included, the market produces too much. What changed?", options: ["Private costs differed from social costs", "Demand became perfectly inelastic", "The PPF shifted outward", "A price floor became nonbinding"], a: 0, tag: "market_failure", type: "integration", objective: "LO1.6", difficulty: "elite", conceptCluster: "core_principles", primarySkill: "externality_social_cost", secondarySkills: ["government_response_to_market_failure"], repairSkill: "market_failure_types", commonError: "ignores_costs_to_bystanders", feedback: "A negative externality means the market ignores some social costs, so private production can exceed the efficient level." },
  { id: 338, q: "A government responds to pollution with a tax. Which chain best explains the logic?", options: ["External cost → market overproduction → corrective tax raises private cost → quantity falls", "External cost → market underproduction → price ceiling raises quantity", "Scarcity disappears → supply increases → tax revenue falls to zero", "Tax burden depends only on who writes the check"], a: 0, tag: "market_failure", type: "integration", objective: "LO1.6", difficulty: "elite", conceptCluster: "core_principles", primarySkill: "corrective_tax_externality_logic", secondarySkills: ["tax_quantity_effect", "externality_identification"], repairSkill: "market_failure_types", commonError: "cannot_connect_externality_to_tax_policy", feedback: "A corrective tax makes private decision makers face more of the social cost, reducing overproduction." },

function buildDirectSkillRepairRoutes(){
  const sourcePools = Object.entries(microSkillRepairPools)
    .filter(([, pool]) => Array.isArray(pool) && pool.length > 0);
  const routes = new Map();

  Object.values(questionBanks).flat().forEach(question => {
    if(!question?.primarySkill) return;

    const directMatch = sourcePools.find(([, pool]) => pool.some(repair =>
      repair.objective === question.objective && repair.tag === question.tag
    )) || sourcePools.find(([, pool]) => pool.some(repair =>
      repair.objective === question.objective
    )) || sourcePools.find(([, pool]) => pool.some(repair =>
      repair.tag === question.tag
    ));

    if(directMatch){
      const route = routes.get(question.primarySkill) || [];
      directMatch[1].forEach(repair => {
        if(!route.some(existing => existing.id === repair.id)) route.push(repair);
      });
      routes.set(question.primarySkill, route);
    }
  });

  return Object.fromEntries(routes);
}

// =============================================
// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image,
		difficulty: question.difficulty,
        conceptCluster: question.conceptCluster,
        primarySkill: question.primarySkill,
        secondarySkills: question.secondarySkills || [],
        repairSkill: question.repairSkill,
        commonError: question.commonError
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

// =============================================
// QUESTION SELECTION ENGINE — DO NOT MODIFY
// =============================================
// Handles:
// - non-repetition
// - difficulty filtering
// - type balancing
//
// Breaking this = repeated questions or bad difficulty scaling
     
// 3. Remove the special calculated rooms block from randomQuestion()
function randomQuestion(poolName) {
    let pool = questionBanks[poolName];

    if (!pool) return null;

    let used = [
        ...usedQuestions.easy,
        ...usedQuestions.medium,
        ...usedQuestions.hard,
        ...usedQuestions.easyBoss,
        ...usedQuestions.mediumBoss,
        ...usedQuestions.finalBoss,
    ];

    let available = pool.filter(q => !used.includes(q.id));

    if(available.length === 0){
        usedQuestions[poolName] = [];
        available = pool;
    }

    let filtered = available;
    if (lastTypes.length >= 2) {
        let last1 = lastTypes[lastTypes.length - 1];
        let last2 = lastTypes[lastTypes.length - 2];

        if (last1 === last2) {
            filtered = available.filter(q => q.type !== last1);
            if (filtered.length === 0) filtered = available;
        }
    }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

    usedQuestions[poolName].push(question.id);

    lastTypes.push(question.type);
    if(lastTypes.length > 3){
        lastTypes.shift();
    }

    return question;
}

function updateMazeTrack() {
    const track = document.getElementById("mazeTrack");
    track.innerHTML = ""; // Clear the old grid
    
    for (let i = 1; i <= 30; i++) {
        const box = document.createElement("div");
        box.setAttribute("role","img");
        box.setAttribute("aria-label",`Room ${i} of 30`);
        box.className = "maze-box";
        
        // Determine the icon and state
        if (i < room) {
            box.innerText = "⬜";
            box.style.opacity = "0.6";
        } else if (i === room) {
            box.classList.add("active"); // Trigger the blue pulse
            box.setAttribute("aria-label",`Current room ${i} of 30`);
            box.innerText = "🟦";
        } else {
            // Checkpoint icons for future rooms
            if (i === 10){box.innerHTML = '◆';box.classList.add("boss10");}
            else if (i === 20){box.innerHTML = '◆';box.classList.add("boss20");}
            else if (i === 30){box.innerHTML = '★';box.classList.add("boss30");}
            else box.innerText = "🟨";
        }
        
        track.appendChild(box);
    }
}

// =============================================
// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function openGraphLightbox(src, altText){
    const lightbox = document.getElementById("graphLightbox");
    const lightboxImg = document.getElementById("graphLightboxImg");
    if(!lightbox || !lightboxImg || !src) return;

    lightboxImg.src = src;
    lightboxImg.alt = altText || "Expanded question graph";
    lightbox.classList.add("active");
    lightbox.setAttribute("aria-hidden", "false");
}

function closeGraphLightbox(){
    const lightbox = document.getElementById("graphLightbox");
    const lightboxImg = document.getElementById("graphLightboxImg");
    if(!lightbox) return;

    lightbox.classList.remove("active");
    lightbox.setAttribute("aria-hidden", "true");
    if(lightboxImg) lightboxImg.removeAttribute("src");
}

document.addEventListener("click", function(event){
    const target = event.target;
    const graphImg = target && target.closest ? target.closest("#questionImageBox img") : null;

    if(graphImg){
        openGraphLightbox(graphImg.src, graphImg.alt);
        return;
    }

    if(target && (target.id === "graphLightbox" || target.id === "graphLightboxClose")){
        closeGraphLightbox();
    }
});

document.addEventListener("keydown", function(event){
    const target = event.target;
    const graphImg = target && target.matches ? target.matches("#questionImageBox img") : false;

    if(graphImg && (event.key === "Enter" || event.key === " ")){
        event.preventDefault();
        openGraphLightbox(target.src, target.alt);
        return;
    }

    if(event.key === "Escape"){
        closeGraphLightbox();
    }
});

function displayQuestion() {
    answerInProgress = false;
    const optionsElement = document.getElementById("answers");
    optionsElement.innerHTML = "";

    currentQuestion.options.forEach((option, index) => { 
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.setAttribute("aria-label", `Answer option: ${option}`);

        btn.onclick = () => {
            btn.blur();
            answer(index);
        };

        btn.addEventListener("touchend", () => {
            btn.blur();
        }, { passive: true });

        optionsElement.appendChild(btn);
    });
}

function setAnswerButtonsDisabled(disabled){
    document.querySelectorAll("#answers button").forEach(btn => {
        btn.disabled = disabled;

    });
}

function checkRapidGuessing(isCorrect, responseTime){
    rapidGuessHistory.push({
        correct: isCorrect ? 1 : 0,
        responseTime: responseTime
    });

    if(rapidGuessHistory.length > RAPID_GUESS_CONFIG.windowSize){
        rapidGuessHistory.shift();
    }

    if(rapidGuessHistory.length < RAPID_GUESS_CONFIG.minAttempts){
        return {
            triggered: false,
            avgTime: responseTime,
            accuracy: isCorrect ? 1 : 0
        };
    }

    const recent = rapidGuessHistory.slice(-RAPID_GUESS_CONFIG.windowSize);

    const avgTime = recent.reduce((sum, item) => sum + item.responseTime, 0) / recent.length;
    const accuracy = recent.reduce((sum, item) => sum + item.correct, 0) / recent.length;

    return {
        triggered: avgTime < RAPID_GUESS_CONFIG.avgTimeMs && accuracy < RAPID_GUESS_CONFIG.maxAccuracy,
        avgTime,
        accuracy
    };
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|CITADEL00)
// - hashing logic
// - return format ("GATE-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|GATE07`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "GATE-" + Math.abs(hash).toString(36).toUpperCase();
}

function escapeHTML(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function titleCase(value){
    return String(value || "")
        .replace(/_/g, " ")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, letter => letter.toUpperCase());
}

function formatMasteryLabel(key){
    if(!key) return "Unlabeled Concept";

    const text = String(key);
    const exactLabel = MARKET_GATE_OBJECTIVE_LABELS[text];

    if(exactLabel){
        return exactLabel;
    }

    const objectiveMatch = text.match(/^(LO\d+\.\d+)/);

    if(objectiveMatch && MARKET_GATE_OBJECTIVE_LABELS[objectiveMatch[1]]){
        const suffix = text
            .replace(objectiveMatch[1], "")
            .replace(/^_+/, "")
            .replace(/^-+/, "")
            .trim();

        return suffix
            ? `${MARKET_GATE_OBJECTIVE_LABELS[objectiveMatch[1]]}: ${titleCase(suffix)}`
            : MARKET_GATE_OBJECTIVE_LABELS[objectiveMatch[1]];
    }

    return titleCase(text);
}

function formatPercent(value){
    if(value === null || value === undefined || !Number.isFinite(Number(value))) return "—";
    return `${Math.round(Number(value) * 100)}%`;
}

function formatSeconds(ms){
    const numeric = Number(ms || 0);
    if(!Number.isFinite(numeric) || numeric <= 0) return "—";
    return `${Math.round(numeric / 1000)}s`;
}

function getBucketEntry(key, bucket, category = "concept"){
    if(!bucket || !bucket.attempts){
        return null;
    }

    const attempts = Number(bucket.attempts || 0);
    const correct = Number(bucket.correct || 0);
    const accuracy = attempts ? correct / attempts : null;
    const typeForTiming = category === "type" ? key : "default";
    const target = getTypeTargetMs(typeForTiming);
    const avgTime = Number(bucket.avgTime || 0);
    const timeRatio = avgTime && target ? avgTime / target : 1;
    const fluency = accuracy === null
        ? 0
        : accuracy - clamp((timeRatio - 1) * 0.25, 0, 0.35);

    return {
        key,
        label: formatMasteryLabel(key),
        category,
        attempts,
        correct,
        accuracy,
        avgTime,
        timeRatio,
        fluency
    };
}

function getEntriesFromBuckets(source, category = "concept"){
    return Object.entries(source || {})
        .map(([key, bucket]) => getBucketEntry(key, bucket, category))
        .filter(Boolean);
}

function getTypeMasteryEntries(){
    const typeBuckets = {};

    Object.values(masteryState.byTag || {}).forEach(tagBucket => {
        Object.entries(tagBucket.byType || {}).forEach(([type, bucket]) => {
            if(!typeBuckets[type]){
                typeBuckets[type] = { attempts: 0, correct: 0, avgTime: 0 };
            }

            const oldAttempts = typeBuckets[type].attempts;
            const newAttempts = oldAttempts + Number(bucket.attempts || 0);

            typeBuckets[type].correct += Number(bucket.correct || 0);
            typeBuckets[type].avgTime = newAttempts
                ? ((typeBuckets[type].avgTime * oldAttempts) + (Number(bucket.avgTime || 0) * Number(bucket.attempts || 0))) / newAttempts
                : 0;
            typeBuckets[type].attempts = newAttempts;
        });
    });

    return getEntriesFromBuckets(typeBuckets, "type");
}

function sortStrongest(entries){
    return [...entries]
        .filter(entry => entry.attempts >= 2)
        .sort((a,b) => (b.accuracy - a.accuracy) || (b.fluency - a.fluency) || (b.attempts - a.attempts));
}

function sortWeakest(entries){
    const enoughData = entries.filter(entry => entry.attempts >= 2);
    const pool = enoughData.length ? enoughData : entries;

    return [...pool]
        .sort((a,b) => (a.accuracy - b.accuracy) || (a.fluency - b.fluency) || (b.avgTime - a.avgTime));
}

function getMeaningfulWeakEntries(entries, accuracyThreshold = 0.85){
    return sortWeakest(entries)
        .filter(entry => entry && entry.attempts >= 2)
        .filter(entry => {
            const accuracy = entry.accuracy === null || entry.accuracy === undefined
                ? 1
                : Number(entry.accuracy);

            return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
        });
}

function hasMeaningfulWeakness(entries, accuracyThreshold = 0.85){
    return (entries || []).some(entry => {
        if(!entry || entry.attempts < 2) return false;

        const accuracy = entry.accuracy === null || entry.accuracy === undefined
            ? 1
            : Number(entry.accuracy);

        return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
    });
}

function renderMasteryRows(entries, emptyText){
    if(!entries || entries.length === 0){
        return `<p class="mastery-empty">${escapeHTML(emptyText)}</p>`;
    }

    return entries.map(entry => {
        const pct = Math.max(0, Math.min(100, Math.round((entry.accuracy || 0) * 100)));
        const pace = entry.timeRatio > 1.25
            ? "Slow response pattern"
            : entry.timeRatio < 0.65
                ? "Fast response pattern"
                : "Stable pace";

        return `
            <div class="mastery-row">
                <div class="mastery-row-main">
                    <span class="mastery-row-name">${escapeHTML(entry.label)}</span>
                    <span class="mastery-row-score">${formatPercent(entry.accuracy)} · ${entry.correct}/${entry.attempts}</span>
                </div>
                <span class="mastery-row-meta">Average response: ${formatSeconds(entry.avgTime)} · ${pace}</span>
                <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }).join("");
}

function renderMasteryDiagnosticSection({
    weaknessTitle,
    signalTitle,
    entries,
    hasWeakness,
    weaknessEmptyText,
    cleanText
}){
    const title = hasWeakness ? weaknessTitle : signalTitle;
    const body = hasWeakness
        ? renderMasteryRows(entries, weaknessEmptyText)
        : `<p class="mastery-empty">${escapeHTML(cleanText)}</p>`;

    return `
        <div class="mastery-section">
            <h3>${escapeHTML(title)}</h3>
            ${body}
        </div>
    `;
}

function getRecentBehaviorSignals(){
    const recent = masteryState.recent || [];
    let fastMisses = 0;
    let slowCorrects = 0;
    let recentCorrect = 0;
    let recentTimeTotal = 0;

    recent.forEach(item => {
        const target = getTypeTargetMs(item.type || "default");
        const responseTime = Number(item.responseTime || 0);

        if(item.correct) recentCorrect++;
        if(responseTime) recentTimeTotal += responseTime;

        if(!item.correct && responseTime > 0 && responseTime < target * 0.55){
            fastMisses++;
        }

        if(item.correct && responseTime > target * 1.20){
            slowCorrects++;
        }
    });

    return {
        count: recent.length,
        accuracy: recent.length ? recentCorrect / recent.length : null,
        avgTime: recent.length ? recentTimeTotal / recent.length : 0,
        fastMisses,
        slowCorrects
    };
}


function getMasteryReportModeName(){
    if(gameMode === "timed-complete") return "Timed Trial";
    if(gameMode === "score") return "Score Attack";
    if(gameMode === "legendary") return "Legendary Mode";
    if(gameMode === "exam") return "Exam Drill";
    return getModeDisplayName();
}

function getMasteryReportData(){
    const totalTimeMs = startTime ? (Date.now() - startTime) : 0;
    const accuracy = totalAttempts > 0 ? correctAnswers / totalAttempts : 0;
    const tagEntries = getEntriesFromBuckets(masteryState.byTag || {}, "tag");
    const objectiveEntries = getEntriesFromBuckets(masteryState.byObjective || {}, "objective");
    const skillEntries = getEntriesFromBuckets(masteryState.bySkill || {}, "skill");
    const typeEntries = getTypeMasteryEntries();
    const behavior = getRecentBehaviorSignals();

    const strongest = sortStrongest([...objectiveEntries, ...tagEntries]).slice(0, 4);
    const weakestObjectives = getMeaningfulWeakEntries(objectiveEntries, 0.85).slice(0, 4);
    const weakestTypes = getMeaningfulWeakEntries(typeEntries, 0.85).slice(0, 3);
    const weakestSkills = getMeaningfulWeakEntries(skillEntries, 0.85).slice(0, 3);

    const hasObjectiveWeakness = hasMeaningfulWeakness(objectiveEntries, 0.85);
    const hasTypeWeakness = hasMeaningfulWeakness(typeEntries, 0.85);
    const hasSkillWeakness = hasMeaningfulWeakness(skillEntries, 0.85);
    const hasBehaviorWeakness = behavior.fastMisses >= 2 || behavior.slowCorrects >= 3;
    const noMajorWeakness = totalAttempts >= 8
        && accuracy >= 0.85
        && !hasObjectiveWeakness
        && !hasTypeWeakness
        && !hasSkillWeakness
        && !hasBehaviorWeakness;

    let verdict = "The Custodian found enough signal to build a report. Use it. Ignoring it would be malpractice with extra steps.";

    if(totalAttempts < 5){
        verdict = "The report is limited because this run has very few attempts. The system needs more evidence before it can judge mastery with confidence.";
    } else if(noMajorWeakness){
        verdict = "No major weakness detected. That does not mean the review is done with you. It means the next useful signal comes from harder pressure: Legendary Mode first, Score Attack after that.";
    } else if(accuracy >= 0.90){
        verdict = "Strong command. You completed the review with high accuracy. The weak signals below show where the next pressure test should focus.";
    } else if(accuracy >= 0.75){
        verdict = "Review-ready, but not bulletproof. The weak areas below are where points will leak on an exam.";
    } else {
        verdict = "Unstable command. You finished, but the review exposed weak signals. Hit the listed areas before chasing speed or Legendary Mode.";
    }

    const nextSteps = [];

    if(noMajorWeakness){
        nextSteps.push("Enter Legendary Mode next. The current run did not expose a major weak point, so harder multi-step and trap-heavy questions are the right next test.");
        nextSteps.push("Use Score Attack after Legendary Mode feels stable. Speed pressure is useful only after mastery survives harder questions.");
    } else {
        if(hasObjectiveWeakness && weakestObjectives[0]){
            nextSteps.push(`Review ${weakestObjectives[0].label}. That objective showed the weakest mastery signal.`);
        }

        if(hasTypeWeakness && weakestTypes[0]){
            nextSteps.push(`Practice ${weakestTypes[0].label} questions. That question form caused the most trouble.`);
        }

        if(hasSkillWeakness && weakestSkills[0]){
            nextSteps.push(`Drill ${weakestSkills[0].label}. That skill needs cleaner repetition.`);
        }

        if(behavior.fastMisses >= 2){
            nextSteps.push("Slow down on traps and graph-style items. Fast misses are not fluency. They are just wrong answers with confidence.");
        } else if(behavior.slowCorrects >= 3){
            nextSteps.push("You can get answers right, but some correct responses were slow. Build speed only after the reasoning is automatic.");
        }
    }

    if(nextSteps.length === 0){
        nextSteps.push("Run a harder mode next. The current evidence does not show a major weak point. Make the Gate earn its paycheck.");
    }

    return {
        mode: getMasteryReportModeName(),
        accuracy,
        totalTimeMs,
        timeString: formatTime(totalTimeMs),
        totalAttempts,
        correctAnswers,
        maxStreak,
        score: modeUsesScoreAttack() ? scoreAttackScore : null,
        strongest,
        weakestObjectives,
        weakestTypes,
        weakestSkills,
        hasObjectiveWeakness,
        hasTypeWeakness,
        hasSkillWeakness,
        noMajorWeakness,
        behavior,
        verdict,
        nextSteps
    };
}

function copyMasteryReport(){
    const report = getMasteryReportData();

    const lines = [
        "Adaptive Review Learning Game — Custodian's Mastery Report",
        `Student: ${username}`,
        `Mode: ${report.mode}`,
        `Accuracy: ${formatPercent(report.accuracy)} (${report.correctAnswers}/${report.totalAttempts})`,
        `Best Streak: ${report.maxStreak}`,
        `Time: ${report.timeString}`,
        report.score !== null ? `Score: ${report.score}` : null,
        "",
        "Strongest Signals:",
        ...(report.strongest.length ? report.strongest.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No clear strength signal yet."]),
        "",
        report.hasObjectiveWeakness ? "Weakest Learning Objectives:" : "Objective Signals:",
        ...(report.hasObjectiveWeakness && report.weakestObjectives.length ? report.weakestObjectives.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major objective weakness detected. Try Legendary Mode next."]),
        "",
        report.hasTypeWeakness ? "Weakest Question Forms:" : "Question Form Signals:",
        ...(report.hasTypeWeakness && report.weakestTypes.length ? report.weakestTypes.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major question-form weakness detected."]),
        "",
        report.hasSkillWeakness ? "Weakest Skills:" : "Skill Signals:",
        ...(report.hasSkillWeakness && report.weakestSkills.length ? report.weakestSkills.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major skill weakness detected."]),
        "",
        "Next Moves:",
        ...report.nextSteps.map(step => `- ${step}`)
    ].filter(line => line !== null);

    const text = lines.join("\n");

    function markCopied(){
        const btn = Array.from(document.querySelectorAll("button"))
            .find(button => button.innerText === "Copy Report" || button.innerText === "Copied!");

        if(!btn) return;
        const original = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = original; }, 1800);
    }

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(markCopied);
        return;
    }

    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    temp.remove();
    markCopied();
}


// =============================
// UTILITIES
// =============================
     
// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}     

// =============================================
// HIGH SCORE TRACKING — OPTIONAL FEATURE
// =============================================
// Stores top completion times in browser (localStorage)
//
// - Saves name, time, and date
// - Sorts fastest → slowest
// - Keeps top 5 results only
//
// SAFE TO EDIT:
// - number of scores kept (slice)
// - displayed fields (name/date)
//
// WARNING:
// Clearing browser data will erase scores.
// =============================================
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem(TEMPLATE_HIGH_SCORES_KEY)) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem(TEMPLATE_HIGH_SCORES_KEY, JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================     
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}
