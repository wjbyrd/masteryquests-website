/* =========================================
   SCORE ATTACK MODE ADDITION — SCORE HUD + FLOATING POINTS
   Inspect here if you want to change:
   - score display styling
   - floating +100 / -75 animations
   - colors, placement, and animation speed

   Logic lives in JavaScript under:
   "SCORE ATTACK MODE ADDITION — CONFIG + STATE"
========================================= */

.score-attack-hud{
  margin: 8px auto 10px;
  padding: 8px 14px;
  width: fit-content;
  max-width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(11,34,56,0.88), rgba(2,6,23,0.96));
  border: 1px solid rgba(247,217,130,0.50);
  box-shadow:
    0 0 16px rgba(56,189,248,0.24),
    0 0 26px rgba(247,217,130,0.18),
    inset 0 0 12px rgba(0,0,0,0.74);
}

.score-attack-label,
.score-attack-best-label{
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #c7ecff;
}

.score-attack-value{
  min-width: 72px;
  text-align: right;
  font-size: 24px;
  font-weight: 900;
  color: #f7d982;
  text-shadow:
    0 0 12px rgba(247,217,130,0.70),
    0 0 18px rgba(56,189,248,0.24);
}

.score-attack-best{
  min-width: 56px;
  text-align: right;
  font-size: 18px;
  font-weight: 800;
  color: #e0f2fe;
  text-shadow:
    0 0 10px rgba(56,189,248,0.46);
}

#scoreFloatLayer{
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 50;
}

.score-float{
  position: absolute;
  left: 50%;
  top: var(--score-float-top, 42%);
  transform: translateX(-50%);
  font-size: 25px;
  font-weight: 900;
  letter-spacing: 1px;
  white-space: nowrap;
  animation: scoreFloatUp 1.2s ease-out forwards;
  text-shadow:
    0 0 10px rgba(0,0,0,0.96),
    0 0 18px rgba(56,189,248,0.42);
}

.score-float.positive{ color: #f7d982; }
.score-float.negative{ color: #f87171; }
.score-float.neutral{ color: #c7ecff; }

@keyframes scoreFloatUp{
  0%{ opacity: 0; transform: translate(-50%, 12px) scale(.85); }
  15%{ opacity: 1; transform: translate(-50%, 0) scale(1.08); }
  100%{ opacity: 0; transform: translate(-50%, -58px) scale(1); }
}

@media(max-width:768px){
  .score-attack-hud{ margin: 6px auto; padding: 6px 10px; gap: 7px; }
  .score-attack-label,
  .score-attack-best-label{ font-size: 9px; letter-spacing: 1.4px; }
  .score-attack-value{ min-width: 56px; font-size: 19px; }
  .score-attack-best{ min-width: 44px; font-size: 15px; }
  .score-float{ font-size: 20px; }
}

========================================= */

.sound-toggle{
  position:fixed;
  right:28px;
  bottom:24px;
  z-index:999;
  padding:10px 13px;

  border:1px solid rgba(56,189,248,0.30);

      180deg,

      rgba(2,6,23,0.82)

      color .18s ease,
      border-color .18s ease,

function beginRunSession(){

}

function scheduleForCurrentRun(callback, delay){
    const scheduledSessionId = runSessionId;

    return setTimeout(() => {

        callback();
    }, delay);
}

function modeUsesScoreAttack(){
    return gameMode === "score";

function resetScoreAttackState(){
    scoreAttackScore = 0;
    scoreAttackEvents = [];
    activeScoreFloatCount = 0;
    scoreAttackBestScore = Number(localStorage.getItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`) || 0);
    updateScoreAttackHud();
}

function getScoreAttackSpeedBonus(responseTime){
    const bonus = SCORE_ATTACK_CONFIG.speedBonuses.find(item => responseTime <= item.maxMs);
    return bonus ? bonus.points : 0;
}

function getScoreAttackStreakBonus(currentStreak){
    const bonus = SCORE_ATTACK_CONFIG.streakBonuses.find(item => currentStreak >= item.minStreak);
    return bonus ? bonus.points : 0;
}

function applyScoreAttackEvent(label, amount){
    if(!modeUsesScoreAttack()) return;

    const numericAmount = Number(amount || 0);
    if(!Number.isFinite(numericAmount) || numericAmount === 0) return;

    scoreAttackScore += numericAmount;

    // No negative scoreboard. Punishment hurts, but it does not turn into comedy.
    if(scoreAttackScore < 0){
        scoreAttackScore = 0;
    }

    scoreAttackEvents.push({
        label,
        amount: numericAmount,
        scoreAfter: scoreAttackScore,
        room,
        questionId: currentQuestion?.id || 0,
        time: Date.now()
    });

    if(scoreAttackEvents.length > 120){
        scoreAttackEvents.shift();
    }

    if(scoreAttackScore > scoreAttackBestScore){
        scoreAttackBestScore = scoreAttackScore;
        localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`, String(scoreAttackBestScore));
    }

    updateScoreAttackHud();
    showScoreAttackFloat(label, numericAmount);
}

function applyScoreAttackForAnswer(isCorrect, responseTime){
    if(!modeUsesScoreAttack()) return;

    if(isCorrect){
        applyScoreAttackEvent("Correct", SCORE_ATTACK_CONFIG.correct);

        const speedBonus = getScoreAttackSpeedBonus(responseTime);
        if(speedBonus > 0){
            applyScoreAttackEvent("Speed", speedBonus);
        }

        const streakBonus = getScoreAttackStreakBonus(streak);
        if(streakBonus > 0){
            applyScoreAttackEvent("Streak", streakBonus);
        }

        return;
    }

    const penalty = responseTime < 4000
        ? SCORE_ATTACK_CONFIG.rapidMissPenalty
        : SCORE_ATTACK_CONFIG.wrongPenalty;

    applyScoreAttackEvent(responseTime < 4000 ? "Rapid Miss" : "Wrong", penalty);
}

function applyScoreAttackRapidGuessPenalty(){
    if(!modeUsesScoreAttack()) return;

    applyScoreAttackEvent("Rapid Guess", SCORE_ATTACK_CONFIG.rapidMissPenalty);
}

// SCORE ATTACK MODE ADDITION:
// This creates the tiny arcade-style "score resolve" beat.
// It lets +100 / Speed / Streak / Wrong penalties breathe before feedback appears.
function getScoreAttackResolveDelay(isCorrect){
    if(!modeUsesScoreAttack()) return 0;

    return isCorrect
        ? SCORE_ATTACK_CONFIG.resolveDelayCorrectMs
        : SCORE_ATTACK_CONFIG.resolveDelayWrongMs;
}

function waitForScoreAttackResolve(isCorrect){
    const delay = getScoreAttackResolveDelay(isCorrect);

    if(!delay || delay <= 0){
        return Promise.resolve();
    }

    return new Promise(resolve => setTimeout(resolve, delay));
}

function updateScoreAttackHud(){
    const hud = document.getElementById("scoreAttackHud");
    const scoreDisplay = document.getElementById("scoreAttackDisplay");
    const bestDisplay = document.getElementById("scoreAttackBestDisplay");

    if(!hud || !scoreDisplay || !bestDisplay) return;

    hud.style.display = modeUsesScoreAttack() ? "flex" : "none";
    scoreDisplay.innerText = String(scoreAttackScore);
    bestDisplay.innerText = String(scoreAttackBestScore);
}

function showScoreAttackFloat(label, amount){
    const layer = document.getElementById("scoreFloatLayer");
    if(!layer) return;

    const item = document.createElement("div");
    const sign = amount > 0 ? "+" : "";
    const typeClass = amount > 0 ? "positive" : amount < 0 ? "negative" : "neutral";

    activeScoreFloatCount++;
    const stackOffset = Math.min(activeScoreFloatCount - 1, 4) * 30;

    item.className = `score-float ${typeClass}`;
    item.style.setProperty("--score-float-top", `calc(38% + ${stackOffset}px)`);
    item.innerText = `${label} ${sign}${amount}`;

    layer.appendChild(item);

    setTimeout(() => {
        item.remove();
        activeScoreFloatCount = Math.max(0, activeScoreFloatCount - 1);
    }, 1200);
}

function loadSavedGame(expectedMode = gameMode){
    const normalizedMode = expectedMode || "standard";

    const rawSave = localStorage.getItem(saveKey);
    if(!rawSave) return false;

    try {
        const saveData = JSON.parse(rawSave);
        const savedMode = saveData.gameMode || normalizedMode;

        if(savedMode !== normalizedMode){
            console.warn(`Saved run mode mismatch for ${saveKey}: expected ${normalizedMode}, found ${savedMode}.`);
            return false;
        }

        room = Number(saveData.room || 1);
        bossHealth = Number(saveData.bossHealth || 3);
        bossCheckpoint = Number(saveData.bossCheckpoint || 1);
        correctAnswers = Number(saveData.correctAnswers || 0);
        totalAttempts = Number(saveData.totalAttempts || 0);
        maxStreak = Number(saveData.maxStreak || 0);
        streak = Number(saveData.streak || 0);

        username = saveData.username || username || "";
        studentEmail = saveData.studentEmail || studentEmail || "";
        runID = saveData.runID || runID || "";
        gameMode = normalizedMode;

        conceptMemory = saveData.conceptMemory || {};
        masteryState = saveData.masteryState || { byTag: {}, byObjective: {}, bySkill: {}, recent: [] };
        if(!masteryState.bySkill) masteryState.bySkill = {};
        adaptiveMode = saveData.adaptiveMode || "support";
        tagHistory = saveData.tagHistory || [];
        lastTypes = saveData.lastTypes || [];
        usedQuestions = saveData.usedQuestions || usedQuestions;
        questionHistory = saveData.questionHistory || questionHistory;

        bossMistakeCountThisRun = Number(saveData.achievementTracking?.bossMistakeCountThisRun || 0);
        bossesDefeatedThisRun = Number(saveData.achievementTracking?.bossesDefeatedThisRun || 0);

        if(normalizedMode === "standard"){
            if(saveData.artifacts?.vaultCompass) localStorage.setItem(TEMPLATE_ARTIFACT_KEYS.compass, "true");
            if(saveData.artifacts?.vaultLens) localStorage.setItem(TEMPLATE_ARTIFACT_KEYS.lens, "true");

function generatePseudonymFromEmail(email) {
    const titles = [
        "Axiom", "Ledger", "Vector", "Meridian", "Signal", "Cipher",
        "Frontier", "Equity", "Oracle", "Index", "Summit", "Nexus",
        "Vault", "Prism", "Civic", "Astral", "Beacon", "Horizon"
    ];

    const roles = [
        "Appraiser", "Cartographer", "Arbiter", "Custodian", "Warden", "Registrar",
        "Archivist", "Surveyor", "Magistrate", "Keeper", "Analyst", "Mediator",
        "Steward", "Scribe", "Sentinel", "Marshal", "Seeker", "Auditor"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const title = titles[positiveHash % titles.length];
    const role = roles[Math.floor(positiveHash / titles.length) % roles.length];
    const number = 1000 + (positiveHash % 9000);

    return `${title}${role}${number}`;
}

function inferObjective(question){
    if(!question) return "general";
    if(question.objective) return question.objective;

    const q = (question.q || "").toLowerCase();
    const tag = (question.tag || "general").toLowerCase();
    const type = (question.type || "default").toLowerCase();

// =============================================

        if(q.includes("trade off") || q.includes("trade-off") || q.includes("scarcity") || q.includes("choice")) {
            return "LO1.1_tradeoffs_analysis";

        return "LO1.2_opportunity_cost";

    if(tag === "marginal" || tag === "marginal_reasoning" || tag === "margin"){
        if(q.includes("marginal benefit") || q.includes("marginal cost") || q.includes("additional") || q.includes("one more")) {
            return "LO1.3_marginal_decision";
        }

            return "LO1.3_calculate_margin";
        }

    if(tag === "incentives" || tag === "behavior"){
        if(q.includes("incentive") || q.includes("respond") || q.includes("behavior") || q.includes("encourage") || q.includes("discourage")) {
            return "LO1.4_incentives_behavior";

        return "LO1.4_incentives_behavior";

        }
        return "LO6.2_price_floor_effects";
    }

    if(tag === "tax" || tag === "tax_wedge"){
        if(q.includes("tax") && (q.includes("quantity") || q.includes("price") || q.includes("sold"))) {
            return "LO6.3_tax_price_quantity";
        }
        if(q.includes("wedge") || q.includes("buyers pay") || q.includes("sellers receive")) {
            return "LO6.3_tax_wedge";
        }
        return "LO6.3_tax_effects";
    }

    if(tag === "tax_equivalence" || tag === "buyer_tax" || tag === "seller_tax"){
        if(q.includes("buyer") && q.includes("seller")) {
            return "LO6.4_buyer_seller_tax_equivalence";
        }
        if(q.includes("equivalent") || q.includes("same outcome")) {
            return "LO6.4_tax_equivalence";
        }
        return "LO6.4_taxes_on_buyers_and_sellers";
    }

    if(tag === "tax_incidence" || tag === "incidence" || tag === "elasticity"){
        if(q.includes("burden") || q.includes("incidence") || q.includes("split")) {
            return "LO6.5_tax_burden_split";
        }
        if(q.includes("elastic") || q.includes("inelastic")) {
            return "LO6.5_elasticity_tax_incidence";
        }
        return "LO6.5_tax_incidence";
    }

    // -----------------------------
    // BROAD FALLBACKS
    // These catch sloppy tags before they pollute the data.
    // -----------------------------

    if(q.includes("opportunity cost") || q.includes("give up") || q.includes("forgone")) {
        return "LO1.2_opportunity_cost";
    }

    if(q.includes("marginal benefit") || q.includes("marginal cost") || q.includes("one more") || q.includes("additional")) {
        return "LO1.3_marginal_reasoning";
    }

    if(q.includes("incentive") || q.includes("respond to")) {
        return "LO1.4_incentives_behavior";
    }

    if(q.includes("production possibilities") || q.includes("ppf") || q.includes("frontier")) {
        return "LO2.2_ppf_choices_tradeoffs";
    }

    if(q.includes("positive statement") || q.includes("normative statement")) {
        return "LO2.4_positive_vs_normative";
    }

    if(q.includes("competitive market") || q.includes("many buyers") || q.includes("many sellers")) {
        return "LO4.1_competitive_market";
    }

    if(q.includes("demand") || q.includes("quantity demanded")) {
        return "LO4.2_demand";
    }

    if(q.includes("supply") || q.includes("quantity supplied")) {
        return "LO4.3_supply";
    }

    if(q.includes("equilibrium") || q.includes("shortage") || q.includes("surplus")) {
        return "LO4.4_supply_demand_together";
    }

    if(q.includes("price ceiling") || q.includes("rent control")) {
        return "LO6.1_price_ceiling_effects";
    }

    if(q.includes("price floor") || q.includes("minimum wage")) {
        return "LO6.2_price_floor_effects";
    }

    if(q.includes("tax") || q.includes("tax wedge")) {
        return "LO6.3_tax_effects";
    }

return `${tag}_${type}`;}

function inferSkill(question){
    if(!question) return null;

    const q = (question.q || "").toLowerCase();
    const tag = (question.tag || "").toLowerCase();

    if(tag === "demand" || tag === "quantity_demanded"){
        if(q.includes("price rises") || q.includes("price falls") || q.includes("quantity demanded")){
            return "movement_vs_demand_shift";
        }
        if(q.includes("income") || q.includes("substitute") || q.includes("complement") || q.includes("taste") || q.includes("expectation")){
            return "demand_shifters";
        }
    }

    if(tag === "supply" || tag === "quantity_supplied"){
        if(q.includes("price rises") || q.includes("price falls") || q.includes("quantity supplied")){
            return "movement_vs_supply_shift";
        }
        if(q.includes("input") || q.includes("technology") || q.includes("seller") || q.includes("tax") || q.includes("subsidy")){
            return "supply_shifters";
        }
    }

    if(tag === "price_ceiling") return "binding_price_ceiling";
    if(tag === "price_floor") return "binding_price_floor";
    if(tag === "taxes" || tag === "tax_incidence") return "tax_wedge_incidence";
    if(tag === "opportunity_cost") return "opportunity_cost_calculation";
    if(tag === "ppf") return "ppf_opportunity_cost";
    if(tag === "positive_normative") return "positive_vs_normative";

    return null;
}

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return masteryState.byObjective[objectiveKey];
}

function getObjectiveAccuracy(question){
    return getAccuracy(getObjectiveBucket(question));
}

function getObjectiveFluency(question){
    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){
    return getFluency(getTypeBucket(tag, type), type || "default");
}

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);
	const skillBucket = getSkillBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);
	updateBucket(skillBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: currentQuestion.objective || inferObjective(currentQuestion),
		skill: getSkillKey(question)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getBossObjectiveKey(question){
    if(!question) return null;

    const rawObjective = question.objective || inferObjective(question);
    if(!rawObjective) return null;

    const match = String(rawObjective).match(/^LO\d+\.\d+/);
    return match ? match[0] : rawObjective;
}

function getObjectiveFamilyStats(objectiveKey){
    let attempts = 0;
    let correct = 0;
    let weightedTime = 0;

    Object.keys(masteryState.byObjective || {}).forEach(key => {
        if(key === objectiveKey || key.startsWith(objectiveKey + "_")){
            const bucket = masteryState.byObjective[key];
            if(!bucket) return;

            attempts += bucket.attempts || 0;
            correct += bucket.correct || 0;
            weightedTime += (bucket.avgTime || 0) * (bucket.attempts || 0);
        }
    });

    return {
        attempts,
        correct,
        accuracy: attempts ? correct / attempts : null,
        avgTime: attempts ? weightedTime / attempts : 0
    };
}

function getWeakestBossObjective(bank){
    if(!Array.isArray(bank) || bank.length === 0) return null;

    const objectives = [...new Set(
        bank.map(q => getBossObjectiveKey(q)).filter(Boolean)
    )];

    if(objectives.length === 0) return null;

    const scoredObjectives = objectives.map(obj => {
        const stats = getObjectiveFamilyStats(obj);
        const recentMisses = (masteryState.recent || []).filter(item => {
            const itemObjective = item.objective || "";
            return (itemObjective === obj || itemObjective.startsWith(obj + "_")) && !item.correct;
        }).length;

        let score = stats.accuracy === null
            ? 0.35
            : (1 - stats.accuracy) * 2;

        score += recentMisses * 0.25;

        if(stats.avgTime && stats.avgTime > TYPE_TIME_TARGETS.default){
            score += 0.15;
        }

        return {
            objective: obj,
            score,
            attempts: stats.attempts || 0
        };
    });

    const highestScore = Math.max(...scoredObjectives.map(item => item.score));
    const nearHighest = scoredObjectives.filter(item =>
        item.score >= highestScore - 0.05
    );
    const fewestAttempts = Math.min(...nearHighest.map(item => item.attempts));
    const leastSeen = nearHighest.filter(item =>
        item.attempts === fewestAttempts
    );

    return leastSeen[Math.floor(Math.random() * leastSeen.length)].objective;
}

function getBossQuestionFingerprint(question){
    return String(question?.q || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
}



function getBossNarrativeStage(question){
    const stage = String(question?.bossStage || "").toLowerCase();
    return stage === "opening" || stage === "final" ? stage : null;
}


function orderBossQuestionSet(selected, available){
    const ordered = [...(selected || [])];

    const replaceDuplicateStage = stage => {
        const stageIndexes = ordered
            .map((question, index) => ({ question, index }))
            .filter(item => getBossNarrativeStage(item.question) === stage)
            .map(item => item.index);

        stageIndexes.slice(1).forEach(index => {
            const selectedIds = new Set(
                ordered.map(question => question?.id).filter(id => id !== undefined)
            );
            const candidates = shuffle(
                (available || []).filter(question =>
                    question &&
                    !selectedIds.has(question.id) &&
                    getBossNarrativeStage(question) !== stage
                )
            );
            const replacement = candidates.find(question =>
                getBossNarrativeStage(question) === null
            ) || candidates[0];

            if(replacement){
                ordered[index] = replacement;
            }
        });
    };

    replaceDuplicateStage("final");
    replaceDuplicateStage("opening");

    const stageRank = stage =>
        stage === "opening" ? 0 : stage === "final" ? 2 : 1;

    return ordered
        .map((question, index) => ({
            question,
            index,
            stage: getBossNarrativeStage(question)
        }))
        .sort((a, b) =>
            stageRank(a.stage) - stageRank(b.stage) || a.index - b.index
        )
        .map(item => item.question);
}


function getRecentQuestionFingerprints(limitPerPool = 15){
    const recentIds = new Set();

    Object.values(questionHistory || {}).forEach(history => {
        (history || []).slice(-limitPerPool).forEach(id => recentIds.add(id));
    });

    const fingerprints = new Set();

    Object.values(questionBanks || {}).forEach(bank => {
        (bank || []).forEach(question => {
            if(recentIds.has(question.id)){
                fingerprints.add(getBossQuestionFingerprint(question));
            }
        });
    });

    return fingerprints;
}


function buildBossQuestionSet(bank, poolName, chosenObjective){
    if(!Array.isArray(bank) || bank.length === 0) return [];

    const usedIds = new Set(usedQuestions[poolName] || []);
    const recentFingerprints = getRecentQuestionFingerprints();

    let available = bank.filter(question =>
        question &&
        !usedIds.has(question.id) &&
        !recentFingerprints.has(getBossQuestionFingerprint(question))
    );

    if(available.length < 3){
        available = bank.filter(question =>
            question &&
            !recentFingerprints.has(getBossQuestionFingerprint(question))
        );
    }

    if(available.length < 3){
        available = bank.filter(question =>
            question && !usedIds.has(question.id)
        );
    }

    if(available.length < 3){
        usedQuestions[poolName] = [];
        available = bank.filter(Boolean);
    }

    const objectiveMatches = chosenObjective
        ? available.filter(question =>
            getBossObjectiveKey(question) === chosenObjective
        )
        : [];

    const selected = objectiveMatches.length >= 3
        ? shuffle([...objectiveMatches]).slice(0, 3)
        : shuffle([...objectiveMatches]);

    const remaining = shuffle(
        available.filter(question =>
            !selected.some(item => item.id === question.id)
        )
    );

    while(selected.length < 3 && remaining.length > 0){
        const selectedObjectives = new Set(
            selected.map(getBossObjectiveKey).filter(Boolean)
        );
        const selectedTypes = new Set(
            selected.map(item => item.type).filter(Boolean)
        );
        const selectedSkills = new Set(
            selected.map(item => item.primarySkill).filter(Boolean)
        );

        let bestScore = -Infinity;
        let bestCandidates = [];

        remaining.forEach(question => {
            let score = 0;
            const objective = getBossObjectiveKey(question);

            if(objective && !selectedObjectives.has(objective)) score += 2;
            if(question.type && !selectedTypes.has(question.type)) score += 1;
            if(question.primarySkill && !selectedSkills.has(question.primarySkill)) score += 1;

            if(score > bestScore){
                bestScore = score;
                bestCandidates = [question];
            } else if(score === bestScore){
                bestCandidates.push(question);
            }
        });

        const picked = bestCandidates[
            Math.floor(Math.random() * bestCandidates.length)
        ];

        selected.push(picked);
        remaining.splice(remaining.findIndex(item => item.id === picked.id), 1);
    }

    return orderBossQuestionSet(selected, available);
}


function getSelectionProfile(){
    const recent = getRecentPerformance(8);
    const strongestTag = getStrongestTag();
    const strongestFluency = strongestTag ? getTagFluency(strongestTag) : 0;

    return {
        recentAccuracy: recent.accuracy,
        avgCorrectRatio: recent.avgCorrectRatio,
        strongestTag,
        strongestFluency,
        mediumReady: streak >= 5 && recent.count >= 5 && recent.accuracy >= 0.8,
        hardReady: streak >= 8 && recent.count >= 6 && recent.accuracy >= 0.88 && recent.avgCorrectRatio <= 1.2 && strongestFluency >= 0.72,
        eliteReady: streak >= 14 && recent.count >= 8 && recent.accuracy >= 0.92 && recent.avgCorrectRatio <= 1.05 && strongestFluency >= 0.82
    };
}

function determineSelectionPurpose(profile){
    if(profile.recentAccuracy === 0 && getRecentPerformance(8).count === 0) return "support";
    if(profile.eliteReady) return "stretch";
    if(profile.recentAccuracy < 0.65) return "repair";
    if(profile.recentAccuracy < 0.8) return "confirm";
    if(profile.hardReady) return "challenge";
    return "diversify";
}

function shouldTriggerDetour(question){
    if(!question || !question.tag) return false;
    const tagWeakness = conceptMemory[question.tag] || 0;
    const typeBucket = getTypeBucket(question.tag, question.type);
    const typeAccuracy = getAccuracy(typeBucket);
    const objectiveAccuracy = getObjectiveAccuracy(question);

    return tagWeakness >= 2.2
        || (typeBucket && typeBucket.attempts >= 2 && typeAccuracy !== null && typeAccuracy < 0.6)
        || (objectiveAccuracy !== null && objectiveAccuracy < 0.5 && getObjectiveBucket(question).attempts >= 2);
}

function resetRemediationState(){
    remediationState = {
        active: false,
        stage: null,
        tag: null,
        objective: null,
		skill: null,
    	commonError: null,
        sourceType: null,
        returnRoom: null,
        originQuestionId: null,
        careless: false
    };
    detourActive = false;
    detourReturnRoom = null;
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;
	const skill = getSkillKey(question);

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
		skill: skill,
		commonError: question.commonError || null,
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = [], skillKey = null){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));

    if(skillKey){
        let skillMatches = candidates.filter(q =>
            q.primarySkill === skillKey || q.repairSkill === skillKey
        );
        if(skillMatches.length > 0) return skillMatches;
    }

    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

function getRetestPoolName(){
    if(room <= 9) return "easy";
    if(room <= 19) return "medium";
    if(room <= 25) return "hard";
    if(room <= 29) return "hard";
    return "elite";
}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm", skillKey = null){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);

    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds, skillKey);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, [], skillKey);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
      const skillRepairPool = directSkillRepairRoutes[state.skill] || microSkillRepairPools[state.skill] || [];
      if(state.skill && skillRepairPool.length){
            const skillRepairCandidates = getQuestionsMatchingNeed(
                skillRepairPool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillRepairCandidates.length > 0){
                return weightedPick(skillRepairCandidates, {
                    mode: "support",
                    purpose: "repair"
                });
            }
        }

        const allRepairPool = Object.values(microSkillRepairPools || {})
            .reduce((all, pool) => all.concat(pool), []);
        const repairCandidates = getQuestionsMatchingNeed(
            allRepairPool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, {
                mode: "support",
                purpose: "repair"
            });
        }
    }

    if(state.stage === "bridge"){
        if(state.skill && microSkillBridgePools[state.skill]){
            const skillBridgePool = microSkillBridgePools[state.skill] || [];
            const skillBridgeCandidates = getQuestionsMatchingNeed(
                skillBridgePool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillBridgeCandidates.length > 0){
                return weightedPick(skillBridgeCandidates, {
                    mode: "support",
                    purpose: "confirm"
                });
            }
        }

        const allBridgePool = Object.values(microSkillBridgePools || {})
            .reduce((all, pool) => all.concat(pool), []);

        const bridgeCandidates = getQuestionsMatchingNeed(
            allBridgePool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, {
                mode: "support",
                purpose: "confirm"
            });
        }
    }

    const retestPoolName = getRetestPoolName();

    return pickRemediationFromBank(
        retestPoolName,
        state.objective,
        state.tag,
        state.stage === "retest" ? "challenge" : "confirm",
        state.skill
    );
}
function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName] || questionBanks.hard || questionBanks.medium || questionBanks.easy || [];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    if(!pool || pool.length === 0){
        return {
            id: 999999,
            q: "No question pool is available for this room. Check the questionBanks configuration.",
            options: ["Continue", "Continue", "Continue", "Continue"],
            a: 0,
            tag: "system",
            type: "default",
            objective: "system_check",
            feedback: "A question pool is missing."
        };
    }

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

function startTimedModeClock(){
    timedModeEndTime = Date.now() + timedModeDurationMs;

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "flex";

    updateTimedModeClock();

    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
    }

    timedModeTimerInterval = setInterval(updateTimedModeClock, 250);
}

function stopTimedModeClock(){
    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
        timedModeTimerInterval = null;
    }

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "none";

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.classList.remove("timer-warning");
        timerDisplay.innerText = "10:00";
    }
}

function updateTimedModeClock(){
    if(gameMode !== "timed" || !timedModeEndTime) return;

    const remainingMs = Math.max(0, timedModeEndTime - Date.now());
    const totalSeconds = Math.ceil(remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.innerText = `${minutes}:${String(seconds).padStart(2, "0")}`;
        timerDisplay.classList.toggle("timer-warning", remainingMs <= 60 * 1000);
    }

    if(remainingMs <= 0){
        endTimedModeRun();
    }
}

// Returns a random prompt based on question type
// Falls back to "default" if type not found
function getWizardLine(type){
    const pool = wizardLines[type] || wizardLines.default;
    return pool[Math.floor(Math.random() * pool.length)];
}

// Returns random feedback (correct or wrong)
// Used during answer responses and transitions     
function getWizardFeedback(type){
    const pool = wizardFeedback[type];
    return pool[Math.floor(Math.random() * pool.length)];
}

  {"id":9005,"sourceGame":"marketGate","q":"A planner can produce more emergency generators only by pulling engineers away from water-system repairs. The first 10 generators cost 2 repairs, but the next 10 cost 6 repairs. What is the best interpretation of this production choice?","options":["Opportunity cost rises because resources are not equally adaptable across uses","Opportunity cost falls because the planner learns to produce generators faster","Opportunity cost disappears because both outputs are public priorities","Opportunity cost is only the dollar wage paid to the engineers"],"a":0,"tag":"ppf","type":"multi-step","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"increasing_opportunity_cost","secondarySkills":[],"repairSkill":"increasing_opportunity_cost","commonError":"legendary_near_match_error","feedback":"The increasing repair sacrifice shows increasing opportunity cost, not just a money-cost problem."},
  {"id":9006,"sourceGame":"marketGate","q":"A city can repair 12 bridges or reopen 4 schools with the same crews. After shifting the easiest crews to schools, reopening 4 more schools would require giving up 18 bridge repairs. What does this show?","options":["Increasing opportunity cost because resources are not equally suited to both tasks","Constant opportunity cost because schools and bridges use the same crews","No opportunity cost because both projects help the public","A demand shift because schools became more popular"],"a":0,"tag":"ppf","type":"multi-step","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"increasing_opportunity_cost","secondarySkills":["resource_specialization","tradeoff_analysis"],"repairSkill":"increasing_opportunity_cost","commonError":"treats_public_projects_as_costless","feedback":"The rising bridge sacrifice shows increasing opportunity cost caused by specialized resources."},
  {"id":9007,"sourceGame":"marketGate","q":"A bowed-out PPF has these tradeoffs: moving from point A to B costs 4 units of Y for 5 units of X, while moving from D to E costs 14 units of Y for 5 units of X. What is the best interpretation?","options":["The opportunity cost of X rises as more X is produced","The opportunity cost of X falls as more X is produced","The economy has eliminated scarcity","The PPF must be a straight line"],"a":0,"tag":"ppf","type":"interpretation","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"increasing_opportunity_cost","secondarySkills":["ppf_shape","opportunity_cost"],"repairSkill":"increasing_opportunity_cost","commonError":"confuses_total_output_with_marginal_tradeoff","feedback":"On a bowed-out PPF, producing more of one good usually requires giving up larger amounts of the other good."},
  {"id":9008,"sourceGame":"marketGate","q":"An economy is inside its PPF because workers and machines are idle. Which change moves it toward efficiency but does not represent long-run growth?","options":["Putting idle workers and machines back to work on the existing frontier","Inventing new technology that shifts the frontier outward","Discovering new natural resources that expand production possibilities","Training workers so the economy can produce more of both goods than before"],"a":0,"tag":"ppf","type":"trap","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"efficiency_vs_growth","secondarySkills":["idle_resources","ppf_shift"],"repairSkill":"ppf_efficiency_status","commonError":"confuses_movement_to_frontier_with_outward_shift","feedback":"Using idle resources moves the economy toward the existing frontier. Growth shifts the frontier outward."},
  {"id":9009,"sourceGame":"marketGate","q":"A PPF shifts outward for both goods after worker training improves. Which chapter connection is being tested?","options":["Human capital raises productive capacity","A price ceiling creates a shortage","A tax wedge reduces market size","A positive statement becomes normative"],"a":0,"tag":"ppf","type":"synthesis","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"ppf_growth_source","secondarySkills":["human_capital","productive_capacity"],"repairSkill":"ppf_shift_growth","commonError":"treats_worker_training_as_movement_along_ppf_only","feedback":"Better worker training improves human capital and can shift the PPF outward."},
  {"id":9010,"sourceGame":"marketGate","q":"A student says, 'Point outside the PPF is inefficient because the economy is not producing there.' What is wrong with that statement?","options":["A point outside the PPF is unattainable with current resources, not merely inefficient","A point outside the PPF is always efficient","A point outside the PPF shows idle resources","A point outside the PPF means opportunity cost is zero"],"a":0,"tag":"ppf","type":"trap","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"ppf_efficiency_status","secondarySkills":["attainable_vs_unattainable"],"repairSkill":"ppf_efficiency_status","commonError":"confuses_unattainable_with_inefficient","feedback":"Inside the PPF is inefficient. Outside the PPF is unattainable with current resources and technology."},
  {"id":9011,"sourceGame":"marketGate","q":"A college student can work 20 hours and study 5 hours, or work 10 hours and study 18 hours. What is the opportunity cost of gaining 13 study hours?","options":["10 hours of work","13 hours of work","18 hours of study","Zero because studying is productive"],"a":0,"tag":"opportunity_cost","type":"calculation","objective":"LO1.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"opportunity_cost_calculation","secondarySkills":["tradeoff_identification"],"repairSkill":"opportunity_cost_definition","commonError":"uses_gain_in_chosen_activity_as_cost","feedback":"The student gains 13 study hours by giving up 10 work hours, so the opportunity cost is 10 work hours."},
  {"id":9012,"sourceGame":"marketGate","q":"A manager has already spent $40,000 developing a product. Finishing it costs $12,000 more and is expected to bring in $18,000. What should the manager do using marginal reasoning?","options":["Finish it because the marginal benefit exceeds the marginal cost","Cancel it because total cost is $52,000","Finish it because sunk costs should determine the choice","Cancel it because marginal cost is always bad"],"a":0,"tag":"marginal","type":"multi-step","objective":"LO1.3","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"marginal_benefit_cost_decision","secondarySkills":["sunk_cost_trap"],"repairSkill":"marginal_benefit_cost_decision","commonError":"includes_sunk_cost_in_marginal_decision","feedback":"The $40,000 is sunk. The relevant comparison is $18,000 in added benefit versus $12,000 in added cost."},
  {"id":9013,"sourceGame":"marketGate","q":"A new safety rule reduces accident risk but also forces firms to cut output because compliance uses scarce labor and equipment. What core idea is most directly involved?","options":["Policy choices involve tradeoffs even when the goal is worthwhile","Government rules eliminate opportunity cost","Scarcity applies only to consumers","Efficiency and equality always move in the same direction"],"a":0,"tag":"tradeoffs","type":"synthesis","objective":"LO1.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"policy_tradeoff_analysis","secondarySkills":["scarcity","opportunity_cost"],"repairSkill":"tradeoff_identification","commonError":"ignores_tradeoffs_when_policy_goal_is_good","feedback":"Even worthwhile policies use scarce resources and create tradeoffs."},
  {"id":9014,"sourceGame":"marketGate","q":"A PPF is straight rather than bowed out. What does that imply about opportunity cost?","options":["Opportunity cost is constant because resources shift between goods at a constant rate","Opportunity cost is increasing because all PPFs are bowed outward","Opportunity cost is zero because production is efficient","Opportunity cost is impossible to calculate from a PPF"],"a":0,"tag":"ppf","type":"trap","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"constant_vs_increasing_opportunity_cost","secondarySkills":["ppf_shape"],"repairSkill":"ppf_opportunity_cost","commonError":"assumes_all_ppfs_show_increasing_opportunity_cost","feedback":"A straight-line PPF represents constant opportunity cost."},

  {"id":9020,"sourceGame":"marketGate","q":"A drought destroys part of the orange crop at the same time a health report increases consumer interest in orange juice. Which conclusion is strongest without exact curve sizes?","options":["Equilibrium quantity is ambiguous, while equilibrium price rises","Equilibrium price is ambiguous, while equilibrium quantity rises","Both equilibrium price and quantity must fall","Both equilibrium price and quantity must stay unchanged"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":[],"repairSkill":"simultaneous_shifts","commonError":"legendary_near_match_error","feedback":"A supply decrease raises price and lowers quantity; a demand increase raises both price and quantity. Price rises, quantity is ambiguous."},
  {"id":9021,"sourceGame":"marketGate","q":"Demand for laptops rises while a chip shortage reduces supply. Without knowing curve sizes, what can be said with confidence?","options":["Equilibrium price rises, while equilibrium quantity is ambiguous","Equilibrium quantity rises, while equilibrium price is ambiguous","Both price and quantity must fall","Both price and quantity must rise"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_increase","supply_decrease"],"repairSkill":"simultaneous_shifts","commonError":"forces_quantity_direction_without_curve_size","feedback":"Demand rising pushes price up and quantity up; supply falling pushes price up and quantity down. Price rises, quantity is ambiguous."},
  {"id":9022,"sourceGame":"marketGate","q":"Demand for restaurant meals falls while lower food costs increase supply. Without exact curve sizes, what is the strongest conclusion?","options":["Equilibrium price falls, while equilibrium quantity is ambiguous","Equilibrium quantity falls, while equilibrium price is ambiguous","Both price and quantity must rise","Both price and quantity must fall"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_decrease","supply_increase"],"repairSkill":"simultaneous_shifts","commonError":"assumes_quantity_must_follow_demand_shift_only","feedback":"Demand falling lowers price and quantity; supply rising lowers price and raises quantity. Price falls, quantity is ambiguous."},
  {"id":9023,"sourceGame":"marketGate","q":"The price of tablets falls, and consumers buy more tablets. No non-price determinant changed. What happened?","options":["Quantity demanded increased through movement along the demand curve","Demand increased and the curve shifted right","Supply increased and the curve shifted right","Demand decreased because price fell"],"a":0,"tag":"demand","type":"trap","objective":"LO4.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"movement_vs_shift","secondarySkills":["law_of_demand"],"repairSkill":"movement_vs_shift","commonError":"calls_price_change_a_demand_shift","feedback":"A change in the good's own price causes movement along demand, not a demand shift."},
  {"id":9024,"sourceGame":"marketGate","q":"The price of a substitute for coffee rises. What happens in the coffee market, holding other factors constant?","options":["Demand for coffee increases, raising equilibrium price and quantity","Quantity demanded of coffee decreases along the same curve","Supply of coffee increases because coffee is now profitable","Demand for coffee decreases because substitutes are now expensive"],"a":0,"tag":"demand","type":"interpretation","objective":"LO4.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"related_goods_demand_shift","secondarySkills":["substitutes","equilibrium_effects"],"repairSkill":"demand_shifters","commonError":"confuses_substitutes_with_complements","feedback":"When a substitute becomes more expensive, demand for the original good rises."},
  {"id":9025,"sourceGame":"marketGate","q":"The price of peanut butter falls. What happens to the demand for jelly, assuming they are complements?","options":["Demand for jelly increases","Quantity demanded of jelly falls along the same curve","Supply of jelly decreases","Demand for jelly decreases because peanut butter is cheaper"],"a":0,"tag":"demand","type":"trap","objective":"LO4.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"complement_demand_shift","secondarySkills":["related_goods","demand_shifters"],"repairSkill":"demand_shifters","commonError":"moves_along_jelly_demand_when_related_good_price_changes","feedback":"A lower price for a complement increases demand for the related good."},
  {"id":9026,"sourceGame":"marketGate","q":"Input costs rise for producers of bicycles. At the same time, consumer income rises and bicycles are a normal good. What is the clearest prediction?","options":["Equilibrium price rises, while equilibrium quantity is ambiguous","Equilibrium quantity rises, while price is ambiguous","Both price and quantity must fall","Price must fall because income rose"],"a":0,"tag":"equilibrium","type":"synthesis","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["supply_decrease","demand_increase","normal_good"],"repairSkill":"simultaneous_shifts","commonError":"tracks_only_one_curve_shift","feedback":"Higher input costs decrease supply, while higher income increases demand. Both push price up; quantity is ambiguous."},
  {"id":9027,"sourceGame":"marketGate","q":"A technological improvement reduces production costs while consumer tastes shift away from the good. What is the strongest prediction?","options":["Equilibrium price falls, while equilibrium quantity is ambiguous","Equilibrium quantity falls, while price is ambiguous","Both price and quantity must rise","Price must rise because technology improved"],"a":0,"tag":"equilibrium","type":"synthesis","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["supply_increase","demand_decrease"],"repairSkill":"simultaneous_shifts","commonError":"assumes_technology_always_raises_price","feedback":"Supply increase lowers price; demand decrease also lowers price. Quantity is ambiguous because the shifts push quantity in opposite directions."},
  {"id":9028,"sourceGame":"marketGate","q":"A market price is above equilibrium. What pressure does the market create and why?","options":["Downward pressure on price because quantity supplied exceeds quantity demanded","Upward pressure on price because quantity demanded exceeds quantity supplied","No pressure because high prices clear every market","Downward pressure on quantity demanded because demand shifts left"],"a":0,"tag":"equilibrium","type":"interpretation","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"surplus_market_adjustment","secondarySkills":["quantity_supplied","quantity_demanded"],"repairSkill":"surplus_shortage_adjustment","commonError":"confuses_surplus_with_shortage","feedback":"A price above equilibrium creates a surplus, so sellers have an incentive to lower price."},
  {"id":9029,"sourceGame":"marketGate","q":"A market price is below equilibrium. What pressure does the market create and why?","options":["Upward pressure on price because quantity demanded exceeds quantity supplied","Downward pressure on price because quantity supplied exceeds quantity demanded","No pressure because buyers prefer low prices","A supply increase because the legal price is low"],"a":0,"tag":"equilibrium","type":"interpretation","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"shortage_market_adjustment","secondarySkills":["quantity_demanded","quantity_supplied"],"repairSkill":"surplus_shortage_adjustment","commonError":"confuses_shortage_with_surplus","feedback":"A price below equilibrium creates a shortage, so buyers compete and push price upward."},
  {"id":9030,"sourceGame":"marketGate","q":"A coffee shop sees more customers after a celebrity endorsement. At the same time, wages for baristas rise. What outcome is certain if both effects are strong but unknown in size?","options":["Price rises; quantity is ambiguous","Quantity rises; price is ambiguous","Both price and quantity fall","Price falls; quantity rises"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_increase","supply_decrease","input_costs"],"repairSkill":"simultaneous_shifts","commonError":"assumes_popularity_always_raises_quantity","feedback":"Demand increases and supply decreases. Both raise price, but quantity depends on which shift is larger."},
  {"id":9031,"sourceGame":"marketGate","q":"A new production method makes shoes cheaper to produce. At the same time, a fashion shift makes shoes less popular. What is certain?","options":["Price falls; quantity is ambiguous","Quantity falls; price is ambiguous","Both price and quantity rise","Price rises; quantity falls"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["supply_increase","demand_decrease"],"repairSkill":"simultaneous_shifts","commonError":"assumes_less_popularity_always_lowers_quantity_and_price_only","feedback":"Supply increases and demand decreases. Both lower price, but quantity is ambiguous."},
  {"id":9032,"sourceGame":"marketGate","q":"A hurricane destroys supply while households expect prices to rise tomorrow and rush to buy today. What is the strongest prediction for today's market?","options":["Price rises; quantity is ambiguous","Quantity rises; price is ambiguous","Both price and quantity fall","Price falls; quantity rises"],"a":0,"tag":"equilibrium","type":"synthesis","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"expectations_and_supply_shock","secondarySkills":["demand_increase","supply_decrease"],"repairSkill":"simultaneous_shifts","commonError":"ignores_expectations_as_demand_shifter","feedback":"Expected future price increases raise current demand, while the hurricane lowers supply. Price rises; quantity is ambiguous."},
  {"id":9033,"sourceGame":"marketGate","q":"A student says, 'Demand increased because the price rose.' What is the correct response?","options":["That reverses the logic; a demand increase can raise price, but a price rise alone causes movement along demand","That is correct because demand always means the current price","That describes a supply increase","That proves the good is inferior"],"a":0,"tag":"demand","type":"trap","objective":"LO4.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"movement_vs_shift","secondarySkills":["causal_reasoning"],"repairSkill":"movement_vs_shift","commonError":"uses_price_change_as_evidence_of_demand_shift_without_shifter","feedback":"A price rise can be caused by a demand increase, but the price rise itself does not shift demand."},
  {"id":9034,"sourceGame":"marketGate","q":"Both supply and demand decrease. Without curve sizes, what is the strongest conclusion?","options":["Equilibrium quantity falls, while equilibrium price is ambiguous","Equilibrium price falls, while quantity is ambiguous","Both price and quantity must rise","Both price and quantity must stay constant"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_decrease","supply_decrease"],"repairSkill":"simultaneous_shifts","commonError":"forces_price_direction_without_curve_size","feedback":"Both shifts reduce quantity. Demand decrease lowers price, while supply decrease raises price, so price is ambiguous."},

  {"id":9040,"sourceGame":"marketGate","q":"A city caps rent below equilibrium. The advertised rent falls, but apartment searches become longer, maintenance falls, and landlords screen tenants harder. What is the best economic diagnosis?","options":["The ceiling lowers the posted price but creates shortage and nonmoney rationing","The ceiling lowers the posted price and therefore eliminates scarcity","The ceiling raises quantity supplied and creates seller competition","The ceiling is nonbinding because landlords still choose tenant quality"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"ceiling_unintended_consequences","secondarySkills":[],"repairSkill":"ceiling_unintended_consequences","commonError":"legendary_near_match_error","feedback":"The posted money price is only part of the cost. Binding ceilings create shortage and hidden rationing costs."},
  {"id":9041,"sourceGame":"marketGate","q":"A minimum wage is set above the equilibrium wage. Some workers receive higher pay, firms hire fewer workers, and more workers seek jobs. What is the cleanest interpretation?","options":["The floor helps some employed workers but creates a labor surplus","The floor helps all workers because everyone now earns the legal wage","The floor raises labor demand because the wage is higher","The floor is nonbinding because firms still hire some workers"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO6.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"minimum_wage_tradeoff","secondarySkills":[],"repairSkill":"minimum_wage_tradeoff","commonError":"legendary_near_match_error","feedback":"A binding wage floor creates winners among some employed workers and losers among workers unable to find jobs."},
  {"id":9042,"sourceGame":"marketGate","q":"A rent ceiling is set below equilibrium. After one year, renters with apartments pay less, but new renters struggle to find units. What is the best welfare-style interpretation?","options":["The policy transfers some surplus to lucky renters but creates shortage and misallocation","The policy increases total surplus because rent is lower","The policy creates a surplus of apartments","The policy is nonbinding because some tenants still rent units"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"ceiling_distribution_tradeoff","secondarySkills":["shortage","misallocation"],"repairSkill":"ceiling_unintended_consequences","commonError":"judges_policy_only_by_lower_price_for_some_buyers","feedback":"A binding ceiling can help some buyers while creating shortages and misallocation for others."},

  {"id":9048,"sourceGame":"marketGate","q":"A binding price ceiling on gasoline leads stations to sell out early. Some stations favor regular customers. What is the best interpretation?","options":["The shortage creates nonprice rationing","The market clears because the legal price is low","The ceiling creates a surplus","The ceiling increases supply"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"nonprice_rationing","secondarySkills":["shortage","incentives"],"repairSkill":"ceiling_unintended_consequences","commonError":"thinks_low_legal_price_solves_scarcity","feedback":"When price cannot ration the good, other methods like waiting, favoritism, and side payments can take over."},
  {"id":9049,"sourceGame":"marketGate","q":"A binding price floor on milk leaves producers with unsold inventory. Which hidden cost is most likely?","options":["Waste, storage costs, or government purchases to support the price","Long lines among buyers because quantity demanded exceeds quantity supplied","Black-market premiums from buyers competing for scarce milk","No cost because producers receive a higher legal price"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO6.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"floor_unintended_consequences","secondarySkills":["surplus","producer_incentives"],"repairSkill":"minimum_wage_tradeoff","commonError":"ignores_costs_of_surplus","feedback":"A binding floor creates a surplus, which can lead to waste, storage costs, or policy costs."},
  {"id":9050,"sourceGame":"marketGate","q":"A rent ceiling causes landlords to convert apartments into short-term rentals outside the regulated market. What does this show?","options":["A policy can change incentives and reduce quantity supplied in the regulated market","A ceiling always increases quantity supplied","A ceiling eliminates opportunity cost for landlords","A ceiling is nonbinding if landlords find loopholes"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"ceiling_supply_response","secondarySkills":["incentives","unintended_consequences"],"repairSkill":"ceiling_unintended_consequences","commonError":"assumes_legal_price_change_does_not_affect_supplier_behavior","feedback":"A binding ceiling lowers returns in the regulated market and can push suppliers to adjust around the policy."},
  {"id":9051,"sourceGame":"marketGate","q":"A wage floor raises pay for workers who keep jobs but reduces entry-level openings. Which economic idea best frames the policy debate?","options":["An efficiency-equity tradeoff","A movement along the PPF with no opportunity cost","A nonbinding ceiling","A fixed CPI basket"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO1.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"efficiency_equity_tradeoff","secondarySkills":["minimum_wage","labor_surplus"],"repairSkill":"policy_tradeoff_analysis","commonError":"analyzes_only_winners_or_only_losers","feedback":"The policy can improve outcomes for some workers while reducing efficiency or job access for others."},
  {"id":9052,"sourceGame":"marketGate","q":"A city wants affordable housing and proposes a rent ceiling below equilibrium. Which economist response is positive rather than normative?","options":["The ceiling will likely create a shortage if set below equilibrium","The city should accept shortages to help poorer renters","The policy is morally required","Housing is too important to leave to markets"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_distinction","secondarySkills":["price_ceiling"],"repairSkill":"positive_normative_distinction","commonError":"confuses_policy_analysis_with_policy_preference","feedback":"Predicting a shortage from a binding ceiling is a testable positive claim."},
  {"id":9053,"sourceGame":"marketGate","q":"A minimum wage is set above equilibrium, but employment does not fall much. Which explanation best fits supply and demand logic?","options":["Labor demand may be relatively inelastic over that range","The law of demand has been disproven","The wage floor must be below equilibrium","Higher wages always increase quantity demanded for labor"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO6.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"labor_demand_elasticity_interpretation","secondarySkills":["minimum_wage","quantity_demanded"],"repairSkill":"minimum_wage_tradeoff","commonError":"expects_large_quantity_change_from_every_price_change","feedback":"If labor demand is relatively inelastic, employment may fall only modestly when wages rise."},
