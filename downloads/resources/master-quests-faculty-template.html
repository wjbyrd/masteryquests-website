  { id: 2000, q: "Checkpoint 1 opens the first gate: 'Every choice has a shadow.' What is opportunity cost?", options: ["The value of the next best alternative given up", "Only the money price paid", "The total amount spent on all choices", "The legal maximum price"], a: 0, tag: "opportunity_cost", type: "definition", objective: "LO1.2", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "opportunity_cost_definition", secondarySkills: ["tradeoff_identification"], repairSkill: "opportunity_cost_definition", commonError: "treats_opportunity_cost_as_only_money_cost", feedback: "Opportunity cost is the value of the next best alternative given up." },
  { id: 2001, q: "Checkpoint 1 offers two paths: earn $90 working or attend a free review session. If the student attends the review, what is part of the opportunity cost?", options: ["The $90 in forgone wages", "Nothing because the session is free", "Only the time spent walking there", "The equilibrium price of tutoring"], a: 0, tag: "opportunity_cost", type: "interpretation", objective: "LO1.2", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "opportunity_cost_identification", secondarySkills: ["opportunity_cost_definition"], repairSkill: "opportunity_cost_definition", commonError: "ignores_forgone_alternative", feedback: "A free activity can still have an opportunity cost if it means giving up another valuable option." },
  { id: 2002, q: "Checkpoint 1 gives three choices: work for $80, study for a test worth $60, or attend a free concert. If the student chooses the concert, what is the opportunity cost?", options: ["$80", "$140", "$60", "$0 because the concert is free"], a: 0, tag: "opportunity_cost", type: "trap", objective: "LO1.2", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "next_best_alternative", secondarySkills: ["opportunity_cost_definition"], repairSkill: "opportunity_cost_definition", commonError: "adds_all_forgone_options_instead_of_next_best", feedback: "Opportunity cost is the value of the next best alternative, not every alternative added together. The next best option is the $80 shift." },

  // --- MARGINAL REASONING ---
  { id: 2003, q: "Checkpoint 1 says: 'Do not ask what was already spent. Ask what changes next.' What principle is he using?", options: ["Marginal reasoning", "Tax incidence", "A price ceiling", "Circular flow"], a: 0, tag: "marginal", type: "definition", objective: "LO1.3", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "marginal_reasoning_identification", secondarySkills: ["marginal_benefit_cost_rule"], repairSkill: "marginal_benefit_cost_decision", commonError: "focuses_on_total_or_sunk_cost_instead_of_extra_cost", feedback: "Marginal reasoning compares the extra benefit and extra cost of the next action." },
  { id: 2004, q: "A trader gains 30 tokens from one more deal, but the deal costs 18 tokens to complete. What should the trader do?", options: ["Take the deal because marginal benefit exceeds marginal cost", "Reject the deal because any cost is bad", "Take the deal only if there is no opportunity cost", "Reject the deal because total cost matters most"], a: 0, tag: "marginal", type: "interpretation", objective: "LO1.3", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "marginal_benefit_cost_decision", secondarySkills: ["basic_net_benefit"], repairSkill: "marginal_benefit_cost_decision", commonError: "gets_mb_mc_rule_backwards", feedback: "The marginal benefit is 30 and the marginal cost is 18, so the net gain is positive." },
  { id: 2005, q: "A vendor already spent 100 tokens setting up a stall. Staying open one more hour costs 12 tokens and brings in 20 tokens. What should matter now?", options: ["The extra 12-token cost and extra 20-token benefit", "The full 112 tokens spent", "Only the original 100-token setup cost", "Only whether the stall looks impressive"], a: 0, tag: "marginal", type: "trap", objective: "LO1.3", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "sunk_cost_avoidance", secondarySkills: ["marginal_benefit_cost_decision"], repairSkill: "marginal_benefit_cost_decision", commonError: "includes_sunk_cost_in_marginal_decision", feedback: "The setup cost is sunk. The current decision compares the extra cost and extra benefit of staying open." },

  // --- INCENTIVES ---
  { id: 2006, q: "Checkpoint 1 warns: 'A reward changes the route.' What is an incentive?", options: ["Something that induces people to act", "A legal minimum price", "A point outside the PPF", "A tax paid only by sellers"], a: 0, tag: "incentives", type: "definition", objective: "LO1.4", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "incentive_definition", secondarySkills: ["behavior_response_to_incentives"], repairSkill: "incentive_definition", commonError: "confuses_incentive_with_policy_result", feedback: "An incentive is a reward or punishment that affects behavior." },
  { id: 2007, q: "A toll is added to a crowded bridge, and some drivers switch routes. What principle does this show?", options: ["People respond to incentives", "Scarcity has disappeared", "The PPF shifted outward", "A price floor created a surplus"], a: 0, tag: "incentives", type: "interpretation", objective: "LO1.4", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "behavior_response_to_incentives", secondarySkills: ["opportunity_cost_identification"], repairSkill: "incentive_definition", commonError: "misses_cost_as_incentive", feedback: "The toll raises the cost of using the bridge, so drivers have an incentive to change behavior." },
  { id: 2008, q: "A speed bonus makes workers finish faster, but quality falls. What is the Checkpoint 1 testing?", options: ["Incentives can create unintended consequences", "Trade eliminates opportunity cost", "A point outside the PPF is efficient", "A price ceiling creates a surplus"], a: 0, tag: "incentives", type: "trap", objective: "LO1.4", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "incentives_unintended_consequences", secondarySkills: ["behavior_response_to_incentives"], repairSkill: "incentive_definition", commonError: "assumes_incentives_only_create_intended_results", feedback: "People respond to incentives, but they may respond in ways that improve the metric while hurting the real goal." },

  // --- PPF ---
  { id: 2009, q: "Checkpoint 1 points to the frontier: 'This curve shows what can be made with what you have.' What does a PPF show?", options: ["The combinations of two goods an economy can produce with current resources and technology", "The legal maximum price in a market", "The amount of tax paid by buyers", "The demand curve for one product"], a: 0, tag: "ppf", type: "definition", objective: "LO2.2", difficulty: "easyBoss", conceptCluster: "economic_models", primarySkill: "ppf_definition", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_definition", commonError: "confuses_ppf_with_market_curve", feedback: "A PPF shows possible production combinations given current resources and technology." },
  { id: 2010, q: "Checkpoint 1 points inside the PPF: 'Possible, but sloppy.' What does a point inside the PPF mean?", options: ["Attainable but inefficient", "Unattainable", "Efficient", "A binding price ceiling"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "easyBoss", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_status", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_efficiency_status", commonError: "confuses_inside_ppf_with_unattainable", feedback: "A point inside the PPF is attainable, but resources are not being used efficiently." },
  { id: 2011, q: "A PPF move gives up 12 units of Good Y to gain 4 units of Good X. What is the opportunity cost per Good X?", options: ["3 units of Good Y", "4 units of Good Y", "12 units of Good Y", "48 units of Good Y"], a: 0, tag: "ppf", type: "trap", objective: "LO2.2", difficulty: "easyBoss", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost", secondarySkills: ["opportunity_cost_calculation"], repairSkill: "ppf_opportunity_cost", commonError: "divides_gain_by_loss_instead_of_loss_by_gain", feedback: "Opportunity cost per Good X is what is given up divided by what is gained: 12 / 4 = 3." },

  // --- POSITIVE / NORMATIVE ---
  { id: 2012, q: "Checkpoint 1 asks: 'What is a positive statement?'", options: ["A testable claim about how the world is", "A claim about how the world should be", "A statement that is always morally good", "A policy recommendation"], a: 0, tag: "positive_normative", type: "definition", objective: "LO2.4", difficulty: "easyBoss", conceptCluster: "economic_thinking", primarySkill: "positive_statement_definition", secondarySkills: ["positive_vs_normative"], repairSkill: "positive_vs_normative", commonError: "confuses_positive_with_good_or_approval", feedback: "A positive statement describes or predicts how the world is." },
  { id: 2013, q: "Checkpoint 1 gives this claim: 'A price ceiling below equilibrium creates a shortage.' What kind of statement is this?", options: ["Positive", "Normative", "A value judgment", "A policy recommendation"], a: 0, tag: "positive_normative", type: "interpretation", objective: "LO2.4", difficulty: "easyBoss", conceptCluster: "economic_thinking", primarySkill: "positive_vs_normative", secondarySkills: ["policy_statement_classification"], repairSkill: "positive_vs_normative", commonError: "assumes_policy_topic_means_normative", feedback: "This is positive because it is a testable cause-and-effect claim." },
  { id: 2014, q: "Checkpoint 1 gives two claims. Claim 1: 'Rent control reduces housing supply.' Claim 2: 'The city should use rent control anyway.' Which pairing is correct?", options: ["Claim 1 is positive; Claim 2 is normative", "Claim 1 is normative; Claim 2 is positive", "Both claims are positive", "Both claims are normative"], a: 0, tag: "positive_normative", type: "trap", objective: "LO2.4", difficulty: "easyBoss", conceptCluster: "economic_thinking", primarySkill: "positive_normative_pairing", secondarySkills: ["policy_statement_classification"], repairSkill: "positive_vs_normative", commonError: "treats_all_policy_claims_as_normative", feedback: "The first claim is testable. The second claim recommends what should happen, so it is normative." },

  // --- MARKET FAILURE ---
  { id: 2015, q: "Checkpoint 1 says: 'Markets are powerful, not perfect.' What is market failure?", options: ["A situation where the market fails to allocate resources efficiently", "Any situation where prices change", "Any voluntary trade between buyers and sellers", "A point on the PPF"], a: 0, tag: "market_failure", type: "definition", objective: "LO1.6", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "market_failure_definition", secondarySkills: ["market_failure_types"], repairSkill: "market_failure_types", commonError: "thinks_any_bad_outcome_is_market_failure", feedback: "Market failure occurs when the market does not allocate resources efficiently." },
  { id: 2016, q: "A factory pollutes a river used by nearby residents. What kind of market failure is this?", options: ["A negative externality", "A public good", "A price floor", "A positive statement"], a: 0, tag: "market_failure", type: "interpretation", objective: "LO1.6", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "externality_identification", secondarySkills: ["market_failure_types"], repairSkill: "market_failure_types", commonError: "confuses_externality_with_private_cost", feedback: "Pollution harms bystanders who are not part of the transaction, so it is a negative externality." },
  { id: 2017, q: "Checkpoint 1 gives the final trap: which case is not automatically a market failure?", options: ["A buyer voluntarily pays a high price for coffee", "A factory pollutes a river", "A seller has market power", "A public good is underprovided"], a: 0, tag: "market_failure", type: "trap", objective: "LO1.6", difficulty: "easyBoss", conceptCluster: "core_principles", primarySkill: "market_failure_identification", secondarySkills: ["market_failure_types"], repairSkill: "market_failure_types", commonError: "treats_high_price_as_market_failure_by_itself", feedback: "A high voluntary price is not automatically a market failure. Externalities, public goods, and market power are stronger market-failure cases." }
],
   
mediumBoss: [
  // --- COMPETITIVE MARKETS ---
  { id: 3000, q: "Checkpoint 2 opens the exchange floor: 'No single trader owns the price.' What defines a competitive market?", options: ["Many buyers and sellers with little individual influence over price", "One seller setting the market price", "A government agency assigning every trade", "A market where scarcity no longer exists"], a: 0, tag: "competitive_market", type: "definition", objective: "LO4.1", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "competitive_market_definition", secondarySkills: ["price_taker_definition"], repairSkill: "competitive_market_definition", commonError: "confuses_competitive_market_with_one_dominant_seller", feedback: "A competitive market has many buyers and sellers, so each participant has little control over the market price." },
  { id: 3001, q: "Checkpoint 2 points to a wheat farmer selling at the going market price. Why is the farmer a price taker?", options: ["The farmer's individual output is too small to control the market price", "The farmer legally sets the national wheat price", "The farmer faces no competitors", "The farmer can ignore supply and demand"], a: 0, tag: "competitive_market", type: "interpretation", objective: "LO4.1", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "price_taker_definition", secondarySkills: ["competitive_market_definition"], repairSkill: "competitive_market_definition", commonError: "confuses_price_taker_with_price_maker", feedback: "A price taker accepts the market price because no single seller has enough influence to set it." },
  { id: 3002, q: "Checkpoint 2 sets the trap: a market has many buyers but one seller with control over price. Is this a competitive market?", options: ["No, because one seller has market power", "Yes, because many buyers are enough", "Yes, because all markets are competitive", "No, because buyers never matter"], a: 0, tag: "competitive_market", type: "trap", objective: "LO4.1", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "competitive_market_definition", secondarySkills: ["market_power_definition"], repairSkill: "competitive_market_definition", commonError: "thinks_many_buyers_alone_make_market_competitive", feedback: "A competitive market requires many buyers and sellers, with no single participant controlling price." },

  // --- DEMAND ---
  { id: 3003, q: "Checkpoint 2 taps the demand schedule: 'Price changes the amount buyers choose.' What does the law of demand say?", options: ["As price falls, quantity demanded rises", "As price falls, demand shifts left", "As price rises, quantity demanded rises", "As supply rises, demand must rise"], a: 0, tag: "demand", type: "definition", objective: "LO4.2", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "law_of_demand", secondarySkills: ["movement_vs_demand_shift"], repairSkill: "law_of_demand", commonError: "confuses_quantity_demanded_with_demand_shift", feedback: "The law of demand says price and quantity demanded move in opposite directions." },
  { id: 3004, q: "The price of coffee falls, and buyers purchase more coffee. What is the most precise statement?", options: ["Quantity demanded increases", "Demand increases", "Supply decreases", "Demand shifts right"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "movement_vs_demand_shift", secondarySkills: ["law_of_demand"], repairSkill: "movement_vs_demand_shift", commonError: "treats_own_price_change_as_demand_shift", feedback: "A change in coffee's own price causes movement along the demand curve, so quantity demanded changes." },
  { id: 3005, q: "Checkpoint 2 sets the trap: consumer income rises and tablets are a normal good. What happens?", options: ["Demand for tablets increases", "Quantity demanded increases because tablet price changed", "Supply of tablets increases", "Demand for tablets decreases"], a: 0, tag: "demand", type: "trap", objective: "LO4.2", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "demand_shifters_income", secondarySkills: ["movement_vs_demand_shift"], repairSkill: "demand_shifters", commonError: "confuses_income_change_with_movement_along_demand", feedback: "Income is a demand shifter. For a normal good, higher income increases demand." },

  // --- SUPPLY ---
  { id: 3006, q: "Checkpoint 2 turns to the sellers: 'Higher prices pull more goods onto the floor.' What does the law of supply say?", options: ["As price rises, quantity supplied rises", "As price rises, supply shifts left", "As price falls, quantity supplied rises", "As demand rises, supply must rise"], a: 0, tag: "supply", type: "definition", objective: "LO4.3", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "law_of_supply", secondarySkills: ["movement_vs_supply_shift"], repairSkill: "law_of_supply", commonError: "confuses_supply_with_demand_direction", feedback: "The law of supply says price and quantity supplied move in the same direction." },
  { id: 3007, q: "The price of handmade tables rises, and sellers offer more tables for sale. What is the most precise statement?", options: ["Quantity supplied increases", "Supply increases", "Demand increases", "Supply shifts right"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "movement_vs_supply_shift", secondarySkills: ["law_of_supply"], repairSkill: "movement_vs_supply_shift", commonError: "treats_own_price_change_as_supply_shift", feedback: "A change in the good's own price causes movement along the supply curve, so quantity supplied changes." },
  { id: 3008, q: "Checkpoint 2 springs the supply trap: steel becomes more expensive for car producers. What happens in the car market?", options: ["Supply decreases", "Quantity supplied increases because car price changed", "Demand decreases", "Supply increases"], a: 0, tag: "supply", type: "trap", objective: "LO4.3", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "supply_shifters_input_costs", secondarySkills: ["movement_vs_supply_shift"], repairSkill: "supply_shifters", commonError: "gets_input_cost_effect_backwards", feedback: "Higher input costs make production more expensive, so supply decreases." },

  // --- EQUILIBRIUM ---
  { id: 3009, q: "Checkpoint 2 marks the crossing point: 'Here, neither side is pushing.' What is market equilibrium?", options: ["The point where quantity demanded equals quantity supplied", "The highest possible price buyers will pay", "The lowest possible quantity sellers will offer", "Any price set by government"], a: 0, tag: "equilibrium", type: "definition", objective: "LO4.4", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "equilibrium_definition", secondarySkills: ["surplus_shortage_identification"], repairSkill: "equilibrium_definition", commonError: "confuses_equilibrium_with_highest_price", feedback: "Market equilibrium occurs where quantity demanded equals quantity supplied." },
  { id: 3010, q: "Demand increases while supply stays the same. What happens to equilibrium price and quantity?", options: ["Price rises and quantity rises", "Price falls and quantity falls", "Price rises and quantity falls", "Price falls and quantity rises"], a: 0, tag: "equilibrium", type: "interpretation", objective: "LO4.4", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "demand_shift_equilibrium_prediction", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "gets_demand_increase_effect_backwards", feedback: "An increase in demand raises both equilibrium price and equilibrium quantity." },
  { id: 3011, q: "Checkpoint 2's trap: demand increases and supply decreases at the same time. What can be predicted with certainty?", options: ["Equilibrium price rises", "Equilibrium quantity rises", "Equilibrium quantity falls", "Equilibrium price falls"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["demand_increase_supply_decrease"], repairSkill: "equilibrium_prediction", commonError: "claims_quantity_change_is_certain_in_opposing_shifts", feedback: "Demand rising and supply falling both push price up, but quantity depends on which shift is stronger." },

  // --- SHORTAGES AND SURPLUSES ---
  { id: 3012, q: "Checkpoint 2 watches inventories pile up. What is a surplus?", options: ["A situation where quantity supplied exceeds quantity demanded", "A situation where quantity demanded exceeds quantity supplied", "A point outside the PPF", "A legal maximum price"], a: 0, tag: "surplus_shortage", type: "definition", objective: "LO4.4", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "surplus_identification", secondarySkills: ["equilibrium_definition"], repairSkill: "surplus_shortage_identification", commonError: "reverses_surplus_and_shortage", feedback: "A surplus exists when quantity supplied is greater than quantity demanded." },
  { id: 3013, q: "At the current price, buyers want 180 units and sellers offer 120 units. What exists, and what pressure follows?", options: ["A shortage; price tends to rise", "A surplus; price tends to fall", "A shortage; price tends to fall", "A surplus; price tends to rise"], a: 0, tag: "surplus_shortage", type: "interpretation", objective: "LO4.4", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "shortage_price_pressure", secondarySkills: ["surplus_shortage_calculation"], repairSkill: "surplus_shortage_identification", commonError: "reverses_shortage_and_price_pressure", feedback: "Quantity demanded exceeds quantity supplied, so there is a shortage. Shortages push price upward." },
  { id: 3014, q: "Checkpoint 2 sets the trap: price is above equilibrium. Which result is most likely in an unregulated market?", options: ["A surplus creates downward pressure on price", "A shortage creates upward pressure on price", "Demand must increase immediately", "Supply must disappear"], a: 0, tag: "surplus_shortage", type: "trap", objective: "LO4.4", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "surplus_price_pressure", secondarySkills: ["surplus_identification"], repairSkill: "surplus_shortage_identification", commonError: "gets_surplus_price_pressure_backwards", feedback: "A price above equilibrium creates a surplus, and sellers respond by lowering price." },

  // --- PRICE SIGNALS ---
  { id: 3015, q: "Checkpoint 2 says: 'Prices speak when no one gives orders.' What role do prices play in a market economy?", options: ["They signal scarcity and help allocate resources", "They eliminate scarcity completely", "They prevent all shortages forever", "They remove opportunity cost"], a: 0, tag: "price_signal", type: "definition", objective: "LO4.5", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "price_signal_allocation", secondarySkills: ["market_allocation_definition"], repairSkill: "price_signal_allocation", commonError: "thinks_prices_only_transfer_money", feedback: "Prices send signals to buyers and sellers about scarcity, value, and incentives." },
  { id: 3016, q: "A resource becomes scarce, and its price rises. How do buyers and sellers usually respond?", options: ["Buyers buy less while sellers try to supply more", "Buyers buy more while sellers supply less", "Both buyers and sellers ignore the signal", "Demand and supply both disappear"], a: 0, tag: "price_signal", type: "interpretation", objective: "LO4.5", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "buyer_seller_response_to_price_signal", secondarySkills: ["law_of_demand", "law_of_supply"], repairSkill: "price_signal_allocation", commonError: "confuses_buyer_response_with_seller_response", feedback: "Higher prices encourage buyers to conserve and sellers to produce more." },
  { id: 3017, q: "Checkpoint 2 gives the final trap: a high price by itself means the market has failed. What is wrong with that claim?", options: ["A high price can be a scarcity signal, not automatically a market failure", "High prices always prove demand disappeared", "High prices always mean a price ceiling is binding", "High prices eliminate the need for supply"], a: 0, tag: "price_signal", type: "trap", objective: "LO4.5", difficulty: "mediumBoss", conceptCluster: "supply_demand", primarySkill: "price_signal_interpretation", secondarySkills: ["market_failure_identification"], repairSkill: "price_signal_allocation", commonError: "treats_high_price_as_market_failure_by_itself", feedback: "A high price may simply signal scarcity and guide buyers and sellers. It is not automatically a market failure." }
],
   
finalBoss: [
{ id: 4000, q: "A city sets a price ceiling below equilibrium to make apartments affordable. The legal rent falls, but renters wait longer, landlords reduce maintenance, and some units are rented off-book. What is the strongest economic conclusion?", options: ["The posted price falls, but shortage shifts part of the cost into waiting, quality loss, and rationing", "The posted price falls, so the policy removes the main cost renters face in the market", "The posted price falls, but the shortage means sellers now compete harder for renters", "The posted price falls, so the market clears through a lower equilibrium rent"], a: 0, tag: "price_ceiling", type: "synthesis", objective: "LO6.1", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "ceiling_unintended_consequences", secondarySkills: ["shortage", "nonmoney_rationing", "misallocation"], repairSkill: "binding_price_ceiling", commonError: "focuses_only_on_lower_legal_price", feedback: "A binding ceiling can lower the posted price while creating shortage, search costs, lower quality, rationing, and misallocation." },
{ id: 4001, q: "A city sets a price ceiling below equilibrium to make apartments affordable. The legal rent falls, but renters wait longer, landlords reduce maintenance, and some units are rented off-book. What is the strongest economic conclusion?", options: ["The posted money price falls, but shortage creates nonmoney costs and misallocation", "The policy eliminates scarcity because rent is lower", "The policy creates a surplus because renters want fewer apartments", "The policy is nonbinding because people still pay with time"], a: 0, tag: "price_ceiling", type: "synthesis", objective: "LO6.1", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "ceiling_unintended_consequences", secondarySkills: ["shortage", "nonmoney_rationing", "misallocation"], repairSkill: "binding_price_ceiling", commonError: "focuses_only_on_lower_legal_price", feedback: "A binding ceiling can lower the posted price while creating shortage, search costs, lower quality, rationing, and misallocation." },
{ id: 4002, q: "A price ceiling is set at $40. The equilibrium price is $35. At $40, quantity supplied equals quantity demanded. What happens in the market?", options: ["The ceiling is nonbinding and the market remains at equilibrium", "The ceiling is binding and creates a shortage", "The ceiling is binding and creates a surplus", "The ceiling forces quantity supplied below quantity demanded"], a: 0, tag: "price_ceiling", type: "trap", objective: "LO6.1", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "nonbinding_price_ceiling", secondarySkills: ["binding_policy", "equilibrium"], repairSkill: "binding_price_ceiling", commonError: "thinks_all_price_ceilings_bind", feedback: "A ceiling only binds if it is below equilibrium. A ceiling above equilibrium does not change the market outcome." },
{ id: 4003, q: "The final checkpoint sets a minimum wage at $16 when the equilibrium wage is $12. At $16, firms demand 70,000 workers and 110,000 workers want jobs. What is the best diagnosis?", options: ["The floor is binding and creates a labor surplus of 40,000 workers", "The floor is binding and creates a labor shortage of 40,000 workers", "The floor is nonbinding because workers prefer higher wages", "The floor increases labor demand by 40,000 workers"], a: 0, tag: "price_floor", type: "multi-step", objective: "LO6.2", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "binding_floor_surplus_calculation", secondarySkills: ["minimum_wage", "labor_surplus", "unemployment"], repairSkill: "binding_price_floor", commonError: "confuses_labor_surplus_with_shortage", feedback: "A price floor above equilibrium is binding. Labor surplus equals quantity supplied minus quantity demanded, so 110,000 - 70,000 = 40,000 workers." },
{ id: 4004, q: "A minimum wage raises pay for workers who keep their jobs, but firms hire fewer workers and more workers seek jobs. Which statement gives the best economic interpretation?", options: ["The policy helps some employed workers, but it also creates a labor surplus among workers seeking jobs", "The policy helps workers as a group because the higher wage applies to anyone willing to work", "The policy helps firms attract more workers, so labor demand rises with the legal wage", "The policy leaves employment unchanged because only the legal wage has changed"], a: 0, tag: "price_floor", type: "synthesis", objective: "LO6.2", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "minimum_wage_tradeoff", secondarySkills: ["policy_tradeoff", "labor_surplus", "quantity_demanded_labor"], repairSkill: "binding_price_floor", commonError: "counts_only_workers_who_keep_jobs", feedback: "A binding minimum wage creates winners and losers. Some employed workers earn more, but firms hire fewer workers and a labor surplus appears." },
{ id: 4005, q: "A price floor is set at $18 when the equilibrium price is $22. What is the most likely result?", options: ["The floor is nonbinding and the market stays at equilibrium", "The floor is binding and creates a surplus", "The floor is binding and creates a shortage", "The floor lowers quantity supplied below quantity demanded"], a: 0, tag: "price_floor", type: "trap", objective: "LO6.2", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "nonbinding_price_floor", secondarySkills: ["binding_policy", "equilibrium"], repairSkill: "binding_price_floor", commonError: "thinks_all_price_floors_bind", feedback: "A floor only binds if it is above equilibrium. A floor below equilibrium does not change the market outcome." },
{ id: 4006, q: "A $6 tax is placed on a good. Before the tax, equilibrium price is $20 and quantity is 1,000. After the tax, buyers pay $24, sellers receive $18, and quantity falls to 850. What is the tax wedge?", options: ["$6", "$4", "$2", "$24"], a: 0, tag: "tax", type: "calculation", objective: "LO6.3", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "tax_wedge_calculation", secondarySkills: ["buyer_price", "seller_price", "tax_effects"], repairSkill: "tax_wedge_incidence", commonError: "uses_only_buyer_price_change", feedback: "The tax wedge is the difference between what buyers pay and sellers receive. $24 - $18 = $6." },
{ id: 4007, q: "A $6 tax is imposed. Before the tax, buyers paid $20. After the tax, buyers pay $24 and sellers receive $18. How much of the tax burden falls on buyers and sellers?", options: ["Buyers bear $4 and sellers bear $2", "Buyers bear $2 and sellers bear $4", "Buyers bear all $6 and sellers bear $0", "Buyers bear $24 and sellers bear $18"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "tax_burden_split_calculation", secondarySkills: ["tax_wedge", "buyer_burden", "seller_burden"], repairSkill: "tax_wedge_incidence", commonError: "confuses_price_paid_with_tax_burden", feedback: "Buyers now pay $4 more than before. Sellers receive $2 less than before. The $6 tax burden is split $4 on buyers and $2 on sellers." },
{ id: 4008, q: "A tax causes buyers to pay $24, sellers to receive $18, and quantity sold to fall from 1,000 to 850. What happens to the market size and government tax revenue?", options: ["Market size shrinks to 850 units, and tax revenue is $5,100", "Market size grows to 1,000 units, and tax revenue is $6,000", "Market size stays at 1,000 units, and tax revenue is $5,100", "Market size shrinks to 850 units, and tax revenue is $4,250"], a: 0, tag: "tax", type: "multi-step", objective: "LO6.3", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "tax_revenue_market_size", secondarySkills: ["tax_wedge", "quantity_after_tax", "tax_revenue"], repairSkill: "tax_wedge_incidence", commonError: "uses_pre_tax_quantity_for_revenue", feedback: "A tax shrinks the market. Revenue equals tax per unit times post-tax quantity: $6 x 850 = $5,100." },
{ id: 4009, q: "A $5 tax is legally placed on sellers. After the tax, buyers pay $3 more than before and sellers receive $2 less than before. What does this show?", options: ["The legal side pays the government, but buyers and sellers share the economic burden", "The legal side bears the full burden because sellers are the ones sending in the tax", "The buyer side avoids the burden because the law places the payment on sellers", "The seller side avoids the burden because buyers now pay a higher market price"], a: 0, tag: "tax_equivalence", type: "synthesis", objective: "LO6.4", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "legal_vs_economic_tax_burden", secondarySkills: ["tax_incidence", "seller_tax", "buyer_price"], repairSkill: "tax_equivalence", commonError: "confuses_legal_liability_with_economic_burden", feedback: "Legal assignment does not determine economic burden. Buyers and sellers share the tax through changes in prices." },
{ id: 4010, q: "A $5 tax is placed on buyers instead of sellers. Supply and demand conditions are unchanged. What should happen compared with an equal tax on sellers?", options: ["The same wedge, quantity reduction, and burden split occur", "Buyers bear all of the tax because they legally pay it", "Sellers bear all of the tax because they receive less", "The tax disappears because sellers are not legally charged"], a: 0, tag: "tax_equivalence", type: "trap", objective: "LO6.4", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_equivalence", secondarySkills: ["tax_wedge", "tax_incidence", "legal_assignment"], repairSkill: "tax_equivalence", commonError: "thinks_statutory_side_determines_burden", feedback: "A tax on buyers and an equal tax on sellers create the same wedge and the same economic outcome. The legal side does not control the burden." },
{ id: 4011, q: "Demand is much less elastic than supply. A tax is imposed on the good. Who bears more of the tax burden, and why?", options: ["Buyers bear more because they are less able to reduce quantity demanded", "Sellers bear more because supply is more elastic", "Buyers and sellers must split the burden equally", "Sellers bear more because buyers pay the tax through the market price"], a: 0, tag: "tax_incidence", type: "synthesis", objective: "LO6.5", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "elasticity_tax_incidence", secondarySkills: ["inelastic_demand", "burden_split"], repairSkill: "tax_wedge_incidence", commonError: "assigns_burden_to_more_elastic_side", feedback: "The less elastic side bears more of the tax because it is less able to change behavior in response to the tax." },
{ id: 4012, q: "Supply is much less elastic than demand. A tax is imposed. What is the likely result?", options: ["Sellers bear more of the burden because quantity supplied is less responsive", "Buyers bear more of the burden because demand is more elastic", "The burden must be equal because the tax wedge is fixed", "Buyers and sellers split the burden equally because the tax amount is fixed"], a: 0, tag: "tax_incidence", type: "trap", objective: "LO6.5", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "inelastic_supply_tax_burden", secondarySkills: ["elasticity", "tax_incidence"], repairSkill: "tax_wedge_incidence", commonError: "assigns_burden_to_more_elastic_side", feedback: "The less elastic side bears more of the tax. If supply is less elastic than demand, sellers bear more of the burden." },
{ id: 4013, q: "A binding price ceiling reduces the legal price from $100 to $70. At $70, buyers want 500 units and sellers offer 300 units. Which outcome is most likely?", options: ["A shortage of 200 units and rationing by waiting, favoritism, or side payments", "A surplus of 200 units and falling inventories", "No shortage because the legal price is lower", "A demand decrease because buyers dislike lower prices"], a: 0, tag: "price_ceiling", type: "multi-step", objective: "LO6.1", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_rationing", secondarySkills: ["shortage_calculation", "rationing_mechanisms"], repairSkill: "binding_price_ceiling", commonError: "ignores_nonprice_rationing", feedback: "At the ceiling, quantity demanded exceeds quantity supplied by 200 units. Because price cannot rise, the good must be rationed some other way." },
{ id: 4014, q: "A binding price floor raises the legal price from $30 to $45. At $45, sellers offer 900 units and buyers want 600 units. Which outcome is most likely?", options: ["A surplus of 300 units and extra effort by sellers to unload the good", "A shortage of 300 units and long lines for buyers", "No surplus because sellers prefer the higher price", "A demand increase because the higher price signals quality"], a: 0, tag: "price_floor", type: "multi-step", objective: "LO6.2", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "floor_surplus_rationing", secondarySkills: ["surplus_calculation", "seller_competition"], repairSkill: "binding_price_floor", commonError: "ignores_quantity_demanded_response", feedback: "At the floor, quantity supplied exceeds quantity demanded by 300 units. Sellers compete to find buyers, often through nonprice margins." },
{ id: 4015, q: "A policy lowers the legal price, creates a shortage, reduces product quality, and causes buyers to spend time searching. Which policy best matches this pattern?", options: ["A binding price ceiling", "A binding price floor", "A nonbinding price floor", "A seller tax with perfectly elastic demand"], a: 0, tag: "price_ceiling", type: "integration", objective: "LO6.1", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "identify_policy_from_outcomes", secondarySkills: ["shortage", "quality_decline", "search_costs"], repairSkill: "binding_price_ceiling", commonError: "misidentifies_shortage_policy", feedback: "Lower legal price plus shortage and search costs points to a binding price ceiling." },
{ id: 4016, q: "A policy raises the legal price, creates unsold output, and benefits some sellers while making buyers purchase less. Which policy best matches this pattern?", options: ["A binding price floor", "A binding price ceiling", "A nonbinding price ceiling", "A buyer tax that leaves quantity unchanged"], a: 0, tag: "price_floor", type: "integration", objective: "LO6.2", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "identify_floor_from_outcomes", secondarySkills: ["surplus", "quantity_demanded", "policy_tradeoff"], repairSkill: "binding_price_floor", commonError: "misidentifies_surplus_policy", feedback: "Higher legal price plus unsold output points to a binding price floor." },
{ id: 4017, q: "The final checkpoint compares two policies. Policy A is a binding price ceiling that creates a shortage. Policy B is a tax that creates a wedge between buyer price and seller price. What do both policies have in common?", options: ["Both can reduce the quantity traded below the unregulated market equilibrium", "Both can raise the posted price buyers pay above the original equilibrium price", "Both can create excess supply at the legal market price", "Both can leave the market efficient if the legal price is clearly stated"], a: 0, tag: "government_policy", type: "integration", objective: "LO6.3", difficulty: "finalBoss", conceptCluster: "government_policy", primarySkill: "policy_comparison_quantity_effects", secondarySkills: ["price_ceiling", "tax_wedge", "quantity_traded"], repairSkill: "government_policy_effects", commonError: "focuses_only_on_price_not_quantity", feedback: "Binding ceilings and taxes work differently, but both can reduce the quantity traded below the unregulated equilibrium." }
],
   
easy: [
  { id: 1, q: "What is scarcity?", options: ["Limited resources and unlimited wants", "Too many goods in a market", "A legal limit on price", "A market with no buyers"], a: 0, tag: "scarcity", type: "definition", objective: "LO1.1", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "scarcity_definition", secondarySkills: ["tradeoff_identification"], repairSkill: "scarcity_definition", commonError: "confuses_scarcity_with_shortage", feedback: "Scarcity means resources are limited while human wants are unlimited." },
  { id: 2, q: "A student can either study for an exam or work a shift, but not both. What does this illustrate?", options: ["A tradeoff", "A tax wedge", "A price ceiling", "A surplus"], a: 0, tag: "tradeoffs", type: "interpretation", objective: "LO1.1", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "tradeoff_identification", secondarySkills: ["scarcity_definition"], repairSkill: "tradeoff_identification", commonError: "confuses_tradeoff_with_money_cost", feedback: "A tradeoff exists because choosing one option means giving up another." },
  { id: 3, q: "Opportunity cost is best defined as:", options: ["The value of the next best alternative given up", "The total money spent on a choice", "The price sellers receive", "The amount of tax collected"], a: 0, tag: "opportunity_cost", type: "definition", objective: "LO1.2", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "opportunity_cost_definition", secondarySkills: ["tradeoff_identification"], repairSkill: "opportunity_cost_definition", commonError: "treats_opportunity_cost_as_only_money_cost", feedback: "Opportunity cost is the value of the next best alternative you give up." },
  { id: 4, q: "You attend a concert instead of working a shift that pays $75. What is part of your opportunity cost?", options: ["The $75 in forgone wages", "Only the price of the concert ticket", "Only the time spent driving", "The market equilibrium price"], a: 0, tag: "opportunity_cost", type: "interpretation", objective: "LO1.2", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "opportunity_cost_identification", secondarySkills: ["opportunity_cost_definition"], repairSkill: "opportunity_cost_definition", commonError: "ignores_forgone_alternative", feedback: "The wages you give up are part of the opportunity cost of attending the concert." },
  { id: 5, q: "A rational person takes an action when:", options: ["Marginal benefit is greater than marginal cost", "Total cost is always higher than total benefit", "There is no opportunity cost", "The action is popular"], a: 0, tag: "marginal", type: "definition", objective: "LO1.3", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "marginal_benefit_cost_rule", secondarySkills: ["marginal_reasoning_identification"], repairSkill: "marginal_benefit_cost_decision", commonError: "compares_total_values_instead_of_marginal_values", feedback: "Marginal reasoning compares the extra benefit to the extra cost." },
  { id: 6, q: "You buy one more study guide because the extra benefit exceeds the extra cost. What kind of reasoning is this?", options: ["Marginal reasoning", "Tax incidence", "Circular-flow reasoning", "Price ceiling analysis"], a: 0, tag: "marginal", type: "interpretation", objective: "LO1.3", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "marginal_reasoning_identification", secondarySkills: ["marginal_benefit_cost_rule"], repairSkill: "marginal_benefit_cost_decision", commonError: "misses_extra_or_one_more_language", feedback: "The phrase one more points to marginal reasoning." },
  { id: 7, q: "If the marginal benefit of an action is $30 and the marginal cost is $20, what should a rational person do?", options: ["Take the action", "Avoid the action", "Ignore the marginal benefit", "Choose only by total cost"], a: 0, tag: "marginal", type: "calculation", objective: "LO1.3", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "marginal_benefit_cost_decision", secondarySkills: ["basic_net_benefit"], repairSkill: "marginal_benefit_cost_decision", commonError: "gets_mb_mc_rule_backwards", feedback: "Because marginal benefit is greater than marginal cost, the action is worth taking." },
  { id: 8, q: "An incentive is:", options: ["Something that induces people to act", "A legal maximum price", "A point outside the PPF", "A market shortage"], a: 0, tag: "incentives", type: "definition", objective: "LO1.4", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "incentive_definition", secondarySkills: ["behavior_response_to_incentives"], repairSkill: "incentive_definition", commonError: "confuses_incentive_with_policy_result", feedback: "An incentive is a reward or punishment that changes behavior." },
  { id: 9, q: "Gas prices rise and more consumers buy fuel-efficient cars. What principle does this show?", options: ["People respond to incentives", "Trade eliminates scarcity", "Taxes are always paid by sellers", "Supply must shift left"], a: 0, tag: "incentives", type: "interpretation", objective: "LO1.4", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "behavior_response_to_incentives", secondarySkills: ["incentive_definition"], repairSkill: "incentive_definition", commonError: "misses_behavioral_response", feedback: "Higher gas prices create an incentive to change behavior." },
  { id: 10, q: "Trade can make people better off because:", options: ["People can specialize and exchange", "Everyone becomes self-sufficient", "Scarcity disappears", "Prices no longer matter"], a: 0, tag: "trade", type: "definition", objective: "LO1.5", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "gains_from_trade", secondarySkills: ["specialization"], repairSkill: "gains_from_trade", commonError: "thinks_trade_requires_one_side_to_lose", feedback: "Trade allows specialization and exchange, which can benefit both sides." },
  { id: 11, q: "A market economy usually allocates resources through:", options: ["Decisions of households and firms interacting in markets", "A single planner choosing every price", "Random assignment of goods", "Only government production"], a: 0, tag: "markets", type: "definition", objective: "LO1.6", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "market_allocation_definition", secondarySkills: ["price_signal_allocation"], repairSkill: "market_allocation_definition", commonError: "confuses_market_allocation_with_command_allocation", feedback: "Markets allocate resources through decentralized decisions by buyers and sellers." },
  { id: 12, q: "Pollution from a factory that harms nearby residents is an example of:", options: ["A negative externality", "A price floor", "A perfectly efficient market", "A positive statement"], a: 0, tag: "market_failure", type: "interpretation", objective: "LO1.6", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "externality_identification", secondarySkills: ["market_failure_types"], repairSkill: "market_failure_types", commonError: "confuses_externality_with_private_cost", feedback: "Pollution affects bystanders, so it is a negative externality." },
  { id: 13, q: "A public good is usually:", options: ["Hard to exclude people from and shared by many users", "Always sold by one monopoly firm", "A legal maximum price", "A substitute for every other good"], a: 0, tag: "market_failure", type: "definition", objective: "LO1.6", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "public_good_definition", secondarySkills: ["market_failure_types"], repairSkill: "market_failure_types", commonError: "confuses_public_good_with_government_provided_good", feedback: "Public goods are generally nonexcludable and nonrival." },
  { id: 14, q: "A seller with substantial influence over the market price has:", options: ["Market power", "A price ceiling", "A PPF", "A circular flow"], a: 0, tag: "market_failure", type: "definition", objective: "LO1.6", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "market_power_definition", secondarySkills: ["market_failure_types"], repairSkill: "market_failure_types", commonError: "confuses_market_power_with_high_demand", feedback: "Market power exists when a buyer or seller can influence price." },
  { id: 15, q: "Which situation is most likely a market failure?", options: ["A factory pollutes a river used by nearby households", "A buyer voluntarily purchases coffee", "A seller lowers price during a sale", "A student chooses to study"], a: 0, tag: "market_failure", type: "interpretation", objective: "LO1.6", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "market_failure_identification", secondarySkills: ["externality_identification"], repairSkill: "market_failure_types", commonError: "thinks_any_unwanted_outcome_is_market_failure", feedback: "Pollution that harms third parties is a market failure because the full cost is not reflected in the market." },
  { id: 16, q: "Efficiency means:", options: ["Society gets the most from its scarce resources", "Prosperity is distributed equally", "Every price is fixed by law", "Every firm earns the same profit"], a: 0, tag: "tradeoffs", type: "definition", objective: "LO1.1", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "efficiency_definition", secondarySkills: ["equality_vs_efficiency"], repairSkill: "efficiency_vs_equality", commonError: "confuses_efficiency_with_equality", feedback: "Efficiency means getting the most possible from scarce resources." },
  { id: 17, q: "Equality means:", options: ["Prosperity is distributed more uniformly among society's members", "Society gets the most output from resources", "Prices always rise", "Markets always fail"], a: 0, tag: "tradeoffs", type: "definition", objective: "LO1.1", difficulty: "easy", conceptCluster: "core_principles", primarySkill: "equality_definition", secondarySkills: ["equality_vs_efficiency"], repairSkill: "efficiency_vs_equality", commonError: "confuses_equality_with_efficiency", feedback: "Equality concerns how prosperity is distributed across society." },
  { id: 18, q: "Economists use models because models:", options: ["Simplify reality to help explain the world", "Include every detail of reality", "Eliminate the need for assumptions", "Replace all data"], a: 0, tag: "models", type: "definition", objective: "LO2.1", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "model_purpose", secondarySkills: ["assumptions_role"], repairSkill: "model_purpose", commonError: "thinks_models_must_include_every_detail", feedback: "Models simplify reality so economists can focus on the key relationships." },
  { id: 19, q: "In economics, assumptions are mainly used to:", options: ["Simplify analysis", "Hide facts from students", "Guarantee perfect predictions", "Replace all evidence"], a: 0, tag: "models", type: "definition", objective: "LO2.1", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "assumptions_role", secondarySkills: ["model_purpose"], repairSkill: "model_purpose", commonError: "thinks_assumptions_are_errors", feedback: "Assumptions simplify analysis by helping isolate important relationships." },
  { id: 20, q: "The circular-flow model shows how dollars, goods and services, and resources move between:", options: ["Households and firms", "Only banks and government", "Only buyers and foreign countries", "Only workers and taxes"], a: 0, tag: "circular_flow", type: "definition", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "circular_flow_components", secondarySkills: ["households_firms_roles"], repairSkill: "circular_flow_components", commonError: "confuses_circular_flow_with_ppf", feedback: "The circular-flow model shows flows between households and firms." },
  { id: 21, q: "In the simple circular-flow model, households usually supply:", options: ["Factors of production", "Finished goods and services", "Price ceilings", "Tax wedges"], a: 0, tag: "circular_flow", type: "interpretation", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "households_firms_roles", secondarySkills: ["circular_flow_components"], repairSkill: "circular_flow_components", commonError: "reverses_household_and_firm_roles", feedback: "Households supply factors of production such as labor, land, and capital." },
  { id: 22, q: "In the simple circular-flow model, firms usually supply:", options: ["Goods and services", "Only labor", "Only household income", "Only public goods"], a: 0, tag: "circular_flow", type: "interpretation", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "firms_role_circular_flow", secondarySkills: ["households_firms_roles"], repairSkill: "circular_flow_components", commonError: "reverses_firm_and_household_roles", feedback: "Firms produce and sell goods and services." },
  { id: 23, q: "A production possibilities frontier shows:", options: ["The combinations of two goods an economy can produce with current resources and technology", "The exact market price of a good", "Only government spending", "Only the unemployment rate"], a: 0, tag: "ppf", type: "definition", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "ppf_definition", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_definition", commonError: "confuses_ppf_with_market_supply_curve", feedback: "A PPF shows possible production combinations with current resources and technology." },
  { id: 24, q: "A point inside the PPF usually means:", options: ["Resources are not being used efficiently", "The point is unattainable", "The economy has no tradeoffs", "The economy is beyond its resources"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_status", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_efficiency_status", commonError: "confuses_inside_ppf_with_unattainable", feedback: "A point inside the PPF is attainable but inefficient." },
  { id: 25, q: "A point outside the PPF is:", options: ["Unattainable with current resources and technology", "Efficient but always chosen", "A price floor", "A market surplus"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "attainable_unattainable", secondarySkills: ["ppf_efficiency_status"], repairSkill: "ppf_efficiency_status", commonError: "confuses_outside_ppf_with_efficient", feedback: "A point outside the PPF cannot be reached with current resources and technology." },
  { id: 26, q: "Moving along a PPF usually means:", options: ["Producing more of one good and less of another", "Producing more of every good without cost", "Creating a tax wedge", "Changing only the price level"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "ppf_tradeoff", secondarySkills: ["opportunity_cost_definition"], repairSkill: "ppf_opportunity_cost", commonError: "misses_tradeoff_on_ppf", feedback: "Moving along the PPF shows a tradeoff between two goods." },
  { id: 27, q: "An outward shift of the PPF usually represents:", options: ["Economic growth", "A shortage", "A binding price ceiling", "A decrease in demand"], a: 0, tag: "ppf", type: "definition", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "ppf_growth", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_growth", commonError: "confuses_growth_with_movement_along_ppf", feedback: "An outward shift means the economy can produce more than before." },
  { id: 28, q: "If moving from point A to point B on a PPF gives up 6 units of corn to gain 3 units of wheat, the opportunity cost per wheat is:", options: ["2 units of corn", "3 units of corn", "6 units of corn", "18 units of corn"], a: 0, tag: "ppf", type: "calculation", objective: "LO2.2", difficulty: "easy", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost", secondarySkills: ["opportunity_cost_calculation"], repairSkill: "ppf_opportunity_cost", commonError: "divides_gain_by_loss_instead_of_loss_by_gain", feedback: "Opportunity cost per wheat is corn given up divided by wheat gained: 6 / 3 = 2." },
  { id: 29, q: "Microeconomics studies:", options: ["How individual households and firms make decisions", "Only economy-wide inflation", "Only national unemployment", "Only central bank policy"], a: 0, tag: "micro_macro", type: "definition", objective: "LO2.3", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "microeconomics_definition", secondarySkills: ["micro_vs_macro"], repairSkill: "micro_vs_macro", commonError: "confuses_micro_with_macro", feedback: "Microeconomics studies households, firms, and individual markets." },
  { id: 30, q: "Macroeconomics studies:", options: ["Economy-wide issues such as inflation, unemployment, and growth", "Only one firm's production plan", "Only one household's grocery choices", "Only one product's demand curve"], a: 0, tag: "micro_macro", type: "definition", objective: "LO2.3", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "macroeconomics_definition", secondarySkills: ["micro_vs_macro"], repairSkill: "micro_vs_macro", commonError: "confuses_macro_with_individual_market", feedback: "Macroeconomics studies economy-wide forces." },
  { id: 31, q: "Which question is most clearly microeconomic?", options: ["How many workers should a coffee shop hire?", "What causes national inflation?", "Why did national unemployment rise?", "How fast is GDP growing?"], a: 0, tag: "micro_macro", type: "interpretation", objective: "LO2.3", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "micro_vs_macro", secondarySkills: ["microeconomics_definition"], repairSkill: "micro_vs_macro", commonError: "misses_individual_firm_market_focus", feedback: "A single firm's hiring decision is microeconomic." },
  { id: 32, q: "A positive statement is:", options: ["A claim about how the world is", "A claim about how the world should be", "A statement that is always morally good", "A statement made only by policymakers"], a: 0, tag: "positive_normative", type: "definition", objective: "LO2.4", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "positive_statement_definition", secondarySkills: ["positive_vs_normative"], repairSkill: "positive_vs_normative", commonError: "confuses_positive_with_good_or_approval", feedback: "Positive statements describe or predict how the world is." },
  { id: 33, q: "A normative statement is:", options: ["A claim about how the world should be", "A testable claim about how the world is", "A demand schedule", "A supply curve"], a: 0, tag: "positive_normative", type: "definition", objective: "LO2.4", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "normative_statement_definition", secondarySkills: ["positive_vs_normative"], repairSkill: "positive_vs_normative", commonError: "confuses_normative_with_false", feedback: "Normative statements involve judgments about what should happen." },
  { id: 34, q: "Which statement is positive?", options: ["A rent ceiling below equilibrium will reduce available rental units.", "The city should make rent cheaper.", "Rent control is unfair.", "The best policy is always lower rent."], a: 0, tag: "positive_normative", type: "interpretation", objective: "LO2.4", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "positive_vs_normative", secondarySkills: ["policy_statement_classification"], repairSkill: "positive_vs_normative", commonError: "uses_policy_topic_to_assume_normative", feedback: "This is positive because it makes a testable claim about what the policy will do." },
  { id: 35, q: "When economists recommend what policy government should choose, they are acting mainly as:", options: ["Policy advisers", "Only data recorders", "Price takers", "Households"], a: 0, tag: "policy", type: "definition", objective: "LO2.5", difficulty: "easy", conceptCluster: "economic_thinking", primarySkill: "economist_policy_role", secondarySkills: ["positive_vs_normative"], repairSkill: "economist_roles", commonError: "confuses_scientist_role_with_policy_advisor_role", feedback: "When economists recommend policy, they are acting as policy advisers." },
  { id: 36, q: "A competitive market has:", options: ["Many buyers and sellers with little individual influence over price", "One seller who controls the price", "Only government buyers", "No price signals"], a: 0, tag: "competitive_market", type: "definition", objective: "LO4.1", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "competitive_market_definition", secondarySkills: ["price_taker_definition"], repairSkill: "competitive_market_definition", commonError: "confuses_competitive_market_with_one_dominant_seller", feedback: "A competitive market has many buyers and sellers, each with little control over price." },
  { id: 37, q: "A price taker is a buyer or seller who:", options: ["Accepts the market price as given", "Sets the market price alone", "Creates a legal maximum price", "Always avoids trade"], a: 0, tag: "competitive_market", type: "definition", objective: "LO4.1", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "price_taker_definition", secondarySkills: ["competitive_market_definition"], repairSkill: "competitive_market_definition", commonError: "confuses_price_taker_with_price_maker", feedback: "A price taker accepts the market price because no single buyer or seller controls it." },
  { id: 38, q: "The law of demand says that, other things equal:", options: ["As price falls, quantity demanded rises", "As price falls, demand always shifts left", "As price rises, supply shifts left", "As price rises, quantity demanded rises"], a: 0, tag: "demand", type: "definition", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "law_of_demand", secondarySkills: ["movement_vs_demand_shift"], repairSkill: "law_of_demand", commonError: "confuses_quantity_demanded_with_demand_shift", feedback: "The law of demand says price and quantity demanded move in opposite directions." },
  { id: 39, q: "When the price of a good falls, what happens to quantity demanded?", options: ["Quantity demanded increases", "Demand decreases", "Supply increases", "The demand curve shifts left"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "movement_vs_demand_shift", secondarySkills: ["law_of_demand"], repairSkill: "movement_vs_demand_shift", commonError: "treats_own_price_change_as_demand_shift", feedback: "A change in the good's own price causes movement along the demand curve." },
  { id: 40, q: "A change in which factor would shift the demand curve?", options: ["Consumer income", "The good's own price", "Movement along the curve", "Quantity supplied"], a: 0, tag: "demand", type: "definition", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "demand_shifters_income", secondarySkills: ["movement_vs_demand_shift"], repairSkill: "demand_shifters", commonError: "thinks_own_price_shifts_demand", feedback: "Income is a demand shifter. The good's own price changes quantity demanded." },
  { id: 41, q: "If income rises and tablets are a normal good, what happens to demand for tablets?", options: ["Demand increases", "Demand decreases", "Quantity demanded decreases because price changed", "Supply decreases"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "demand_shifters_income", secondarySkills: ["normal_good_income"], repairSkill: "demand_shifters", commonError: "confuses_income_change_with_movement_along_demand", feedback: "For a normal good, higher income increases demand." },
  { id: 42, q: "Two goods are substitutes when:", options: ["One good can be used in place of the other", "They must be used together", "One is always inferior", "Both are supplied by government"], a: 0, tag: "demand", type: "definition", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "substitute_good_definition", secondarySkills: ["demand_shifters_related_goods"], repairSkill: "related_goods_demand", commonError: "confuses_substitutes_with_complements", feedback: "Substitutes are goods that can replace one another." },
  { id: 43, q: "Two goods are complements when:", options: ["They are commonly used together", "They can always replace one another", "Both are price ceilings", "Neither has demand"], a: 0, tag: "demand", type: "definition", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "complement_good_definition", secondarySkills: ["demand_shifters_related_goods"], repairSkill: "related_goods_demand", commonError: "confuses_complements_with_substitutes", feedback: "Complements are goods used together." },
  { id: 44, q: "If the price of a substitute for iPhones falls, what happens to demand for iPhones?", options: ["Demand for iPhones decreases", "Demand for iPhones increases", "Supply of iPhones increases", "Quantity demanded of iPhones increases because iPhone price fell"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "demand_shifters_related_goods", secondarySkills: ["substitute_good_definition"], repairSkill: "related_goods_demand", commonError: "gets_substitute_price_effect_backwards", feedback: "If a substitute gets cheaper, buyers shift away from the original good." },
  { id: 45, q: "If the price of printer ink rises, what likely happens to demand for printers?", options: ["Demand for printers decreases", "Demand for printers increases", "Supply of printers increases", "Quantity supplied of printers increases"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "demand_shifters_related_goods", secondarySkills: ["complement_good_definition"], repairSkill: "related_goods_demand", commonError: "gets_complement_price_effect_backwards", feedback: "Printers and ink are complements, so higher ink prices reduce demand for printers." },
  { id: 46, q: "The law of supply says that, other things equal:", options: ["As price rises, quantity supplied rises", "As price rises, demand rises", "As price falls, quantity supplied rises", "As price falls, supply shifts right"], a: 0, tag: "supply", type: "definition", objective: "LO4.3", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "law_of_supply", secondarySkills: ["movement_vs_supply_shift"], repairSkill: "law_of_supply", commonError: "confuses_supply_with_demand_direction", feedback: "The law of supply says price and quantity supplied move in the same direction." },
  { id: 47, q: "If the price of a good rises, what happens to quantity supplied?", options: ["Quantity supplied increases", "Supply decreases", "Demand increases", "The supply curve shifts left"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "movement_vs_supply_shift", secondarySkills: ["law_of_supply"], repairSkill: "movement_vs_supply_shift", commonError: "treats_own_price_change_as_supply_shift", feedback: "A change in the good's own price causes movement along the supply curve." },
  { id: 48, q: "Which change would shift the supply curve?", options: ["A change in input costs", "A change in the good's own price", "A change in quantity demanded", "A movement along demand"], a: 0, tag: "supply", type: "definition", objective: "LO4.3", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "supply_shifters_input_costs", secondarySkills: ["movement_vs_supply_shift"], repairSkill: "supply_shifters", commonError: "thinks_own_price_shifts_supply", feedback: "Input costs shift supply. The good's own price changes quantity supplied." },
  { id: 49, q: "If the cost of steel rises for car producers, what happens to the supply of cars?", options: ["Supply decreases", "Supply increases", "Demand decreases", "Quantity demanded increases"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "supply_shifters_input_costs", secondarySkills: ["supply_shift_direction"], repairSkill: "supply_shifters", commonError: "gets_input_cost_effect_backwards", feedback: "Higher input costs make production more expensive, so supply decreases." },
  { id: 50, q: "An improvement in production technology usually causes:", options: ["Supply to increase", "Demand to decrease", "Quantity demanded to fall because price changed", "A binding price floor"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "supply_shifters_technology", secondarySkills: ["supply_shift_direction"], repairSkill: "supply_shifters", commonError: "misses_technology_as_supply_shifter", feedback: "Better technology makes production easier or cheaper, shifting supply right." },
  { id: 51, q: "Market equilibrium occurs where:", options: ["Quantity demanded equals quantity supplied", "Demand is always greater than supply", "Supply is always greater than demand", "Government fixes the price"], a: 0, tag: "equilibrium", type: "definition", objective: "LO4.4", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "equilibrium_definition", secondarySkills: ["surplus_shortage_identification"], repairSkill: "equilibrium_definition", commonError: "confuses_equilibrium_with_highest_price", feedback: "At equilibrium, quantity demanded equals quantity supplied." },
  { id: 52, q: "If the market price is above equilibrium, the market has:", options: ["A surplus", "A shortage", "A binding price ceiling", "No quantity supplied"], a: 0, tag: "surplus_shortage", type: "interpretation", objective: "LO4.4", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "surplus_identification", secondarySkills: ["equilibrium_definition"], repairSkill: "surplus_shortage_identification", commonError: "reverses_surplus_and_shortage", feedback: "A price above equilibrium creates a surplus because quantity supplied exceeds quantity demanded." },
  { id: 53, q: "If the market price is below equilibrium, the market has:", options: ["A shortage", "A surplus", "Excess supply", "No demand"], a: 0, tag: "surplus_shortage", type: "interpretation", objective: "LO4.4", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "shortage_identification", secondarySkills: ["equilibrium_definition"], repairSkill: "surplus_shortage_identification", commonError: "reverses_surplus_and_shortage", feedback: "A price below equilibrium creates a shortage because quantity demanded exceeds quantity supplied." },
  { id: 54, q: "If demand increases and supply does not change, what happens to equilibrium price?", options: ["It increases", "It decreases", "It must stay the same", "It becomes illegal"], a: 0, tag: "equilibrium", type: "interpretation", objective: "LO4.4", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "demand_shift_equilibrium_price", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "gets_demand_shift_price_effect_backwards", feedback: "An increase in demand raises equilibrium price when supply is unchanged." },
  { id: 55, q: "If supply increases and demand does not change, what happens to equilibrium price?", options: ["It decreases", "It increases", "It must become a price ceiling", "It disappears"], a: 0, tag: "equilibrium", type: "interpretation", objective: "LO4.4", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "supply_shift_equilibrium_price", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "gets_supply_shift_price_effect_backwards", feedback: "An increase in supply lowers equilibrium price when demand is unchanged." },
  { id: 56, q: "Prices help allocate scarce resources by:", options: ["Sending signals to buyers and sellers", "Eliminating scarcity", "Preventing all shortages forever", "Making opportunity cost disappear"], a: 0, tag: "price_signal", type: "definition", objective: "LO4.5", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "price_signal_allocation", secondarySkills: ["market_allocation_definition"], repairSkill: "price_signal_allocation", commonError: "thinks_prices_only_transfer_money", feedback: "Prices send signals that help buyers and sellers adjust behavior." },
  { id: 57, q: "When a good becomes scarce and its price rises, buyers are encouraged to:", options: ["Buy less or look for substitutes", "Demand more because price is higher", "Ignore the price signal", "Shift supply left"], a: 0, tag: "price_signal", type: "interpretation", objective: "LO4.5", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "buyer_response_to_price_signal", secondarySkills: ["law_of_demand"], repairSkill: "price_signal_allocation", commonError: "confuses_buyer_response_with_supplier_response", feedback: "Higher prices encourage buyers to buy less or look for substitutes." },
  { id: 58, q: "When a good's price rises, sellers are generally encouraged to:", options: ["Produce more of the good", "Buy less of the good", "Shift demand left", "Create a price ceiling"], a: 0, tag: "price_signal", type: "interpretation", objective: "LO4.5", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "seller_response_to_price_signal", secondarySkills: ["law_of_supply"], repairSkill: "price_signal_allocation", commonError: "confuses_seller_response_with_buyer_response", feedback: "Higher prices encourage sellers to supply more." },
  { id: 59, q: "A legal maximum price is called:", options: ["A price ceiling", "A price floor", "Tax incidence", "Consumer surplus"], a: 0, tag: "price_ceiling", type: "definition", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "price_ceiling_definition", secondarySkills: ["binding_price_ceiling"], repairSkill: "price_ceiling_definition", commonError: "confuses_ceiling_with_floor", feedback: "A price ceiling is a legal maximum price." },
  { id: 60, q: "A price ceiling is binding when it is set:", options: ["Below the equilibrium price", "Above the equilibrium price", "At any seller's preferred price", "Only on producers"], a: 0, tag: "price_ceiling", type: "definition", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "binding_price_ceiling", secondarySkills: ["price_ceiling_definition"], repairSkill: "binding_price_ceiling", commonError: "gets_binding_ceiling_direction_backwards", feedback: "A ceiling must be below equilibrium to prevent price from rising to equilibrium." },
  { id: 61, q: "A binding price ceiling creates:", options: ["A shortage", "A surplus", "More supply than demand", "A tax wedge"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_effect", secondarySkills: ["binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "confuses_ceiling_shortage_with_floor_surplus", feedback: "A binding price ceiling keeps price too low, so quantity demanded exceeds quantity supplied." },
  { id: 62, q: "A city sets rent at $800 when equilibrium rent is $1,200. This rent ceiling is:", options: ["Binding", "Not binding", "A price floor", "A tax"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "binding_price_ceiling", secondarySkills: ["ceiling_shortage_effect"], repairSkill: "binding_price_ceiling", commonError: "misses_ceiling_below_equilibrium", feedback: "The ceiling is below equilibrium, so it is binding." },
  { id: 63, q: "At a binding price ceiling, quantity demanded is 70 and quantity supplied is 45. What is the shortage?", options: ["25 units", "45 units", "70 units", "115 units"], a: 0, tag: "price_ceiling", type: "calculation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_calculation", secondarySkills: ["binding_price_ceiling"], repairSkill: "ceiling_shortage_calculation", commonError: "adds_qd_and_qs_instead_of_subtracting", feedback: "Shortage equals quantity demanded minus quantity supplied: 70 - 45 = 25." },
  { id: 64, q: "A legal minimum price is called:", options: ["A price floor", "A price ceiling", "A shortage", "A demand shift"], a: 0, tag: "price_floor", type: "definition", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "price_floor_definition", secondarySkills: ["binding_price_floor"], repairSkill: "price_floor_definition", commonError: "confuses_floor_with_ceiling", feedback: "A price floor is a legal minimum price." },
  { id: 65, q: "A price floor is binding when it is set:", options: ["Above the equilibrium price", "Below the equilibrium price", "At zero", "Only on buyers"], a: 0, tag: "price_floor", type: "definition", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "binding_price_floor", secondarySkills: ["price_floor_definition"], repairSkill: "binding_price_floor", commonError: "gets_binding_floor_direction_backwards", feedback: "A floor must be above equilibrium to prevent price from falling to equilibrium." },
