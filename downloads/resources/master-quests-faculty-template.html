  {"id":9060,"sourceGame":"marketGate","q":"A $4 tax is placed on concert tickets. Buyers pay $2.50 more than before, sellers receive $1.50 less than before, and fewer tickets are sold. Which statement is strongest?","options":["The burden is shared, quantity falls, and the side less able to adjust bears more","The burden falls only on sellers because the legal tax is charged to sellers","The burden falls only on buyers because the buyer price increased","The burden disappears because tax revenue offsets the lower quantity sold"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_incidence_elasticity","secondarySkills":[],"repairSkill":"tax_incidence_elasticity","commonError":"legendary_near_match_error","feedback":"Legal responsibility for the tax does not determine economic burden. The wedge is shared and quantity falls."},
  {"id":9061,"sourceGame":"marketGate","q":"A $5 tax is imposed. Buyers pay $3 more and sellers receive $2 less than before. Which side bears more burden and what does that imply?","options":["Buyers bear more, suggesting demand is less elastic than supply","Sellers bear more, suggesting supply is less elastic than demand","Both bear the same burden because the tax is $5","The legal taxpayer bears all of the burden"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_burden_elasticity_inference","secondarySkills":["tax_wedge","elasticity"],"repairSkill":"tax_incidence_elasticity","commonError":"ignores_price_changes_when_assigning_burden","feedback":"Buyers bear $3 of the $5 tax. The side with less elastic behavior tends to bear more burden."},
  {"id":9062,"sourceGame":"marketGate","q":"A seller-side tax shifts the supply curve upward. Which statement best explains why buyers still pay part of the tax?","options":["The market price adjusts, so the burden depends on elasticities rather than legal assignment","Buyers voluntarily pay taxes for sellers","The demand curve shifts right by the tax amount","The tax creates a price ceiling"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"statutory_vs_economic_incidence","secondarySkills":["tax_equivalence","market_adjustment"],"repairSkill":"tax_incidence_equivalence","commonError":"confuses_who_remits_tax_with_who_bears_tax","feedback":"Legal remittance does not determine economic burden. Prices adjust based on supply and demand elasticities."},
  {"id":9063,"sourceGame":"marketGate","q":"A tax is placed on buyers instead of sellers. In a standard supply-demand model, why is the final outcome similar to an equal seller tax?","options":["Either tax creates the same wedge between buyer price and seller price","Only buyer taxes reduce quantity","Only seller taxes raise prices","The tax disappears if buyers legally pay it"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"buyer_seller_tax_equivalence","secondarySkills":["tax_wedge","equilibrium"],"repairSkill":"tax_incidence_equivalence","commonError":"thinks_legal_side_changes_total_wedge_effect","feedback":"A buyer tax or seller tax of the same size creates the same wedge and reduces quantity similarly."},
  {"id":9064,"sourceGame":"marketGate","q":"A $7 tax reduces quantity from 500 to 420 units. What does this show beyond tax revenue?","options":["The tax shrinks the market by discouraging mutually beneficial trades","The tax increases market size because government collects revenue","The tax leaves buyers and sellers unaffected if revenue is spent","The tax creates a surplus because quantity falls"],"a":0,"tag":"tax","type":"interpretation","objective":"LO6.3","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_quantity_effect","secondarySkills":["deadweight_loss_logic","market_size"],"repairSkill":"tax_quantity_effect","commonError":"focuses_only_on_tax_revenue","feedback":"A tax reduces quantity traded, meaning some mutually beneficial exchanges no longer happen."},
  {"id":9065,"sourceGame":"marketGate","q":"A tax on cigarettes causes only a small drop in quantity but a large increase in buyer price. What does that suggest?","options":["Demand is relatively inelastic, so buyers bear much of the burden","Demand is relatively elastic, so sellers bear all of the burden","Supply must be perfectly inelastic","The tax is nonbinding"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"inelastic_demand_tax_burden","secondarySkills":["quantity_response","buyer_price"],"repairSkill":"tax_incidence_elasticity","commonError":"assumes_large_price_change_requires_elastic_demand","feedback":"When buyers do not reduce quantity much, demand is relatively inelastic and buyers bear more of the tax."},
  {"id":9066,"sourceGame":"marketGate","q":"A tax on luxury boat rentals causes quantity rented to collapse while buyer price rises only slightly. What does that suggest?","options":["Demand is relatively elastic, so sellers likely bear more of the burden","Demand is relatively inelastic, so buyers bear nearly all of the burden","The tax must have increased demand","The tax must be legally paid by buyers"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"elastic_demand_tax_burden","secondarySkills":["quantity_response","seller_burden"],"repairSkill":"tax_incidence_elasticity","commonError":"assigns_burden_to_buyers_whenever_buyer_price_rises","feedback":"If buyers reduce quantity sharply, demand is elastic and sellers often bear more burden through lower net prices."},
  {"id":9067,"sourceGame":"marketGate","q":"Before tax, price is $20 and quantity is 1,000. After a $6 tax, buyers pay $24, sellers receive $18, and quantity is 850. What is tax revenue?","options":["$5,100","$6,000","$3,400","$20,400"],"a":0,"tag":"tax","type":"calculation","objective":"LO6.3","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_revenue_calculation","secondarySkills":["tax_wedge","after_tax_quantity"],"repairSkill":"tax_revenue_calculation","commonError":"uses_original_quantity_instead_of_after_tax_quantity","feedback":"Tax revenue equals tax per unit times after-tax quantity: $6 × 850 = $5,100."},
  {"id":9068,"sourceGame":"marketGate","q":"Before tax, price is $20. After tax, buyers pay $24 and sellers receive $18. Which statement correctly splits the burden?","options":["Buyers bear $4 and sellers bear $2","Buyers bear $2 and sellers bear $4","Buyers bear $6 and sellers bear $0","Buyers bear $24 and sellers bear $18"],"a":0,"tag":"tax_incidence","type":"calculation","objective":"LO6.5","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_burden_split","secondarySkills":["buyer_price","seller_price"],"repairSkill":"tax_burden_split","commonError":"uses_after_tax_prices_as_burden_amounts","feedback":"Buyers pay $4 more than before, while sellers receive $2 less than before."},
  {"id":9069,"sourceGame":"marketGate","q":"A tax on a good raises government revenue but reduces quantity traded. Which answer best connects taxes to market efficiency?","options":["Some trades with benefits above costs no longer occur because the tax wedge blocks them","All lost trades were inefficient anyway","Tax revenue always exceeds any efficiency loss","Taxes improve efficiency whenever buyers dislike higher prices"],"a":0,"tag":"tax","type":"synthesis","objective":"LO6.3","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_deadweight_loss_logic","secondarySkills":["tax_wedge","market_size"],"repairSkill":"tax_quantity_effect","commonError":"thinks_revenue_cancels_lost_surplus","feedback":"A tax wedge can prevent trades that would have benefited both buyers and sellers."},
  {"id":9070,"sourceGame":"marketGate","q":"A seller argues, 'The tax is legally charged to buyers, so my business cannot be affected.' What is the best response?","options":["Wrong; buyer taxes can reduce demand faced by sellers and lower quantity sold","Correct; only the legal taxpayer changes behavior","Correct; seller revenue cannot change when buyers pay the tax","Wrong; the tax becomes a price floor"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_equivalence_application","secondarySkills":["seller_revenue","quantity_effect"],"repairSkill":"tax_incidence_equivalence","commonError":"assumes_nonlegal_side_is_unaffected","feedback":"Even when buyers remit the tax, sellers can be affected through lower quantity sold and changed equilibrium prices."},
  {"id":9071,"sourceGame":"marketGate","q":"A tax is imposed on a market where supply is perfectly inelastic. Who bears the tax burden?","options":["Sellers bear the burden because quantity supplied cannot respond","Buyers bear the burden because demand slopes downward","The burden is split equally by law","No one bears the burden because quantity does not change"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.5","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"perfectly_inelastic_supply_tax_burden","secondarySkills":["elasticity_extreme_case"],"repairSkill":"tax_incidence_elasticity","commonError":"thinks_no_quantity_change_means_no_burden","feedback":"The side that cannot adjust bears more burden. Perfectly inelastic supply means sellers bear the tax."},
  {"id":9072,"sourceGame":"marketGate","q":"A tax is imposed on a market where demand is perfectly inelastic. Who bears the tax burden?","options":["Buyers bear the burden because quantity demanded does not respond","Sellers bear the burden because they collect the money","The government bears the burden","No one bears the burden because quantity does not change"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.5","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"perfectly_inelastic_demand_tax_burden","secondarySkills":["elasticity_extreme_case"],"repairSkill":"tax_incidence_elasticity","commonError":"thinks_legal_collection_determines_burden","feedback":"If buyers do not change quantity demanded at all, buyers bear the tax burden."},
  {"id":9073,"sourceGame":"marketGate","q":"A tax causes buyers to pay more, sellers to receive less, and quantity to fall. Which statement is false?","options":["The side legally assigned the tax must bear the entire burden","The tax creates a wedge between buyer and seller prices","The market quantity falls after the tax","Buyers and sellers can both be worse off per unit traded"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_incidence_misconception_detection","secondarySkills":["statutory_incidence","economic_incidence"],"repairSkill":"tax_incidence_equivalence","commonError":"chooses_true_tax_wedge_statement_as_false","feedback":"The legal assignment does not determine the entire burden. Market elasticities matter."},
  {"id":9074,"sourceGame":"marketGate","q":"A city taxes ride-share trips. Riders pay higher prices, drivers receive less per trip, and fewer trips occur. What is the best synthesis?","options":["The tax wedge is shared and shrinks the number of exchanges","The tax affects only riders if they see the fee at checkout","The tax affects only drivers if the platform remits it","The tax increases quantity because government revenue rises"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.3","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"tax_wedge_market_shrinkage_synthesis","secondarySkills":["buyer_price","seller_price","quantity_effect"],"repairSkill":"tax_wedge_calculation","commonError":"focuses_on_payment_interface_instead_of_market_outcome","feedback":"A tax creates a wedge shared by market participants and reduces the quantity traded."},
  {"id":9075,"sourceGame":"marketGate","q":"A student says, 'The city should accept a small efficiency loss if the policy improves housing access for low-income renters.' What is the best classification?","options":["A normative claim using an efficiency-equity tradeoff","A positive claim measuring only what already happened","A circular-flow claim about factor payments","A supply shift caused only by lower input costs"],"a":0,"tag":"positive_normative","type":"multi-step","objective":"LO2.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_distinction","secondarySkills":[],"repairSkill":"positive_normative_distinction","commonError":"legendary_near_match_error","feedback":"The word should and the value judgment about equity make it normative, though it uses economic reasoning."},
  {"id":9076,"sourceGame":"marketGate","q":"A university raises parking fines. Students respond by arriving earlier, carpooling more, and contesting tickets more often. What principle ties these reactions together?","options":["People respond to incentives, including unintended margins of adjustment","People ignore incentives when rules are created by institutions","Opportunity cost disappears when penalties are legal","Markets allocate resources only when prices are zero"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"incentives_unintended_consequences","secondarySkills":[],"repairSkill":"incentives_unintended_consequences","commonError":"legendary_near_match_error","feedback":"A changed penalty changes behavior, including responses the policy designer may not have wanted."},
  {"id":9077,"sourceGame":"marketGate","q":"An economist builds a simple two-market circular-flow model and leaves out banks, government, and foreign trade. Why can the model still be useful?","options":["It isolates key relationships by simplifying reality on purpose","It proves omitted institutions have no economic importance","It turns a normative claim into a positive law","It removes scarcity from household and firm decisions"],"a":0,"tag":"models","type":"interpretation","objective":"LO2.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"model_purpose","secondarySkills":[],"repairSkill":"model_purpose","commonError":"legendary_near_match_error","feedback":"A model is useful because it strips away details to focus on the relationship being studied."},
  {"id":9078,"sourceGame":"marketGate","q":"A mayor says, 'Rent control will reduce average rent by 15%.' An economist says, 'Rent control should be used even if it creates shortages.' Which classification is correct?","options":["The first is positive if testable; the second is normative because it recommends policy","Both are positive because both mention rent control","Both are normative because both involve government policy","The first is normative and the second is positive"],"a":0,"tag":"positive_normative","type":"multi-step","objective":"LO2.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_comparison","secondarySkills":["policy_analysis","testable_claims"],"repairSkill":"positive_normative_distinction","commonError":"classifies_all_policy_claims_as_normative","feedback":"A testable prediction is positive. A recommendation about what should be done is normative."},
  {"id":9079,"sourceGame":"marketGate","q":"A university raises parking fines. Parking violations fall, but students start parking in nearby neighborhoods. What is the best interpretation?","options":["The policy changed incentives and created an unintended margin of adjustment","The policy failed to create incentives because students still park","Opportunity cost disappeared because fines are legal penalties","The policy shifted the PPF outward"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"incentives_unintended_consequences","secondarySkills":["behavioral_response","policy_design"],"repairSkill":"incentives_unintended_consequences","commonError":"looks_only_at_intended_behavior_change","feedback":"People respond to incentives in intended and unintended ways."},
  {"id":9080,"sourceGame":"marketGate","q":"An economist leaves out foreign trade when modeling a local haircut market. Why is that not automatically a flaw?","options":["A model can omit details to isolate the relationship being studied","A model is valid only if it includes every institution","Foreign trade never matters in economics","Models are used to avoid assumptions"],"a":0,"tag":"models","type":"interpretation","objective":"LO2.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"model_purpose","secondarySkills":["assumptions","simplification"],"repairSkill":"model_purpose","commonError":"thinks_simplification_means_uselessness","feedback":"Models simplify reality on purpose so economists can focus on key relationships."},
  {"id":9081,"sourceGame":"marketGate","q":"A statement says, 'A tax on soda reduces soda consumption by 8%.' Another says, 'The government should tax soda to improve health.' Which answer is correct?","options":["The first is positive; the second is normative","The first is normative; the second is positive","Both are positive","Both are normative"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_distinction","secondarySkills":["tax_policy","testability"],"repairSkill":"positive_normative_distinction","commonError":"mistakes_policy_topic_for_normative_statement","feedback":"A measurable effect is positive. A recommendation about what government should do is normative."},
  {"id":9082,"sourceGame":"marketGate","q":"A subsidy for electric cars increases purchases, but also mostly benefits households who would have bought electric cars anyway. What idea is being tested?","options":["Incentives can create intended responses and unintended distributional effects","Subsidies remove scarcity","A subsidy is the same as a binding price ceiling","Consumers ignore incentives when products are expensive"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"incentives_policy_evaluation","secondarySkills":["unintended_consequences","marginal_response"],"repairSkill":"incentives_unintended_consequences","commonError":"judges_policy_only_by_intended_goal","feedback":"Incentives change behavior, but the actual benefits may not land exactly where policymakers intended."},
  {"id":9083,"sourceGame":"marketGate","q":"A circular-flow model shows households supplying labor to firms and receiving wages. Which market is being described?","options":["The market for factors of production","The market for final goods and services","The market for price ceilings","The market for tax revenue"],"a":0,"tag":"circular_flow","type":"interpretation","objective":"LO2.2","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"circular_flow_roles","secondarySkills":["factor_market","households_firms"],"repairSkill":"circular_flow_components","commonError":"reverses_product_and_factor_markets","feedback":"Households provide factors of production such as labor in factor markets and receive income."},
  {"id":9084,"sourceGame":"marketGate","q":"A student says, 'The minimum wage should rise because fairness matters more than efficiency.' What is the best classification?","options":["Normative, because it makes a value judgment about what should matter more","Positive, because it mentions efficiency","Positive, because it discusses wages","Neither, because economics cannot discuss fairness"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"normative_value_judgment","secondarySkills":["efficiency_equity_tradeoff"],"repairSkill":"positive_normative_distinction","commonError":"treats_economic_vocabulary_as_making_claim_positive","feedback":"The statement recommends what should happen and ranks values, so it is normative."},
  {"id":9085,"sourceGame":"marketGate","q":"A company pays bonuses for speed. Output rises, but quality complaints increase. What does this show?","options":["Incentives work, but poorly designed incentives can distort behavior","Incentives do not affect workers","Marginal analysis requires ignoring quality","The policy created a price ceiling"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"incentive_design_tradeoff","secondarySkills":["unintended_consequences","marginal_behavior"],"repairSkill":"incentives_unintended_consequences","commonError":"counts_only_intended_metric_improvement","feedback":"People respond to the measured incentive, which can improve one outcome while damaging another."},
  {"id":9086,"sourceGame":"marketGate","q":"An economist uses a PPF model with only two goods even though real economies produce millions. Why is that acceptable?","options":["The model simplifies reality to clarify scarcity and tradeoffs","The model proves real economies produce only two goods","The model removes opportunity cost","The model is normative because it uses a graph"],"a":0,"tag":"models","type":"interpretation","objective":"LO2.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"model_simplification","secondarySkills":["ppf","scarcity"],"repairSkill":"model_purpose","commonError":"rejects_models_for_omitting_real_world_detail","feedback":"A PPF strips the economy down to two goods so the tradeoff logic is visible."},
  {"id":9087,"sourceGame":"marketGate","q":"A researcher says, 'When rent control is below equilibrium, quantity demanded exceeds quantity supplied.' What type of statement is this?","options":["Positive, because it is a testable claim about market outcomes","Normative, because rent control is controversial","Normative, because it uses the word equilibrium","Neither, because models cannot be tested"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"positive_statement_identification","secondarySkills":["price_ceiling","shortage"],"repairSkill":"positive_normative_distinction","commonError":"classifies_controversial_topic_as_normative_even_when_claim_is_testable","feedback":"The statement predicts a testable relationship, so it is positive."},
  {"id":9088,"sourceGame":"marketGate","q":"A city reduces bus fares to increase ridership. Ridership rises, but crowding makes some riders switch back to cars. What is the strongest lesson?","options":["Policy changes incentives, but secondary effects can offset part of the intended response","Lower prices always increase welfare for every rider","Crowding proves the law of demand is false","The bus market has no scarcity because fares fell"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"incentives_secondary_effects","secondarySkills":["law_of_demand","unintended_consequences"],"repairSkill":"incentives_unintended_consequences","commonError":"stops_analysis_after_first_order_effect","feedback":"The fare cut increases quantity demanded, but crowding changes the experience and creates a secondary response."},
  {"id":9089,"sourceGame":"marketGate","q":"A model predicts that a binding price ceiling creates shortages, but a real city also has black markets, quality decline, and favoritism. What does this say about the model?","options":["The model captures the core shortage logic, while real-world institutions shape how the shortage appears","The model is useless because it did not list every consequence","The model proves black markets cannot happen","The model becomes normative once real examples are added"],"a":0,"tag":"models","type":"synthesis","objective":"LO2.1","difficulty":"legendary","conceptCluster":"legendary_market_gate","primarySkill":"model_application_limits","secondarySkills":["price_ceiling","nonprice_rationing"],"repairSkill":"model_purpose","commonError":"rejects_model_because_it_is_not_exhaustive","feedback":"A simple model explains the core mechanism. Real-world details determine the specific form the shortage takes."}

  {"id":9108,"sourceGame":"marketGate","q":"An economy is inside its PPF because workers and machines are idle. Which change moves it toward efficiency but does not represent long-run growth?","options":["Putting idle workers and machines back to work on the existing frontier","Inventing new technology that shifts the frontier outward","Discovering new natural resources that expand production possibilities","Training workers so the economy can produce more of both goods than before"],"a":0,"tag":"ppf","type":"trap","objective":"LO2.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"efficiency_vs_growth","secondarySkills":["idle_resources","ppf_shift"],"repairSkill":"ppf_efficiency_status","commonError":"confuses_movement_to_frontier_with_outward_shift","feedback":"Using idle resources moves the economy toward the existing frontier. Growth shifts the frontier outward."},

  {"id":9110,"sourceGame":"marketGate","q":"A student says, 'Point outside the PPF is inefficient because the economy is not producing there.' What is wrong with that statement?","options":["A point outside the PPF is unattainable with current resources, not merely inefficient","A point outside the PPF is always efficient","A point outside the PPF shows idle resources","A point outside the PPF means opportunity cost is zero"],"a":0,"tag":"ppf","type":"trap","objective":"LO2.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"ppf_efficiency_status","secondarySkills":["attainable_vs_unattainable"],"repairSkill":"ppf_efficiency_status","commonError":"confuses_unattainable_with_inefficient","feedback":"Inside the PPF is inefficient. Outside the PPF is unattainable with current resources and technology."},
  {"id":9111,"sourceGame":"marketGate","q":"A college student can work 20 hours and study 5 hours, or work 10 hours and study 18 hours. What is the opportunity cost of gaining 13 study hours?","options":["10 hours of work","13 hours of work","18 hours of study","Zero because studying is productive"],"a":0,"tag":"opportunity_cost","type":"calculation","objective":"LO1.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"opportunity_cost_calculation","secondarySkills":["tradeoff_identification"],"repairSkill":"opportunity_cost_definition","commonError":"uses_gain_in_chosen_activity_as_cost","feedback":"The student gains 13 study hours by giving up 10 work hours, so the opportunity cost is 10 work hours."},
  {"id":9112,"sourceGame":"marketGate","q":"A manager has already spent $40,000 developing a product. Finishing it costs $12,000 more and is expected to bring in $18,000. What should the manager do using marginal reasoning?","options":["Finish it because the marginal benefit exceeds the marginal cost","Cancel it because total cost is $52,000","Finish it because sunk costs should determine the choice","Cancel it because marginal cost is always bad"],"a":0,"tag":"marginal","type":"multi-step","objective":"LO1.3","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"marginal_benefit_cost_decision","secondarySkills":["sunk_cost_trap"],"repairSkill":"marginal_benefit_cost_decision","commonError":"includes_sunk_cost_in_marginal_decision","feedback":"The $40,000 is sunk. The relevant comparison is $18,000 in added benefit versus $12,000 in added cost."},
  {"id":9113,"sourceGame":"marketGate","q":"A new safety rule reduces accident risk but also forces firms to cut output because compliance uses scarce labor and equipment. What core idea is most directly involved?","options":["Policy choices involve tradeoffs even when the goal is worthwhile","Government rules eliminate opportunity cost","Scarcity applies only to consumers","Efficiency and equality always move in the same direction"],"a":0,"tag":"tradeoffs","type":"synthesis","objective":"LO1.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"policy_tradeoff_analysis","secondarySkills":["scarcity","opportunity_cost"],"repairSkill":"tradeoff_identification","commonError":"ignores_tradeoffs_when_policy_goal_is_good","feedback":"Even worthwhile policies use scarce resources and create tradeoffs."},
  {"id":9114,"sourceGame":"marketGate","q":"A PPF is straight rather than bowed out. What does that imply about opportunity cost?","options":["Opportunity cost is constant because resources shift between goods at a constant rate","Opportunity cost is increasing because all PPFs are bowed outward","Opportunity cost is zero because production is efficient","Opportunity cost is impossible to calculate from a PPF"],"a":0,"tag":"ppf","type":"trap","objective":"LO2.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"constant_vs_increasing_opportunity_cost","secondarySkills":["ppf_shape"],"repairSkill":"ppf_opportunity_cost","commonError":"assumes_all_ppfs_show_increasing_opportunity_cost","feedback":"A straight-line PPF represents constant opportunity cost."},

  {"id":9121,"sourceGame":"marketGate","q":"Demand for laptops rises while a chip shortage reduces supply. Without knowing curve sizes, what can be said with confidence?","options":["Equilibrium price rises, while equilibrium quantity is ambiguous","Equilibrium quantity rises, while equilibrium price is ambiguous","Both price and quantity must fall","Both price and quantity must rise"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_increase","supply_decrease"],"repairSkill":"simultaneous_shifts","commonError":"forces_quantity_direction_without_curve_size","feedback":"Demand rising pushes price up and quantity up; supply falling pushes price up and quantity down. Price rises, quantity is ambiguous."},
  {"id":9122,"sourceGame":"marketGate","q":"Demand for restaurant meals falls while lower food costs increase supply. Without exact curve sizes, what is the strongest conclusion?","options":["Equilibrium price falls, while equilibrium quantity is ambiguous","Equilibrium quantity falls, while equilibrium price is ambiguous","Both price and quantity must rise","Both price and quantity must fall"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_decrease","supply_increase"],"repairSkill":"simultaneous_shifts","commonError":"assumes_quantity_must_follow_demand_shift_only","feedback":"Demand falling lowers price and quantity; supply rising lowers price and raises quantity. Price falls, quantity is ambiguous."},
  {"id":9123,"sourceGame":"marketGate","q":"The price of tablets falls, and consumers buy more tablets. No non-price determinant changed. What happened?","options":["Quantity demanded increased through movement along the demand curve","Demand increased and the curve shifted right","Supply increased and the curve shifted right","Demand decreased because price fell"],"a":0,"tag":"demand","type":"trap","objective":"LO4.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"movement_vs_shift","secondarySkills":["law_of_demand"],"repairSkill":"movement_vs_shift","commonError":"calls_price_change_a_demand_shift","feedback":"A change in the good's own price causes movement along demand, not a demand shift."},
  {"id":9124,"sourceGame":"marketGate","q":"The price of a substitute for coffee rises. What happens in the coffee market, holding other factors constant?","options":["Demand for coffee increases, raising equilibrium price and quantity","Quantity demanded of coffee decreases along the same curve","Supply of coffee increases because coffee is now profitable","Demand for coffee decreases because substitutes are now expensive"],"a":0,"tag":"demand","type":"interpretation","objective":"LO4.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"related_goods_demand_shift","secondarySkills":["substitutes","equilibrium_effects"],"repairSkill":"demand_shifters","commonError":"confuses_substitutes_with_complements","feedback":"When a substitute becomes more expensive, demand for the original good rises."},
  {"id":9125,"sourceGame":"marketGate","q":"The price of peanut butter falls. What happens to the demand for jelly, assuming they are complements?","options":["Demand for jelly increases","Quantity demanded of jelly falls along the same curve","Supply of jelly decreases","Demand for jelly decreases because peanut butter is cheaper"],"a":0,"tag":"demand","type":"trap","objective":"LO4.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"complement_demand_shift","secondarySkills":["related_goods","demand_shifters"],"repairSkill":"demand_shifters","commonError":"moves_along_jelly_demand_when_related_good_price_changes","feedback":"A lower price for a complement increases demand for the related good."},
  {"id":9126,"sourceGame":"marketGate","q":"Input costs rise for producers of bicycles. At the same time, consumer income rises and bicycles are a normal good. What is the clearest prediction?","options":["Equilibrium price rises, while equilibrium quantity is ambiguous","Equilibrium quantity rises, while price is ambiguous","Both price and quantity must fall","Price must fall because income rose"],"a":0,"tag":"equilibrium","type":"synthesis","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["supply_decrease","demand_increase","normal_good"],"repairSkill":"simultaneous_shifts","commonError":"tracks_only_one_curve_shift","feedback":"Higher input costs decrease supply, while higher income increases demand. Both push price up; quantity is ambiguous."},
  {"id":9127,"sourceGame":"marketGate","q":"A technological improvement reduces production costs while consumer tastes shift away from the good. What is the strongest prediction?","options":["Equilibrium price falls, while equilibrium quantity is ambiguous","Equilibrium quantity falls, while price is ambiguous","Both price and quantity must rise","Price must rise because technology improved"],"a":0,"tag":"equilibrium","type":"synthesis","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["supply_increase","demand_decrease"],"repairSkill":"simultaneous_shifts","commonError":"assumes_technology_always_raises_price","feedback":"Supply increase lowers price; demand decrease also lowers price. Quantity is ambiguous because the shifts push quantity in opposite directions."},
  {"id":9128,"sourceGame":"marketGate","q":"A market price is above equilibrium. What pressure does the market create and why?","options":["Downward pressure on price because quantity supplied exceeds quantity demanded","Upward pressure on price because quantity demanded exceeds quantity supplied","No pressure because high prices clear every market","Downward pressure on quantity demanded because demand shifts left"],"a":0,"tag":"equilibrium","type":"interpretation","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"surplus_market_adjustment","secondarySkills":["quantity_supplied","quantity_demanded"],"repairSkill":"surplus_shortage_adjustment","commonError":"confuses_surplus_with_shortage","feedback":"A price above equilibrium creates a surplus, so sellers have an incentive to lower price."},
  {"id":9129,"sourceGame":"marketGate","q":"A market price is below equilibrium. What pressure does the market create and why?","options":["Upward pressure on price because quantity demanded exceeds quantity supplied","Downward pressure on price because quantity supplied exceeds quantity demanded","No pressure because buyers prefer low prices","A supply increase because the legal price is low"],"a":0,"tag":"equilibrium","type":"interpretation","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"shortage_market_adjustment","secondarySkills":["quantity_demanded","quantity_supplied"],"repairSkill":"surplus_shortage_adjustment","commonError":"confuses_shortage_with_surplus","feedback":"A price below equilibrium creates a shortage, so buyers compete and push price upward."},
  {"id":9130,"sourceGame":"marketGate","q":"A coffee shop sees more customers after a celebrity endorsement. At the same time, wages for baristas rise. What outcome is certain if both effects are strong but unknown in size?","options":["Price rises; quantity is ambiguous","Quantity rises; price is ambiguous","Both price and quantity fall","Price falls; quantity rises"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_increase","supply_decrease","input_costs"],"repairSkill":"simultaneous_shifts","commonError":"assumes_popularity_always_raises_quantity","feedback":"Demand increases and supply decreases. Both raise price, but quantity depends on which shift is larger."},
  {"id":9131,"sourceGame":"marketGate","q":"A new production method makes shoes cheaper to produce. At the same time, a fashion shift makes shoes less popular. What is certain?","options":["Price falls; quantity is ambiguous","Quantity falls; price is ambiguous","Both price and quantity rise","Price rises; quantity falls"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["supply_increase","demand_decrease"],"repairSkill":"simultaneous_shifts","commonError":"assumes_less_popularity_always_lowers_quantity_and_price_only","feedback":"Supply increases and demand decreases. Both lower price, but quantity is ambiguous."},
  {"id":9132,"sourceGame":"marketGate","q":"A hurricane destroys supply while households expect prices to rise tomorrow and rush to buy today. What is the strongest prediction for today's market?","options":["Price rises; quantity is ambiguous","Quantity rises; price is ambiguous","Both price and quantity fall","Price falls; quantity rises"],"a":0,"tag":"equilibrium","type":"synthesis","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"expectations_and_supply_shock","secondarySkills":["demand_increase","supply_decrease"],"repairSkill":"simultaneous_shifts","commonError":"ignores_expectations_as_demand_shifter","feedback":"Expected future price increases raise current demand, while the hurricane lowers supply. Price rises; quantity is ambiguous."},
  {"id":9133,"sourceGame":"marketGate","q":"A student says, 'Demand increased because the price rose.' What is the correct response?","options":["That reverses the logic; a demand increase can raise price, but a price rise alone causes movement along demand","That is correct because demand always means the current price","That describes a supply increase","That proves the good is inferior"],"a":0,"tag":"demand","type":"trap","objective":"LO4.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"movement_vs_shift","secondarySkills":["causal_reasoning"],"repairSkill":"movement_vs_shift","commonError":"uses_price_change_as_evidence_of_demand_shift_without_shifter","feedback":"A price rise can be caused by a demand increase, but the price rise itself does not shift demand."},
  {"id":9134,"sourceGame":"marketGate","q":"Both supply and demand decrease. Without curve sizes, what is the strongest conclusion?","options":["Equilibrium quantity falls, while equilibrium price is ambiguous","Equilibrium price falls, while quantity is ambiguous","Both price and quantity must rise","Both price and quantity must stay constant"],"a":0,"tag":"equilibrium","type":"multi-step","objective":"LO4.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"simultaneous_shifts","secondarySkills":["demand_decrease","supply_decrease"],"repairSkill":"simultaneous_shifts","commonError":"forces_price_direction_without_curve_size","feedback":"Both shifts reduce quantity. Demand decrease lowers price, while supply decrease raises price, so price is ambiguous."},

  {"id":9140,"sourceGame":"marketGate","q":"A city caps rent below equilibrium. The advertised rent falls, but apartment searches become longer, maintenance falls, and landlords screen tenants harder. What is the best economic diagnosis?","options":["The ceiling lowers the posted price but creates shortage and nonmoney rationing","The ceiling lowers the posted price and therefore eliminates scarcity","The ceiling raises quantity supplied and creates seller competition","The ceiling is nonbinding because landlords still choose tenant quality"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"ceiling_unintended_consequences","secondarySkills":[],"repairSkill":"ceiling_unintended_consequences","commonError":"legendary_near_match_error","feedback":"The posted money price is only part of the cost. Binding ceilings create shortage and hidden rationing costs."},
  {"id":9141,"sourceGame":"marketGate","q":"A minimum wage is set above the equilibrium wage. Some workers receive higher pay, firms hire fewer workers, and more workers seek jobs. What is the cleanest interpretation?","options":["The floor helps some employed workers but creates a labor surplus","The floor helps all workers because everyone now earns the legal wage","The floor raises labor demand because the wage is higher","The floor is nonbinding because firms still hire some workers"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO6.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"minimum_wage_tradeoff","secondarySkills":[],"repairSkill":"minimum_wage_tradeoff","commonError":"legendary_near_match_error","feedback":"A binding wage floor creates winners among some employed workers and losers among workers unable to find jobs."},
  {"id":9142,"sourceGame":"marketGate","q":"A rent ceiling is set below equilibrium. After one year, renters with apartments pay less, but new renters struggle to find units. What is the best welfare-style interpretation?","options":["The policy transfers some surplus to lucky renters but creates shortage and misallocation","The policy increases total surplus because rent is lower","The policy creates a surplus of apartments","The policy is nonbinding because some tenants still rent units"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"ceiling_distribution_tradeoff","secondarySkills":["shortage","misallocation"],"repairSkill":"ceiling_unintended_consequences","commonError":"judges_policy_only_by_lower_price_for_some_buyers","feedback":"A binding ceiling can help some buyers while creating shortages and misallocation for others."},
  {"id":9143,"sourceGame":"marketGate","q":"A minimum wage is above equilibrium. Firms respond by cutting hours, raising hiring standards, and using more automation. What principle is being tested?","options":["People and firms respond to incentives on multiple margins","Price floors eliminate tradeoffs","Higher wages always increase labor demanded","The wage floor is nonbinding if any workers are hired"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO1.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"incentives_unintended_consequences","secondarySkills":["minimum_wage_tradeoff","labor_demand"],"repairSkill":"minimum_wage_tradeoff","commonError":"looks_only_at_hourly_wage_and_ignores_adjustment_margins","feedback":"A wage floor changes incentives, so firms can adjust through hiring, hours, standards, prices, or technology."},
  {"id":9144,"sourceGame":"marketGate","q":"A legal maximum price is set above equilibrium. A student predicts a shortage. What is wrong?","options":["A ceiling above equilibrium is nonbinding and does not create a shortage","Any price ceiling always creates a shortage","A ceiling above equilibrium creates a surplus","A ceiling above equilibrium is actually a price floor"],"a":0,"tag":"price_ceiling","type":"trap","objective":"LO6.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"nonbinding_price_ceiling","secondarySkills":["equilibrium_price"],"repairSkill":"nonbinding_price_ceiling","commonError":"thinks_all_ceilings_bind","feedback":"A price ceiling binds only when it is below equilibrium."},
  {"id":9145,"sourceGame":"marketGate","q":"A legal minimum price is set below equilibrium. A student predicts a surplus. What is wrong?","options":["A floor below equilibrium is nonbinding and does not create a surplus","Any price floor always creates a surplus","A floor below equilibrium creates a shortage","A floor below equilibrium is actually a price ceiling"],"a":0,"tag":"price_floor","type":"trap","objective":"LO6.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"nonbinding_price_floor","secondarySkills":["equilibrium_price"],"repairSkill":"nonbinding_price_floor","commonError":"thinks_all_floors_bind","feedback":"A price floor binds only when it is above equilibrium."},
  {"id":9146,"sourceGame":"marketGate","q":"At a rent ceiling of $900, quantity demanded is 4,000 apartments and quantity supplied is 2,700 apartments. Which answer best states the result?","options":["A shortage of 1,300 apartments","A surplus of 1,300 apartments","A shortage of 2,700 apartments","A surplus of 4,000 apartments"],"a":0,"tag":"price_ceiling","type":"calculation","objective":"LO6.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"shortage_calculation","secondarySkills":["quantity_demanded","quantity_supplied"],"repairSkill":"binding_ceiling_shortage","commonError":"reverses_qd_and_qs","feedback":"Shortage equals quantity demanded minus quantity supplied: 4,000 - 2,700 = 1,300."},
  {"id":9147,"sourceGame":"marketGate","q":"At a price floor of $18, quantity supplied is 900 units and quantity demanded is 550 units. Which answer best states the result?","options":["A surplus of 350 units","A shortage of 350 units","A surplus of 550 units","A shortage of 900 units"],"a":0,"tag":"price_floor","type":"calculation","objective":"LO6.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"surplus_calculation","secondarySkills":["quantity_supplied","quantity_demanded"],"repairSkill":"binding_floor_surplus","commonError":"subtracts_qs_from_qd_for_floor","feedback":"Surplus equals quantity supplied minus quantity demanded: 900 - 550 = 350."},
  {"id":9148,"sourceGame":"marketGate","q":"A binding price ceiling on gasoline leads stations to sell out early. Some stations favor regular customers. What is the best interpretation?","options":["The shortage creates nonprice rationing","The market clears because the legal price is low","The ceiling creates a surplus","The ceiling increases supply"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"nonprice_rationing","secondarySkills":["shortage","incentives"],"repairSkill":"ceiling_unintended_consequences","commonError":"thinks_low_legal_price_solves_scarcity","feedback":"When price cannot ration the good, other methods like waiting, favoritism, and side payments can take over."},
  {"id":9149,"sourceGame":"marketGate","q":"A binding price floor on milk leaves producers with unsold inventory. Which hidden cost is most likely?","options":["Waste, storage costs, or government purchases to support the price","Long lines among buyers because quantity demanded exceeds quantity supplied","Black-market premiums from buyers competing for scarce milk","No cost because producers receive a higher legal price"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO6.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"floor_unintended_consequences","secondarySkills":["surplus","producer_incentives"],"repairSkill":"minimum_wage_tradeoff","commonError":"ignores_costs_of_surplus","feedback":"A binding floor creates a surplus, which can lead to waste, storage costs, or policy costs."},
  {"id":9150,"sourceGame":"marketGate","q":"A rent ceiling causes landlords to convert apartments into short-term rentals outside the regulated market. What does this show?","options":["A policy can change incentives and reduce quantity supplied in the regulated market","A ceiling always increases quantity supplied","A ceiling eliminates opportunity cost for landlords","A ceiling is nonbinding if landlords find loopholes"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO6.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"ceiling_supply_response","secondarySkills":["incentives","unintended_consequences"],"repairSkill":"ceiling_unintended_consequences","commonError":"assumes_legal_price_change_does_not_affect_supplier_behavior","feedback":"A binding ceiling lowers returns in the regulated market and can push suppliers to adjust around the policy."},
  {"id":9151,"sourceGame":"marketGate","q":"A wage floor raises pay for workers who keep jobs but reduces entry-level openings. Which economic idea best frames the policy debate?","options":["An efficiency-equity tradeoff","A movement along the PPF with no opportunity cost","A nonbinding ceiling","A fixed CPI basket"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO1.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"efficiency_equity_tradeoff","secondarySkills":["minimum_wage","labor_surplus"],"repairSkill":"policy_tradeoff_analysis","commonError":"analyzes_only_winners_or_only_losers","feedback":"The policy can improve outcomes for some workers while reducing efficiency or job access for others."},
  {"id":9152,"sourceGame":"marketGate","q":"A city wants affordable housing and proposes a rent ceiling below equilibrium. Which economist response is positive rather than normative?","options":["The ceiling will likely create a shortage if set below equilibrium","The city should accept shortages to help poorer renters","The policy is morally required","Housing is too important to leave to markets"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_distinction","secondarySkills":["price_ceiling"],"repairSkill":"positive_normative_distinction","commonError":"confuses_policy_analysis_with_policy_preference","feedback":"Predicting a shortage from a binding ceiling is a testable positive claim."},
  {"id":9153,"sourceGame":"marketGate","q":"A minimum wage is set above equilibrium, but employment does not fall much. Which explanation best fits supply and demand logic?","options":["Labor demand may be relatively inelastic over that range","The law of demand has been disproven","The wage floor must be below equilibrium","Higher wages always increase quantity demanded for labor"],"a":0,"tag":"price_floor","type":"synthesis","objective":"LO6.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"labor_demand_elasticity_interpretation","secondarySkills":["minimum_wage","quantity_demanded"],"repairSkill":"minimum_wage_tradeoff","commonError":"expects_large_quantity_change_from_every_price_change","feedback":"If labor demand is relatively inelastic, employment may fall only modestly when wages rise."},
  {"id":9154,"sourceGame":"marketGate","q":"A price ceiling lowers the posted price from $30 to $20, but buyers spend two extra hours searching. What mistake does a posted-price-only analysis make?","options":["It ignores opportunity costs and nonmoney rationing","It double-counts producer surplus","It treats a price ceiling as a price floor","It assumes supply shifts right"],"a":0,"tag":"price_ceiling","type":"synthesis","objective":"LO1.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"full_cost_opportunity_cost_analysis","secondarySkills":["nonprice_rationing","shortage"],"repairSkill":"opportunity_cost_definition","commonError":"treats_money_price_as_total_cost","feedback":"The money price is not the full cost when buyers must spend time searching or waiting."},

  {"id":9160,"sourceGame":"marketGate","q":"A $4 tax is placed on concert tickets. Buyers pay $2.50 more than before, sellers receive $1.50 less than before, and fewer tickets are sold. Which statement is strongest?","options":["The burden is shared, quantity falls, and the side less able to adjust bears more","The burden falls only on sellers because the legal tax is charged to sellers","The burden falls only on buyers because the buyer price increased","The burden disappears because tax revenue offsets the lower quantity sold"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_incidence_elasticity","secondarySkills":[],"repairSkill":"tax_incidence_elasticity","commonError":"legendary_near_match_error","feedback":"Legal responsibility for the tax does not determine economic burden. The wedge is shared and quantity falls."},
  {"id":9161,"sourceGame":"marketGate","q":"A $5 tax is imposed. Buyers pay $3 more and sellers receive $2 less than before. Which side bears more burden and what does that imply?","options":["Buyers bear more, suggesting demand is less elastic than supply","Sellers bear more, suggesting supply is less elastic than demand","Both bear the same burden because the tax is $5","The legal taxpayer bears all of the burden"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_burden_elasticity_inference","secondarySkills":["tax_wedge","elasticity"],"repairSkill":"tax_incidence_elasticity","commonError":"ignores_price_changes_when_assigning_burden","feedback":"Buyers bear $3 of the $5 tax. The side with less elastic behavior tends to bear more burden."},
  {"id":9162,"sourceGame":"marketGate","q":"A seller-side tax shifts the supply curve upward. Which statement best explains why buyers still pay part of the tax?","options":["The market price adjusts, so the burden depends on elasticities rather than legal assignment","Buyers voluntarily pay taxes for sellers","The demand curve shifts right by the tax amount","The tax creates a price ceiling"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"statutory_vs_economic_incidence","secondarySkills":["tax_equivalence","market_adjustment"],"repairSkill":"tax_incidence_equivalence","commonError":"confuses_who_remits_tax_with_who_bears_tax","feedback":"Legal remittance does not determine economic burden. Prices adjust based on supply and demand elasticities."},
  {"id":9163,"sourceGame":"marketGate","q":"A tax is placed on buyers instead of sellers. In a standard supply-demand model, why is the final outcome similar to an equal seller tax?","options":["Either tax creates the same wedge between buyer price and seller price","Only buyer taxes reduce quantity","Only seller taxes raise prices","The tax disappears if buyers legally pay it"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"buyer_seller_tax_equivalence","secondarySkills":["tax_wedge","equilibrium"],"repairSkill":"tax_incidence_equivalence","commonError":"thinks_legal_side_changes_total_wedge_effect","feedback":"A buyer tax or seller tax of the same size creates the same wedge and reduces quantity similarly."},
  {"id":9164,"sourceGame":"marketGate","q":"A $7 tax reduces quantity from 500 to 420 units. What does this show beyond tax revenue?","options":["The tax shrinks the market by discouraging mutually beneficial trades","The tax increases market size because government collects revenue","The tax leaves buyers and sellers unaffected if revenue is spent","The tax creates a surplus because quantity falls"],"a":0,"tag":"tax","type":"interpretation","objective":"LO6.3","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_quantity_effect","secondarySkills":["deadweight_loss_logic","market_size"],"repairSkill":"tax_quantity_effect","commonError":"focuses_only_on_tax_revenue","feedback":"A tax reduces quantity traded, meaning some mutually beneficial exchanges no longer happen."},
  {"id":9165,"sourceGame":"marketGate","q":"A tax on cigarettes causes only a small drop in quantity but a large increase in buyer price. What does that suggest?","options":["Demand is relatively inelastic, so buyers bear much of the burden","Demand is relatively elastic, so sellers bear all of the burden","Supply must be perfectly inelastic","The tax is nonbinding"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"inelastic_demand_tax_burden","secondarySkills":["quantity_response","buyer_price"],"repairSkill":"tax_incidence_elasticity","commonError":"assumes_large_price_change_requires_elastic_demand","feedback":"When buyers do not reduce quantity much, demand is relatively inelastic and buyers bear more of the tax."},
  {"id":9166,"sourceGame":"marketGate","q":"A tax on luxury boat rentals causes quantity rented to collapse while buyer price rises only slightly. What does that suggest?","options":["Demand is relatively elastic, so sellers likely bear more of the burden","Demand is relatively inelastic, so buyers bear nearly all of the burden","The tax must have increased demand","The tax must be legally paid by buyers"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.5","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"elastic_demand_tax_burden","secondarySkills":["quantity_response","seller_burden"],"repairSkill":"tax_incidence_elasticity","commonError":"assigns_burden_to_buyers_whenever_buyer_price_rises","feedback":"If buyers reduce quantity sharply, demand is elastic and sellers often bear more burden through lower net prices."},
  {"id":9167,"sourceGame":"marketGate","q":"Before tax, price is $20 and quantity is 1,000. After a $6 tax, buyers pay $24, sellers receive $18, and quantity is 850. What is tax revenue?","options":["$5,100","$6,000","$3,400","$20,400"],"a":0,"tag":"tax","type":"calculation","objective":"LO6.3","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_revenue_calculation","secondarySkills":["tax_wedge","after_tax_quantity"],"repairSkill":"tax_revenue_calculation","commonError":"uses_original_quantity_instead_of_after_tax_quantity","feedback":"Tax revenue equals tax per unit times after-tax quantity: $6 × 850 = $5,100."},
  {"id":9168,"sourceGame":"marketGate","q":"Before tax, price is $20. After tax, buyers pay $24 and sellers receive $18. Which statement correctly splits the burden?","options":["Buyers bear $4 and sellers bear $2","Buyers bear $2 and sellers bear $4","Buyers bear $6 and sellers bear $0","Buyers bear $24 and sellers bear $18"],"a":0,"tag":"tax_incidence","type":"calculation","objective":"LO6.5","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_burden_split","secondarySkills":["buyer_price","seller_price"],"repairSkill":"tax_burden_split","commonError":"uses_after_tax_prices_as_burden_amounts","feedback":"Buyers pay $4 more than before, while sellers receive $2 less than before."},
  {"id":9169,"sourceGame":"marketGate","q":"A tax on a good raises government revenue but reduces quantity traded. Which answer best connects taxes to market efficiency?","options":["Some trades with benefits above costs no longer occur because the tax wedge blocks them","All lost trades were inefficient anyway","Tax revenue always exceeds any efficiency loss","Taxes improve efficiency whenever buyers dislike higher prices"],"a":0,"tag":"tax","type":"synthesis","objective":"LO6.3","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_deadweight_loss_logic","secondarySkills":["tax_wedge","market_size"],"repairSkill":"tax_quantity_effect","commonError":"thinks_revenue_cancels_lost_surplus","feedback":"A tax wedge can prevent trades that would have benefited both buyers and sellers."},
  {"id":9170,"sourceGame":"marketGate","q":"A seller argues, 'The tax is legally charged to buyers, so my business cannot be affected.' What is the best response?","options":["Wrong; buyer taxes can reduce demand faced by sellers and lower quantity sold","Correct; only the legal taxpayer changes behavior","Correct; seller revenue cannot change when buyers pay the tax","Wrong; the tax becomes a price floor"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_equivalence_application","secondarySkills":["seller_revenue","quantity_effect"],"repairSkill":"tax_incidence_equivalence","commonError":"assumes_nonlegal_side_is_unaffected","feedback":"Even when buyers remit the tax, sellers can be affected through lower quantity sold and changed equilibrium prices."},
  {"id":9171,"sourceGame":"marketGate","q":"A tax is imposed on a market where supply is perfectly inelastic. Who bears the tax burden?","options":["Sellers bear the burden because quantity supplied cannot respond","Buyers bear the burden because demand slopes downward","The burden is split equally by law","No one bears the burden because quantity does not change"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.5","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"perfectly_inelastic_supply_tax_burden","secondarySkills":["elasticity_extreme_case"],"repairSkill":"tax_incidence_elasticity","commonError":"thinks_no_quantity_change_means_no_burden","feedback":"The side that cannot adjust bears more burden. Perfectly inelastic supply means sellers bear the tax."},
  {"id":9172,"sourceGame":"marketGate","q":"A tax is imposed on a market where demand is perfectly inelastic. Who bears the tax burden?","options":["Buyers bear the burden because quantity demanded does not respond","Sellers bear the burden because they collect the money","The government bears the burden","No one bears the burden because quantity does not change"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.5","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"perfectly_inelastic_demand_tax_burden","secondarySkills":["elasticity_extreme_case"],"repairSkill":"tax_incidence_elasticity","commonError":"thinks_legal_collection_determines_burden","feedback":"If buyers do not change quantity demanded at all, buyers bear the tax burden."},
  {"id":9173,"sourceGame":"marketGate","q":"A tax causes buyers to pay more, sellers to receive less, and quantity to fall. Which statement is false?","options":["The side legally assigned the tax must bear the entire burden","The tax creates a wedge between buyer and seller prices","The market quantity falls after the tax","Buyers and sellers can both be worse off per unit traded"],"a":0,"tag":"tax_incidence","type":"trap","objective":"LO6.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_incidence_misconception_detection","secondarySkills":["statutory_incidence","economic_incidence"],"repairSkill":"tax_incidence_equivalence","commonError":"chooses_true_tax_wedge_statement_as_false","feedback":"The legal assignment does not determine the entire burden. Market elasticities matter."},
  {"id":9174,"sourceGame":"marketGate","q":"A city taxes ride-share trips. Riders pay higher prices, drivers receive less per trip, and fewer trips occur. What is the best synthesis?","options":["The tax wedge is shared and shrinks the number of exchanges","The tax affects only riders if they see the fee at checkout","The tax affects only drivers if the platform remits it","The tax increases quantity because government revenue rises"],"a":0,"tag":"tax_incidence","type":"synthesis","objective":"LO6.3","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"tax_wedge_market_shrinkage_synthesis","secondarySkills":["buyer_price","seller_price","quantity_effect"],"repairSkill":"tax_wedge_calculation","commonError":"focuses_on_payment_interface_instead_of_market_outcome","feedback":"A tax creates a wedge shared by market participants and reduces the quantity traded."},
  {"id":9175,"sourceGame":"marketGate","q":"A student says, 'The city should accept a small efficiency loss if the policy improves housing access for low-income renters.' What is the best classification?","options":["A normative claim using an efficiency-equity tradeoff","A positive claim measuring only what already happened","A circular-flow claim about factor payments","A supply shift caused only by lower input costs"],"a":0,"tag":"positive_normative","type":"multi-step","objective":"LO2.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_distinction","secondarySkills":[],"repairSkill":"positive_normative_distinction","commonError":"legendary_near_match_error","feedback":"The word should and the value judgment about equity make it normative, though it uses economic reasoning."},
  {"id":9176,"sourceGame":"marketGate","q":"A university raises parking fines. Students respond by arriving earlier, carpooling more, and contesting tickets more often. What principle ties these reactions together?","options":["People respond to incentives, including unintended margins of adjustment","People ignore incentives when rules are created by institutions","Opportunity cost disappears when penalties are legal","Markets allocate resources only when prices are zero"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"incentives_unintended_consequences","secondarySkills":[],"repairSkill":"incentives_unintended_consequences","commonError":"legendary_near_match_error","feedback":"A changed penalty changes behavior, including responses the policy designer may not have wanted."},
  {"id":9177,"sourceGame":"marketGate","q":"An economist builds a simple two-market circular-flow model and leaves out banks, government, and foreign trade. Why can the model still be useful?","options":["It isolates key relationships by simplifying reality on purpose","It proves omitted institutions have no economic importance","It turns a normative claim into a positive law","It removes scarcity from household and firm decisions"],"a":0,"tag":"models","type":"interpretation","objective":"LO2.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"model_purpose","secondarySkills":[],"repairSkill":"model_purpose","commonError":"legendary_near_match_error","feedback":"A model is useful because it strips away details to focus on the relationship being studied."},
  {"id":9178,"sourceGame":"marketGate","q":"A mayor says, 'Rent control will reduce average rent by 15%.' An economist says, 'Rent control should be used even if it creates shortages.' Which classification is correct?","options":["The first is positive if testable; the second is normative because it recommends policy","Both are positive because both mention rent control","Both are normative because both involve government policy","The first is normative and the second is positive"],"a":0,"tag":"positive_normative","type":"multi-step","objective":"LO2.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_comparison","secondarySkills":["policy_analysis","testable_claims"],"repairSkill":"positive_normative_distinction","commonError":"classifies_all_policy_claims_as_normative","feedback":"A testable prediction is positive. A recommendation about what should be done is normative."},
  {"id":9179,"sourceGame":"marketGate","q":"A university raises parking fines. Parking violations fall, but students start parking in nearby neighborhoods. What is the best interpretation?","options":["The policy changed incentives and created an unintended margin of adjustment","The policy failed to create incentives because students still park","Opportunity cost disappeared because fines are legal penalties","The policy shifted the PPF outward"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"incentives_unintended_consequences","secondarySkills":["behavioral_response","policy_design"],"repairSkill":"incentives_unintended_consequences","commonError":"looks_only_at_intended_behavior_change","feedback":"People respond to incentives in intended and unintended ways."},
  {"id":9180,"sourceGame":"marketGate","q":"An economist leaves out foreign trade when modeling a local haircut market. Why is that not automatically a flaw?","options":["A model can omit details to isolate the relationship being studied","A model is valid only if it includes every institution","Foreign trade never matters in economics","Models are used to avoid assumptions"],"a":0,"tag":"models","type":"interpretation","objective":"LO2.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"model_purpose","secondarySkills":["assumptions","simplification"],"repairSkill":"model_purpose","commonError":"thinks_simplification_means_uselessness","feedback":"Models simplify reality on purpose so economists can focus on key relationships."},
  {"id":9181,"sourceGame":"marketGate","q":"A statement says, 'A tax on soda reduces soda consumption by 8%.' Another says, 'The government should tax soda to improve health.' Which answer is correct?","options":["The first is positive; the second is normative","The first is normative; the second is positive","Both are positive","Both are normative"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"positive_normative_distinction","secondarySkills":["tax_policy","testability"],"repairSkill":"positive_normative_distinction","commonError":"mistakes_policy_topic_for_normative_statement","feedback":"A measurable effect is positive. A recommendation about what government should do is normative."},
  {"id":9182,"sourceGame":"marketGate","q":"A subsidy for electric cars increases purchases, but also mostly benefits households who would have bought electric cars anyway. What idea is being tested?","options":["Incentives can create intended responses and unintended distributional effects","Subsidies remove scarcity","A subsidy is the same as a binding price ceiling","Consumers ignore incentives when products are expensive"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"incentives_policy_evaluation","secondarySkills":["unintended_consequences","marginal_response"],"repairSkill":"incentives_unintended_consequences","commonError":"judges_policy_only_by_intended_goal","feedback":"Incentives change behavior, but the actual benefits may not land exactly where policymakers intended."},
  {"id":9183,"sourceGame":"marketGate","q":"A circular-flow model shows households supplying labor to firms and receiving wages. Which market is being described?","options":["The market for factors of production","The market for final goods and services","The market for price ceilings","The market for tax revenue"],"a":0,"tag":"circular_flow","type":"interpretation","objective":"LO2.2","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"circular_flow_roles","secondarySkills":["factor_market","households_firms"],"repairSkill":"circular_flow_components","commonError":"reverses_product_and_factor_markets","feedback":"Households provide factors of production such as labor in factor markets and receive income."},
  {"id":9184,"sourceGame":"marketGate","q":"A student says, 'The minimum wage should rise because fairness matters more than efficiency.' What is the best classification?","options":["Normative, because it makes a value judgment about what should matter more","Positive, because it mentions efficiency","Positive, because it discusses wages","Neither, because economics cannot discuss fairness"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"normative_value_judgment","secondarySkills":["efficiency_equity_tradeoff"],"repairSkill":"positive_normative_distinction","commonError":"treats_economic_vocabulary_as_making_claim_positive","feedback":"The statement recommends what should happen and ranks values, so it is normative."},
  {"id":9185,"sourceGame":"marketGate","q":"A company pays bonuses for speed. Output rises, but quality complaints increase. What does this show?","options":["Incentives work, but poorly designed incentives can distort behavior","Incentives do not affect workers","Marginal analysis requires ignoring quality","The policy created a price ceiling"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"incentive_design_tradeoff","secondarySkills":["unintended_consequences","marginal_behavior"],"repairSkill":"incentives_unintended_consequences","commonError":"counts_only_intended_metric_improvement","feedback":"People respond to the measured incentive, which can improve one outcome while damaging another."},
  {"id":9186,"sourceGame":"marketGate","q":"An economist uses a PPF model with only two goods even though real economies produce millions. Why is that acceptable?","options":["The model simplifies reality to clarify scarcity and tradeoffs","The model proves real economies produce only two goods","The model removes opportunity cost","The model is normative because it uses a graph"],"a":0,"tag":"models","type":"interpretation","objective":"LO2.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"model_simplification","secondarySkills":["ppf","scarcity"],"repairSkill":"model_purpose","commonError":"rejects_models_for_omitting_real_world_detail","feedback":"A PPF strips the economy down to two goods so the tradeoff logic is visible."},
  {"id":9187,"sourceGame":"marketGate","q":"A researcher says, 'When rent control is below equilibrium, quantity demanded exceeds quantity supplied.' What type of statement is this?","options":["Positive, because it is a testable claim about market outcomes","Normative, because rent control is controversial","Normative, because it uses the word equilibrium","Neither, because models cannot be tested"],"a":0,"tag":"positive_normative","type":"trap","objective":"LO2.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"positive_statement_identification","secondarySkills":["price_ceiling","shortage"],"repairSkill":"positive_normative_distinction","commonError":"classifies_controversial_topic_as_normative_even_when_claim_is_testable","feedback":"The statement predicts a testable relationship, so it is positive."},
  {"id":9188,"sourceGame":"marketGate","q":"A city reduces bus fares to increase ridership. Ridership rises, but crowding makes some riders switch back to cars. What is the strongest lesson?","options":["Policy changes incentives, but secondary effects can offset part of the intended response","Lower prices always increase welfare for every rider","Crowding proves the law of demand is false","The bus market has no scarcity because fares fell"],"a":0,"tag":"incentives","type":"synthesis","objective":"LO1.4","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"incentives_secondary_effects","secondarySkills":["law_of_demand","unintended_consequences"],"repairSkill":"incentives_unintended_consequences","commonError":"stops_analysis_after_first_order_effect","feedback":"The fare cut increases quantity demanded, but crowding changes the experience and creates a secondary response."},
  {"id":9189,"sourceGame":"marketGate","q":"A model predicts that a binding price ceiling creates shortages, but a real city also has black markets, quality decline, and favoritism. What does this say about the model?","options":["The model captures the core shortage logic, while real-world institutions shape how the shortage appears","The model is useless because it did not list every consequence","The model proves black markets cannot happen","The model becomes normative once real examples are added"],"a":0,"tag":"models","type":"synthesis","objective":"LO2.1","difficulty":"legendaryBoss","conceptCluster":"legendary_market_gate","primarySkill":"model_application_limits","secondarySkills":["price_ceiling","nonprice_rationing"],"repairSkill":"model_purpose","commonError":"rejects_model_because_it_is_not_exhaustive","feedback":"A simple model explains the core mechanism. Real-world details determine the specific form the shortage takes."}
],
easyBoss: [
  // --- OPPORTUNITY COST ---
