<!-- =====================================================
MASTERY QUESTS — BLANK BUILDER TEMPLATE

PURPOSE:
This file keeps the complete adaptive game engine but removes
course-specific content. Faculty should add content instead of
deleting somebody else's content first.

EDIT THESE FIVE AREAS:
1. Game title and stage names
2. Main question pools
3. Repair questions
4. Bridge questions
5. Optional theme text and visuals

QUESTION ROUTING:
- Add an explicit objective to every question.
- Add a primarySkill to every question.
- Use the same primarySkill on matching repair and bridge items.
- inferObjective() and inferSkill() do not guess from wording.

RUNTIME SAFETY:
Empty or undersized pools receive obvious template placeholders.
They keep the engine testable while a game is being built.
Once a pool reaches its minimum size, placeholders are not added.

PRIVACY:
No email is requested.
No game data are transmitted.
Progress remains in the current browser.

DO NOT RENAME REQUIRED HTML IDS OR CORE ENGINE VARIABLES.
===================================================== -->

========================================= */
    
/* Progress bar container — background track */
	#progressBar {
    width: 100%;
    height: 22px;
    background: linear-gradient(180deg,
        rgba(3,10,24,0.96),
        rgba(2,6,23,0.98));
    border-radius: 12px;

    overflow: hidden;
    border: 1px solid rgba(56,189,248,0.26);
    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.86),

    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,

    box-shadow:
        0 0 12px rgba(56,189,248,0.44),
        0 0 22px rgba(247,217,130,0.28);
    transition: width 0.4s ease;

/* Maze grid layout — 10 columns = 30 total rooms */	
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}

/* Individual room cell — default state */	
.maze-box {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
    background: linear-gradient(180deg,
        rgba(11,34,56,0.72),
        rgba(2,6,23,0.94));
    border: 1px solid rgba(56,189,248,0.20);
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.80),
        0 0 5px rgba(56,189,248,0.12);
    transition: all 0.3s ease;
}

/* Current room highlight — animated pulse */	
.maze-box.active {
    background: radial-gradient(circle,
        rgba(56,189,248,0.46),
        rgba(11,34,56,0.58),
        rgba(2,6,23,0.98));
    border: 2px solid #f7d982;
    box-shadow:
        0 0 12px rgba(56,189,248,0.72),
        0 0 24px rgba(247,217,130,0.36),
        inset 0 0 12px rgba(0,0,0,0.72);
    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

/* Completed tile */	
.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(19,57,86,0.72),
        rgba(3,10,24,0.96));
    border-color: rgba(247,217,130,0.36);
    box-shadow:
        0 0 8px rgba(56,189,248,0.26),
        inset 0 0 10px rgba(0,0,0,0.76);
}

/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #38bdf8,
        0 0 18px rgba(247,217,130,0.58);
}

.maze-box:nth-child(20) {

        0 0 8px #0ea5e9,
        0 0 18px rgba(56,189,248,0.62);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f7d982,

/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — BLANK MASTERY QUEST
========================================= */

/* Reward popup — appears after boss victory */
#artifactDrop {
    margin-top: 20px;
    padding: 14px;
    background: radial-gradient(circle at center,
        rgba(56,189,248,0.18),
        rgba(15,42,64,0.70) 42%,
        rgba(4,14,28,0.94) 68%,
        rgba(2,6,23,0.99));
    border-radius: 12px;
    border: 1px solid rgba(247,217,130,0.38);
    box-shadow:
        0 0 22px rgba(56,189,248,0.24),
        0 0 44px rgba(247,217,130,0.16),
        inset 0 0 30px rgba(0,0,0,0.78);
    text-align: center;
}

/* Artifact image in popup */	
#artifactImage {
    width: 96px;
    margin-bottom: 8px;
}

#artifactDrop img {
    filter:
        drop-shadow(0 0 14px rgba(56,189,248,0.64))
        drop-shadow(0 0 26px rgba(247,217,130,0.36))
        drop-shadow(0 0 34px rgba(0,0,0,0.64));
}

/* Persistent artifact collection display (top panel) */	
#artifactVault {
    margin-top: -6px;
    width: 220px;
    padding: 18px;
    border-radius: 12px;
    background: radial-gradient(circle at top,
        rgba(56,189,248,0.16),
        rgba(15,42,64,0.70) 44%,
        rgba(4,14,28,0.94) 70%,
        rgba(2,6,23,0.99));
    border: 1px solid rgba(56,189,248,0.26);
    box-shadow:
        0 0 20px rgba(56,189,248,0.20),
        0 0 38px rgba(247,217,130,0.12),
        inset 0 0 30px rgba(0,0,0,0.78);
    text-align: center;
}

#artifactVault h3 {
    color: #f7d982;
    text-shadow:
        0 0 10px rgba(247,217,130,0.48),
        0 0 18px rgba(56,189,248,0.20),
        0 2px 6px rgba(0,0,0,0.88);
}

/* Layout container for artifact slots */	
.vaultRow {
    display: flex;
    justify-content: center;
    align-items:flex-end;
    gap: 15px;
    flex-wrap:wrap;
}

/* Individual artifact slot (default = locked state) */    	
.artifactSlot {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    text-align:center;
    opacity: .28;
    transition: all .4s ease;
}

/* Locked artifact image (dimmed effect) */    	
.artifactSlot img {
    width: 45px;
    margin-bottom:4px;
    filter:
        brightness(0.30)
        contrast(0.92)
        saturate(0.78);
    transition: all .4s ease;
}

/* Artifact label text */	
.artifactSlot span {
    display: block;
    font-size: 13px;
    color: rgba(224,242,254,0.44);
    margin-top: 8px;
    line-height: 1.2;
}

/* Glow + animation for unlocked artifacts */	
.artifactSlot.unlocked {
    opacity: 1;
    transform: scale(1.05);
}

.artifactSlot.unlocked img {
    filter:
        drop-shadow(0 0 14px rgba(247,217,130,0.76))
        drop-shadow(0 0 26px rgba(56,189,248,0.44))
        drop-shadow(0 0 34px rgba(15,42,64,0.62));
    animation: relicPulse 2.5s ease-in-out infinite;
    backface-visibility: hidden;
    transform: translateZ(0);
}

.artifactSlot.unlocked span {
    color: #eef6ff;
    font-weight: 600;
    text-shadow:
        0 0 7px rgba(56,189,248,0.34),
        0 0 14px rgba(247,217,130,0.18),
        0 2px 5px rgba(0,0,0,0.88);
}

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — BLANK MASTERY QUEST
========================================= */

/* Hit animation — triggered when boss takes damage */	
.boss-shake {
    animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

/* Boss image display — includes floating animation */
.bossIcon {
    width: 96px;
    height: auto;
    display: block;
    margin: 0 auto 12px auto;
    animation: bossFloat 4s ease-in-out infinite;
}

/* Boss 1 — The Keeper of Scarcity */
.scarcityGlow,
.gatekeeperGlow {
    filter:
        drop-shadow(0 0 12px rgba(56,189,248,0.72))
        drop-shadow(0 0 24px rgba(247,217,130,0.42))
        drop-shadow(0 0 34px rgba(0,0,0,0.80));
}

/* Boss 2 — The Warden of Elasticity */
.elasticityGlow,
.wardenGlow {
    filter:
        drop-shadow(0 0 14px rgba(14,165,233,0.88))
        drop-shadow(0 0 28px rgba(56,189,248,0.44))
        drop-shadow(0 0 36px rgba(247,217,130,0.18))
        drop-shadow(0 0 38px rgba(0,0,0,0.84));
}

/* Boss 3 — The Arbiter of the blank mastery quest */
.arbiterGlow,
.marketArbiterGlow {
    filter:
        drop-shadow(0 0 16px rgba(247,217,130,0.92))
        drop-shadow(0 0 34px rgba(56,189,248,0.48))
        drop-shadow(0 0 46px rgba(15,42,64,0.66))
        drop-shadow(0 0 52px rgba(0,0,0,0.88));
}

/* Ambient torch effect — decorative, shown during gameplay */	
.torch {
    position: absolute;
    width: 70px;
    top: 30px;
    z-index: 10;
    animation: torchFlicker 3s infinite alternate;
    pointer-events: none;
    opacity: .9;
    filter:
        drop-shadow(0 0 12px rgba(56,189,248,0.44))
        drop-shadow(0 0 24px rgba(247,217,130,0.24));
    display:none;
}

/* Torch positioning (left/right sides of screen) */	
.left-torch {
    left: 18px;
}

.right-torch {
    right: 18px;
    transform: scaleX(-1);
}

/* =========================================
   9. ANIMATION SYSTEM — BLANK MASTERY QUEST
========================================= */

/* Ambient civic-light flicker */
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }
  25% {
    filter: brightness(1.04) saturate(1.04);
  }
  50% {
    filter: brightness(0.97) saturate(0.99);
  }
  75% {
    filter: brightness(1.03) saturate(1.03);
  }
}

/* Damage feedback */
@keyframes hitshake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* Boss hit feedback */
@keyframes bossShake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Current room pulse — Blank Mastery Quest */
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(56,189,248,0.56),
      0 0 16px rgba(247,217,130,0.22),
      inset 0 0 10px rgba(0,0,0,0.66);
  }
  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(56,189,248,0.78),
      0 0 32px rgba(247,217,130,0.34),
      0 0 42px rgba(15,42,64,0.68),
      inset 0 0 12px rgba(0,0,0,0.70);
  }
  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(56,189,248,0.62),
      0 0 24px rgba(247,217,130,0.24),
      0 0 30px rgba(15,42,64,0.60),
      inset 0 0 11px rgba(0,0,0,0.70);
  }
  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(56,189,248,0.68),
      0 0 30px rgba(247,217,130,0.30),
      0 0 38px rgba(2,6,23,0.70),
      inset 0 0 12px rgba(0,0,0,0.72);
  }
}

/* Victory title glow */
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(247,217,130,0.72),
      0 0 18px rgba(56,189,248,0.24),
      0 2px 6px rgba(0,0,0,0.92);
  }
  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(247,217,130,0.92),
      0 0 42px rgba(56,189,248,0.42),
      0 0 52px rgba(15,42,64,0.68),
      0 3px 8px rgba(0,0,0,0.92);
  }
}

/* Idle boss movement */
@keyframes bossFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Temporary feedback text fade-out */
@keyframes fadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Guide idle movement */
@keyframes wizardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* General UI entrance */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Artifact pulse — Blank Mastery Quest */
@keyframes relicPulse {
  0%,100% {
    transform: scale(1.05);
    filter:
      drop-shadow(0 0 8px rgba(247,217,130,0.68))
      drop-shadow(0 0 18px rgba(56,189,248,0.30))
      drop-shadow(0 0 24px rgba(0,0,0,0.62));
  }
  50% {
    transform: scale(1.1);
    filter:
      drop-shadow(0 0 16px rgba(247,217,130,0.90))
      drop-shadow(0 0 30px rgba(56,189,248,0.42))
      drop-shadow(0 0 38px rgba(15,42,64,0.68));
  }
}

/* Streak icon pulse */
@keyframes pulseControl {
  0%,100% {
    transform: scale(1);
    opacity: 0.9;
  }
  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

/* =========================================
   12. MOBILE RESPONSIVE SYSTEM — SAFE TO EDIT (WITH LIMITS)
=========================================

This section controls how the game behaves on phones.

GOAL:
- Fit gameplay into a single screen as much as possible
- Reduce vertical scrolling
- Keep buttons thumb-friendly

-----------------------------------------
SAFE TO EDIT:
- font sizes (clamp values)
- spacing (gap, padding, margin)
- grid layout (answers: 1fr 1fr vs 1fr)
- wizard size (make smaller/larger)

-----------------------------------------
USE CAUTION:
- removing elements entirely (may break flow)
- changing flex direction randomly
- making buttons too small (hurts usability)

-----------------------------------------
DO NOT MODIFY:
- IDs (#gameShell, #gameBox, #wizardBox)
- core layout structure

-----------------------------------------
COMMON CUSTOM CHANGES:
- Want bigger buttons? Increase min-height
- Want less scrolling? Reduce padding/gaps
- Want simpler UI? Hide artifact labels

-----------------------------------------
TIP:
Mobile design is about SPACE, not style.
Every pixel matters.

========================================= */

function goFullscreen(){
let el = document.documentElement;

// Check if we are ALREADY in fullscreen
let isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;

if (!isFullscreen) {
        // ENTER Fullscreen
        if (el.requestFullscreen) {
            el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        } else if (el.msRequestFullscreen) {
            el.msRequestFullscreen();
        }
    } else {
        // EXIT Fullscreen (Crucial for iOS to reset the state)
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
    }
}

const SAVE_KEY = "blankBuilderSave_v1";

// =============================================
// SCORE ATTACK MODE ADDITION — CONFIG + STATE

// - realm completion

// Change point values here. Do not bury score math in answer().

const SCORE_ATTACK_STORAGE_PREFIX = "blankBuilderScoreAttack";

const SCORE_ATTACK_CONFIG = {
    correct: 100,
    wrongPenalty: -75,
    rapidMissPenalty: -125,
    speedBonuses: [
        { maxMs: 8000, points: 40, label: "Speed" },
        { maxMs: 15000, points: 25, label: "Speed" },
        { maxMs: 25000, points: 10, label: "Speed" }
    ],
    streakBonuses: [
        { minStreak: 15, points: 250, label: "Streak" },
        { minStreak: 10, points: 150, label: "Streak" },
        { minStreak: 5, points: 50, label: "Streak" },
        { minStreak: 3, points: 20, label: "Streak" },
        { minStreak: 2, points: 10, label: "Streak" }
    ],

    // SCORE ATTACK MODE ADDITION:
    // Short pause after points appear but before normal feedback/progression continues.
    // Correct answers get a little more time because they can stack Correct + Speed + Streak.
    resolveDelayCorrectMs: 725,
    resolveDelayWrongMs: 625
};

let scoreAttackScore = 0;
let scoreAttackBestScore = Number(localStorage.getItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`) || 0);
let scoreAttackEvents = [];
let activeScoreFloatCount = 0;

// =============================================

// =============================================
let resumedSavedRunThisSession = false;
let bossMistakeCountThisRun = 0;
let bossesDefeatedThisRun = 0;


function addRealmStat(key, amount = 1){
    const current = parseInt(localStorage.getItem(key) || "0", 10);
    localStorage.setItem(key, String((Number.isFinite(current) ? current : 0) + amount));
}

function setRealmFlag(key){
    localStorage.setItem(key, "true");
}

function updateRealmMaxStat(key, value){
    const numericValue = Number(value || 0);
    const current = parseInt(localStorage.getItem(key) || "0", 10);

    if(Number.isFinite(numericValue) && numericValue > (Number.isFinite(current) ? current : 0)){
        localStorage.setItem(key, String(numericValue));
    }
}

}

}

function recordTimedTrialAchievementStats(accuracy, reachedRoom){
    const safeAccuracy = Number.isFinite(Number(accuracy)) ? Number(accuracy) : 0;
    const safeRoom = Number.isFinite(Number(reachedRoom)) ? Number(reachedRoom) : 0;

    updateRealmMaxStat("blankBuilderTimedBestRoom", safeRoom);
    updateRealmMaxStat("blankBuilderTimedBestAccuracy", safeAccuracy);

    updateRealmMaxStat("blankQuestCollection_timedBestRoom", safeRoom);
    updateRealmMaxStat("blankQuestCollection_timedBestAccuracy", safeAccuracy);

    updateRealmMaxStat(`${getMissionAchievementPrefix()}_timedBestRoom`, safeRoom);
    updateRealmMaxStat(`${getMissionAchievementPrefix()}_timedBestAccuracy`, safeAccuracy);

    if(safeRoom >= 30 && safeAccuracy >= 80){
        setRealmFlag(REALM_TRIAL_BY_CLOCK_KEY);
        setRealmFlag(`${getMissionAchievementPrefix()}_trial_by_clock_complete`);
    }
}

}

function recordRealmStreak(value){

// =============================================
// SCORE ATTACK MODE ADDITION — SCORING HELPERS
// These helpers keep Score Attack self-contained.
// Main answer() only calls:
// - applyScoreAttackForAnswer(...)
// - applyScoreAttackRapidGuessPenalty(...)
// =============================================

function modeUsesScoreAttack(){
    return gameMode === "score";
}

function resetScoreAttackState(){
    scoreAttackScore = 0;
    scoreAttackEvents = [];
    activeScoreFloatCount = 0;
    scoreAttackBestScore = Number(localStorage.getItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`) || 0);
    updateScoreAttackHud();
}

function getScoreAttackSpeedBonus(responseTime){
    const bonus = SCORE_ATTACK_CONFIG.speedBonuses.find(item => responseTime <= item.maxMs);
    return bonus ? bonus.points : 0;
}

function getScoreAttackStreakBonus(currentStreak){
    const bonus = SCORE_ATTACK_CONFIG.streakBonuses.find(item => currentStreak >= item.minStreak);
    return bonus ? bonus.points : 0;
}

function applyScoreAttackEvent(label, amount){
    if(!modeUsesScoreAttack()) return;

    const numericAmount = Number(amount || 0);
    if(!Number.isFinite(numericAmount) || numericAmount === 0) return;

    scoreAttackScore += numericAmount;

    // No negative scoreboard. Punishment hurts, but it does not turn into comedy.
    if(scoreAttackScore < 0){
        scoreAttackScore = 0;
    }

    scoreAttackEvents.push({
        label,
        amount: numericAmount,
        scoreAfter: scoreAttackScore,
        room,
        questionId: currentQuestion?.id || 0,
        time: Date.now()
    });

    if(scoreAttackEvents.length > 120){
        scoreAttackEvents.shift();
    }

    if(scoreAttackScore > scoreAttackBestScore){
        scoreAttackBestScore = scoreAttackScore;
        localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`, String(scoreAttackBestScore));
    }

    updateScoreAttackHud();
    showScoreAttackFloat(label, numericAmount);
}

function applyScoreAttackForAnswer(isCorrect, responseTime){
    if(!modeUsesScoreAttack()) return;

    if(isCorrect){
        applyScoreAttackEvent("Correct", SCORE_ATTACK_CONFIG.correct);

        const speedBonus = getScoreAttackSpeedBonus(responseTime);
        if(speedBonus > 0){
            applyScoreAttackEvent("Speed", speedBonus);
        }

        const streakBonus = getScoreAttackStreakBonus(streak);
        if(streakBonus > 0){
            applyScoreAttackEvent("Streak", streakBonus);
        }

        return;
    }

    const penalty = responseTime < 4000
        ? SCORE_ATTACK_CONFIG.rapidMissPenalty
        : SCORE_ATTACK_CONFIG.wrongPenalty;

    applyScoreAttackEvent(responseTime < 4000 ? "Rapid Miss" : "Wrong", penalty);
}

function applyScoreAttackRapidGuessPenalty(){
    if(!modeUsesScoreAttack()) return;

    applyScoreAttackEvent("Rapid Guess", SCORE_ATTACK_CONFIG.rapidMissPenalty);
}

// SCORE ATTACK MODE ADDITION:
// This creates the tiny arcade-style "score resolve" beat.
// It lets +100 / Speed / Streak / Wrong penalties breathe before feedback appears.
function getScoreAttackResolveDelay(isCorrect){
    if(!modeUsesScoreAttack()) return 0;

    return isCorrect
        ? SCORE_ATTACK_CONFIG.resolveDelayCorrectMs
        : SCORE_ATTACK_CONFIG.resolveDelayWrongMs;
}

function waitForScoreAttackResolve(isCorrect){
    const delay = getScoreAttackResolveDelay(isCorrect);

    if(!delay || delay <= 0){
        return Promise.resolve();
    }

    return new Promise(resolve => setTimeout(resolve, delay));
}

function updateScoreAttackHud(){
    const hud = document.getElementById("scoreAttackHud");
    const scoreDisplay = document.getElementById("scoreAttackDisplay");
    const bestDisplay = document.getElementById("scoreAttackBestDisplay");

    if(!hud || !scoreDisplay || !bestDisplay) return;

    hud.style.display = modeUsesScoreAttack() ? "flex" : "none";
    scoreDisplay.innerText = String(scoreAttackScore);
    bestDisplay.innerText = String(scoreAttackBestScore);
}

function showScoreAttackFloat(label, amount){
    const layer = document.getElementById("scoreFloatLayer");
    if(!layer) return;

    const item = document.createElement("div");
    const sign = amount > 0 ? "+" : "";
    const typeClass = amount > 0 ? "positive" : amount < 0 ? "negative" : "neutral";

    activeScoreFloatCount++;
    const stackOffset = Math.min(activeScoreFloatCount - 1, 4) * 30;

    item.className = `score-float ${typeClass}`;
    item.style.setProperty("--score-float-top", `calc(38% + ${stackOffset}px)`);
    item.innerText = `${label} ${sign}${amount}`;

    layer.appendChild(item);

    setTimeout(() => {
        item.remove();
        activeScoreFloatCount = Math.max(0, activeScoreFloatCount - 1);
    }, 1200);
}

function storeScoreAttackFinalStats(accuracy, totalTimeMs){
    if(!modeUsesScoreAttack()) return;

    localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_lastScore`, String(scoreAttackScore));
    localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_lastAccuracy`, String(accuracy));
    localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_lastAttempts`, String(totalAttempts));
    localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_lastStreak`, String(maxStreak));
    localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_lastTimeMs`, String(totalTimeMs));

    if(scoreAttackScore > scoreAttackBestScore){
        scoreAttackBestScore = scoreAttackScore;
        localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`, String(scoreAttackBestScore));
    }
}



function saveGameState(){
    if(!modeAllowsSave()) return;

    const saveData = {
        room,
        bossHealth,
        bossCheckpoint,
        correctAnswers,
        totalAttempts,
        maxStreak,
        streak,

function generatePseudonymFromEmail(email) {
    const titles = [
        "Axiom", "Ledger", "Vector", "Meridian", "Signal", "Cipher",
        "Frontier", "Equity", "Oracle", "Index", "Summit", "Nexus",
        "Vault", "Prism", "Civic", "Astral", "Beacon", "Horizon"
    ];

    const roles = [
        "Appraiser", "Cartographer", "Arbiter", "Custodian", "Warden", "Registrar",
        "Archivist", "Surveyor", "Magistrate", "Keeper", "Analyst", "Mediator",
        "Steward", "Scribe", "Sentinel", "Marshal", "Seeker", "Auditor"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const title = titles[positiveHash % titles.length];
    const role = roles[Math.floor(positiveHash / titles.length) % roles.length];
    const number = 1000 + (positiveHash % 9000);

    return `${title}${role}${number}`;
}

const TYPE_TIME_TARGETS = {
    definition: 18000,
    interpretation: 26000,
    calculation: 32000,
    trap: 28000,
    "multi-step": 38000,
    interaction: 30000,
    integration: 36000,
    default: 24000
};

const ELITE_PREFERRED_TYPES = ["trap", "multi-step", "interaction", "integration", "calculation"];

function getTypeTargetMs(type){
    return TYPE_TIME_TARGETS[type] || TYPE_TIME_TARGETS.default;
}

function getTypePressure(type){
    if(["integration","multi-step"].includes(type)) return 1.2;
    if(["trap","interaction","calculation"].includes(type)) return 0.8;
    return 0.2;
}

function clamp(value, min, max){
    return Math.min(max, Math.max(min, value));
}

function getTagBucket(tag){
    if(!tag) return null;
    if(!masteryState.byTag[tag]){
        masteryState.byTag[tag] = {
            attempts: 0,
            correct: 0,
            avgTime: 0,
            byType: {}
        };
    }
    return masteryState.byTag[tag];
}

function getTypeBucket(tag, type){
    const tagBucket = getTagBucket(tag);
    if(!tagBucket) return null;
    const key = type || "default";
    if(!tagBucket.byType[key]){
        tagBucket.byType[key] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return tagBucket.byType[key];
}

function getSkillKey(question){
    return question?.primarySkill || question?.repairSkill || inferSkill(question) || null;
}

function getSkillBucket(question){
    const skill = getSkillKey(question);
    if(!skill) return null;

    if(!masteryState.bySkill){
        masteryState.bySkill = {};
    }

    if(!masteryState.bySkill[skill]){

            attempts: 0,
            correct: 0,
            avgTime: 0,
            byType: {}
        };
    }

    return masteryState.bySkill[skill];
}
	 
function inferObjective(question){
    if(!question) return "unassigned_objective";
    return question.objective || question.tag || "unassigned_objective";
}

function inferSkill(question){
    if(!question) return null;
    return question.primarySkill || question.repairSkill || null;
}

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return masteryState.byObjective[objectiveKey];

function getObjectiveAccuracy(question){
    return getAccuracy(getObjectiveBucket(question));
}

function getObjectiveFluency(question){
    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){

}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getBossObjectiveKey(question){
    if(!question) return null;

    const rawObjective = question.objective || inferObjective(question);
    if(!rawObjective) return null;

    const match = String(rawObjective).match(/^LO\d+\.\d+/);
    return match ? match[0] : rawObjective;
}

function getObjectiveFamilyStats(objectiveKey){
    let attempts = 0;
    let correct = 0;
    let weightedTime = 0;

    Object.keys(masteryState.byObjective || {}).forEach(key => {
        if(key === objectiveKey || key.startsWith(objectiveKey + "_")){
            const bucket = masteryState.byObjective[key];
            if(!bucket) return;

            attempts += bucket.attempts || 0;
            correct += bucket.correct || 0;
            weightedTime += (bucket.avgTime || 0) * (bucket.attempts || 0);
        }
    });

    return {
        attempts,
        correct,
        accuracy: attempts ? correct / attempts : null,
        avgTime: attempts ? weightedTime / attempts : 0
    };
}

function getWeakestBossObjective(bank){
    if(!Array.isArray(bank) || bank.length === 0) return null;

    const objectives = [...new Set(
        bank.map(q => getBossObjectiveKey(q)).filter(Boolean)
    )];

    if(objectives.length === 0) return null;

    const scoredObjectives = objectives.map(obj => {
        const stats = getObjectiveFamilyStats(obj);
        const recentMisses = (masteryState.recent || []).filter(item => {
            const itemObjective = item.objective || "";
            return (itemObjective === obj || itemObjective.startsWith(obj + "_")) && !item.correct;
        }).length;

        let score = stats.accuracy === null
            ? 0.35
            : (1 - stats.accuracy) * 2;

        score += recentMisses * 0.25;

        if(stats.avgTime && stats.avgTime > TYPE_TIME_TARGETS.default){
            score += 0.15;
        }

        return {
            objective: obj,
            score,
            attempts: stats.attempts || 0
        };
    });

    const highestScore = Math.max(...scoredObjectives.map(item => item.score));
    const nearHighest = scoredObjectives.filter(item =>
        item.score >= highestScore - 0.05
    );
    const fewestAttempts = Math.min(...nearHighest.map(item => item.attempts));
    const leastSeen = nearHighest.filter(item =>
        item.attempts === fewestAttempts
    );

    return leastSeen[Math.floor(Math.random() * leastSeen.length)].objective;
}

function getBossQuestionFingerprint(question){

function getBossNarrativeStage(question){

function orderBossQuestionSet(selected, available){
    const ordered = [...(selected || [])];

    const replaceDuplicateStage = stage => {
        const stageIndexes = ordered
            .map((question, index) => ({ question, index }))
            .filter(item => getBossNarrativeStage(item.question) === stage)
            .map(item => item.index);

        stageIndexes.slice(1).forEach(index => {
            const selectedIds = new Set(
                ordered.map(question => question?.id).filter(id => id !== undefined)
            );
            const candidates = shuffle(
                (available || []).filter(question =>
                    question &&
                    !selectedIds.has(question.id) &&
                    getBossNarrativeStage(question) !== stage
                )
            );
            const replacement = candidates.find(question =>
                getBossNarrativeStage(question) === null
            ) || candidates[0];

            if(replacement){
                ordered[index] = replacement;
            }
        });
    };

    replaceDuplicateStage("final");
    replaceDuplicateStage("opening");

    const stageRank = stage =>
        stage === "opening" ? 0 : stage === "final" ? 2 : 1;

    return ordered
        .map((question, index) => ({
            question,
            index,
            stage: getBossNarrativeStage(question)
        }))
        .sort((a, b) =>
            stageRank(a.stage) - stageRank(b.stage) || a.index - b.index
        )
        .map(item => item.question);
}

function getRecentQuestionFingerprints(limitPerPool = 15){
    const recentIds = new Set();

    Object.values(questionHistory || {}).forEach(history => {
        (history || []).slice(-limitPerPool).forEach(id => recentIds.add(id));
    });

    const fingerprints = new Set();

    Object.values(questionBanks || {}).forEach(bank => {
        (bank || []).forEach(question => {
            if(recentIds.has(question.id)){
                fingerprints.add(getBossQuestionFingerprint(question));
            }
        });
    });

    return fingerprints;
}

function buildBossQuestionSet(bank, poolName, chosenObjective){
    if(!Array.isArray(bank) || bank.length === 0) return [];

    const usedIds = new Set(usedQuestions[poolName] || []);
    const recentFingerprints = getRecentQuestionFingerprints();

    let available = bank.filter(question =>
        question &&
        !usedIds.has(question.id) &&
        !recentFingerprints.has(getBossQuestionFingerprint(question))
    );

    if(available.length < 3){
        available = bank.filter(question =>
            question &&
            !recentFingerprints.has(getBossQuestionFingerprint(question))
        );
    }

    if(available.length < 3){
        available = bank.filter(question =>
            question && !usedIds.has(question.id)
        );
    }

    if(available.length < 3){
        usedQuestions[poolName] = [];
        available = bank.filter(Boolean);
    }

    const objectiveMatches = chosenObjective
        ? available.filter(question =>
            getBossObjectiveKey(question) === chosenObjective
        )
        : [];

    const selected = objectiveMatches.length >= 3
        ? shuffle([...objectiveMatches]).slice(0, 3)
        : shuffle([...objectiveMatches]);

    const remaining = shuffle(
        available.filter(question =>
            !selected.some(item => item.id === question.id)
        )
    );

    while(selected.length < 3 && remaining.length > 0){
        const selectedObjectives = new Set(
            selected.map(getBossObjectiveKey).filter(Boolean)
        );
        const selectedTypes = new Set(
            selected.map(item => item.type).filter(Boolean)
        );
        const selectedSkills = new Set(
            selected.map(item => item.primarySkill).filter(Boolean)
        );

        let bestScore = -Infinity;
        let bestCandidates = [];

        remaining.forEach(question => {
            let score = 0;
            const objective = getBossObjectiveKey(question);

            if(objective && !selectedObjectives.has(objective)) score += 2;
            if(question.type && !selectedTypes.has(question.type)) score += 1;
            if(question.primarySkill && !selectedSkills.has(question.primarySkill)) score += 1;

            if(score > bestScore){
                bestScore = score;
                bestCandidates = [question];
            } else if(score === bestScore){
                bestCandidates.push(question);
            }
        });

        const picked = bestCandidates[
            Math.floor(Math.random() * bestCandidates.length)
        ];

        selected.push(picked);
        remaining.splice(remaining.findIndex(item => item.id === picked.id), 1);
    }

    return orderBossQuestionSet(selected, available);
}

function planRemediation(question, responseTime){

    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;

        active: true,

        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
		skill: skill,
		commonError: question.commonError || null,
        sourceType: question.type || "default",

        careless: carelessMiss,

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = [], skillKey = null){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));

    if(skillKey){
        let skillMatches = candidates.filter(q =>
            q.primarySkill === skillKey || q.repairSkill === skillKey
        );
        if(skillMatches.length > 0) return skillMatches;
    }

    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds, skillKey);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, [], skillKey);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
      const skillRepairPool = directSkillRepairRoutes[state.skill] || microSkillRepairPools[state.skill] || [];
      if(state.skill && skillRepairPool.length){
            const skillRepairCandidates = getQuestionsMatchingNeed(
                skillRepairPool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillRepairCandidates.length > 0){
                return weightedPick(skillRepairCandidates, {
                    mode: "support",
                    purpose: "repair"
                });
            }
        }

        const allRepairPool = Object.values(microSkillRepairPools || {})
            .reduce((all, pool) => all.concat(pool), []);
        const repairCandidates = getQuestionsMatchingNeed(
            allRepairPool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, {
                mode: "support",
                purpose: "repair"
            });
        }
    }

    if(state.stage === "bridge"){
        if(state.skill && microSkillBridgePools[state.skill]){
            const skillBridgePool = microSkillBridgePools[state.skill] || [];
            const skillBridgeCandidates = getQuestionsMatchingNeed(
                skillBridgePool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillBridgeCandidates.length > 0){
                return weightedPick(skillBridgeCandidates, {
                    mode: "support",
                    purpose: "confirm"
                });
            }
        }

        const allBridgePool = Object.values(microSkillBridgePools || {})
            .reduce((all, pool) => all.concat(pool), []);

        const bridgeCandidates = getQuestionsMatchingNeed(
            allBridgePool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, {
                mode: "support",
                purpose: "confirm"
            });
        }
    }

    const retestPoolName = getRetestPoolName();

    return pickRemediationFromBank(
        retestPoolName,
        state.objective,
        state.tag,
        state.stage === "retest" ? "challenge" : "confirm",
        state.skill
    );
}
function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName] || questionBanks.hard || questionBanks.medium || questionBanks.easy || [];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    if(!pool || pool.length === 0){
        return {
            id: 999999,
            q: "No question pool is available for this room. Check the questionBanks configuration.",
            options: ["Continue", "Continue", "Continue", "Continue"],
            a: 0,
            tag: "system",
            type: "default",
            objective: "system_check",
            feedback: "A question pool is missing."
        };
    }

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

function startTimedModeClock(){
    timedModeEndTime = Date.now() + timedModeDurationMs;

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "flex";

    updateTimedModeClock();

    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
    }

    timedModeTimerInterval = setInterval(updateTimedModeClock, 250);
}

function stopTimedModeClock(){
    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
        timedModeTimerInterval = null;
    }

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "none";

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.classList.remove("timer-warning");
        timerDisplay.innerText = "10:00";
    }
}

function updateTimedModeClock(){
    if(gameMode !== "timed" || !timedModeEndTime) return;

    const remainingMs = Math.max(0, timedModeEndTime - Date.now());
    const totalSeconds = Math.ceil(remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.innerText = `${minutes}:${String(seconds).padStart(2, "0")}`;
        timerDisplay.classList.toggle("timer-warning", remainingMs <= 60 * 1000);
    }

    if(remainingMs <= 0){
        endTimedModeRun();
    }
}

function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image,
		difficulty: question.difficulty,
        conceptCluster: question.conceptCluster,
        primarySkill: question.primarySkill,
        secondarySkills: question.secondarySkills || [],
        repairSkill: question.repairSkill,
        commonError: question.commonError
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

        if (last1 === last2) {

            if (filtered.length === 0) filtered = available;
        }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

// =============================================
// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function displayQuestion() {

        btn.innerText = option;

function checkRapidGuessing(isCorrect, responseTime){
    rapidGuessHistory.push({
        correct: isCorrect ? 1 : 0,
        responseTime: responseTime
    });

    if(rapidGuessHistory.length > RAPID_GUESS_CONFIG.windowSize){
        rapidGuessHistory.shift();
    }

    if(rapidGuessHistory.length < RAPID_GUESS_CONFIG.minAttempts){
        return {
            triggered: false,
            avgTime: responseTime,
            accuracy: isCorrect ? 1 : 0
        };
    }

    const recent = rapidGuessHistory.slice(-RAPID_GUESS_CONFIG.windowSize);

    const avgTime = recent.reduce((sum, item) => sum + item.responseTime, 0) / recent.length;
    const accuracy = recent.reduce((sum, item) => sum + item.correct, 0) / recent.length;

    return {
        triggered: avgTime < RAPID_GUESS_CONFIG.avgTimeMs && accuracy < RAPID_GUESS_CONFIG.maxAccuracy,
        avgTime,
        accuracy
    };
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|CITADEL00)
// - hashing logic
// - return format ("QUEST-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|QUEST07`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "QUEST-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// POST-BATTLE MASTERY REPORT
// Student-facing diagnostic built from masteryState.
// Uses existing tag, objective, skill, type, accuracy, and response-time data.
// No answer keys. No question IDs. No nonsense.
// =============================================
let latestResultsScreenHTML = "";

const TEMPLATE_OBJECTIVE_LABELS = {}

function escapeHTML(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function titleCase(value){
    return String(value || "")
        .replace(/_/g, " ")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, letter => letter.toUpperCase());
}

function formatMasteryLabel(key){
    if(!key) return "Unlabeled Concept";

    const text = String(key);
    const exactLabel = TEMPLATE_OBJECTIVE_LABELS[text];

    if(exactLabel){
        return exactLabel;
    }

    const objectiveMatch = text.match(/^(LO\d+\.\d+)/);

    if(objectiveMatch && TEMPLATE_OBJECTIVE_LABELS[objectiveMatch[1]]){
        const suffix = text
            .replace(objectiveMatch[1], "")
            .replace(/^_+/, "")
            .replace(/^-+/, "")
            .trim();

        return suffix
            ? `${TEMPLATE_OBJECTIVE_LABELS[objectiveMatch[1]]}: ${titleCase(suffix)}`
            : TEMPLATE_OBJECTIVE_LABELS[objectiveMatch[1]];
    }

    return titleCase(text);
}

function formatPercent(value){
    if(value === null || value === undefined || !Number.isFinite(Number(value))) return "—";
    return `${Math.round(Number(value) * 100)}%`;
}

function formatSeconds(ms){
    const numeric = Number(ms || 0);
    if(!Number.isFinite(numeric) || numeric <= 0) return "—";
    return `${Math.round(numeric / 1000)}s`;
}

function getBucketEntry(key, bucket, category = "concept"){
    if(!bucket || !bucket.attempts){
        return null;
    }

    const attempts = Number(bucket.attempts || 0);
    const correct = Number(bucket.correct || 0);
    const accuracy = attempts ? correct / attempts : null;
    const typeForTiming = category === "type" ? key : "default";
    const target = getTypeTargetMs(typeForTiming);
    const avgTime = Number(bucket.avgTime || 0);
    const timeRatio = avgTime && target ? avgTime / target : 1;
    const fluency = accuracy === null
        ? 0
        : accuracy - clamp((timeRatio - 1) * 0.25, 0, 0.35);

    return {
        key,
        label: formatMasteryLabel(key),
        category,
        attempts,
        correct,
        accuracy,
        avgTime,
        timeRatio,
        fluency
    };
}

function getEntriesFromBuckets(source, category = "concept"){
    return Object.entries(source || {})
        .map(([key, bucket]) => getBucketEntry(key, bucket, category))
        .filter(Boolean);
}

function getTypeMasteryEntries(){
    const typeBuckets = {};

    Object.values(masteryState.byTag || {}).forEach(tagBucket => {
        Object.entries(tagBucket.byType || {}).forEach(([type, bucket]) => {
            if(!typeBuckets[type]){
                typeBuckets[type] = { attempts: 0, correct: 0, avgTime: 0 };
            }

            const oldAttempts = typeBuckets[type].attempts;
            const newAttempts = oldAttempts + Number(bucket.attempts || 0);

            typeBuckets[type].correct += Number(bucket.correct || 0);
            typeBuckets[type].avgTime = newAttempts
                ? ((typeBuckets[type].avgTime * oldAttempts) + (Number(bucket.avgTime || 0) * Number(bucket.attempts || 0))) / newAttempts
                : 0;
            typeBuckets[type].attempts = newAttempts;
        });
    });

    return getEntriesFromBuckets(typeBuckets, "type");
}

function sortStrongest(entries){
    return [...entries]
        .filter(entry => entry.attempts >= 2)
        .sort((a,b) => (b.accuracy - a.accuracy) || (b.fluency - a.fluency) || (b.attempts - a.attempts));
}

function sortWeakest(entries){
    const enoughData = entries.filter(entry => entry.attempts >= 2);
    const pool = enoughData.length ? enoughData : entries;

    return [...pool]
        .sort((a,b) => (a.accuracy - b.accuracy) || (a.fluency - b.fluency) || (b.avgTime - a.avgTime));
}

function getMeaningfulWeakEntries(entries, accuracyThreshold = 0.85){
    return sortWeakest(entries)
        .filter(entry => entry && entry.attempts >= 2)
        .filter(entry => {
            const accuracy = entry.accuracy === null || entry.accuracy === undefined
                ? 1
                : Number(entry.accuracy);

            return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
        });
}

function hasMeaningfulWeakness(entries, accuracyThreshold = 0.85){
    return (entries || []).some(entry => {
        if(!entry || entry.attempts < 2) return false;

        const accuracy = entry.accuracy === null || entry.accuracy === undefined
            ? 1
            : Number(entry.accuracy);

        return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
    });
}

function renderMasteryRows(entries, emptyText){
    if(!entries || entries.length === 0){
        return `<p class="mastery-empty">${escapeHTML(emptyText)}</p>`;
    }

    return entries.map(entry => {
        const pct = Math.max(0, Math.min(100, Math.round((entry.accuracy || 0) * 100)));
        const pace = entry.timeRatio > 1.25
            ? "Slow response pattern"
            : entry.timeRatio < 0.65
                ? "Fast response pattern"
                : "Stable pace";

        return `
            <div class="mastery-row">
                <div class="mastery-row-main">
                    <span class="mastery-row-name">${escapeHTML(entry.label)}</span>
                    <span class="mastery-row-score">${formatPercent(entry.accuracy)} · ${entry.correct}/${entry.attempts}</span>
                </div>
                <span class="mastery-row-meta">Average response: ${formatSeconds(entry.avgTime)} · ${pace}</span>
                <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }).join("");
}

function renderMasteryDiagnosticSection({
    weaknessTitle,
    signalTitle,
    entries,
    hasWeakness,
    weaknessEmptyText,
    cleanText
}){
    const title = hasWeakness ? weaknessTitle : signalTitle;
    const body = hasWeakness
        ? renderMasteryRows(entries, weaknessEmptyText)
        : `<p class="mastery-empty">${escapeHTML(cleanText)}</p>`;

    return `
        <div class="mastery-section">
            <h3>${escapeHTML(title)}</h3>
            ${body}
        </div>
    `;
}

function getRecentBehaviorSignals(){
    const recent = masteryState.recent || [];
    let fastMisses = 0;
    let slowCorrects = 0;
    let recentCorrect = 0;
    let recentTimeTotal = 0;

    recent.forEach(item => {
        const target = getTypeTargetMs(item.type || "default");
        const responseTime = Number(item.responseTime || 0);

        if(item.correct) recentCorrect++;
        if(responseTime) recentTimeTotal += responseTime;

        if(!item.correct && responseTime > 0 && responseTime < target * 0.55){
            fastMisses++;
        }

        if(item.correct && responseTime > target * 1.20){
            slowCorrects++;
        }
    });

    return {
        count: recent.length,
        accuracy: recent.length ? recentCorrect / recent.length : null,
        avgTime: recent.length ? recentTimeTotal / recent.length : 0,
        fastMisses,
        slowCorrects
    };
}


function getMasteryReportModeName(){
    if(gameMode === "timed-complete") return "Timed Trial";
    if(gameMode === "score") return "Score Attack";
    if(gameMode === "legendary") return "Legendary Mode";
    if(gameMode === "exam") return "Exam Drill";
    return getModeDisplayName();
}

function getMasteryReportData(){
    const totalTimeMs = startTime ? (Date.now() - startTime) : 0;
    const accuracy = totalAttempts > 0 ? correctAnswers / totalAttempts : 0;
    const tagEntries = getEntriesFromBuckets(masteryState.byTag || {}, "tag");
    const objectiveEntries = getEntriesFromBuckets(masteryState.byObjective || {}, "objective");
    const skillEntries = getEntriesFromBuckets(masteryState.bySkill || {}, "skill");
    const typeEntries = getTypeMasteryEntries();
    const behavior = getRecentBehaviorSignals();

    const strongest = sortStrongest([...objectiveEntries, ...tagEntries]).slice(0, 4);
    const weakestObjectives = getMeaningfulWeakEntries(objectiveEntries, 0.85).slice(0, 4);
    const weakestTypes = getMeaningfulWeakEntries(typeEntries, 0.85).slice(0, 3);
    const weakestSkills = getMeaningfulWeakEntries(skillEntries, 0.85).slice(0, 3);

    const hasObjectiveWeakness = hasMeaningfulWeakness(objectiveEntries, 0.85);
    const hasTypeWeakness = hasMeaningfulWeakness(typeEntries, 0.85);
    const hasSkillWeakness = hasMeaningfulWeakness(skillEntries, 0.85);
    const hasBehaviorWeakness = behavior.fastMisses >= 2 || behavior.slowCorrects >= 3;
    const noMajorWeakness = totalAttempts >= 8
        && accuracy >= 0.85
        && !hasObjectiveWeakness
        && !hasTypeWeakness
        && !hasSkillWeakness
        && !hasBehaviorWeakness;

    let verdict = "The engine collected enough evidence to build a mastery report. Use the weak signals to plan the next round of practice.";

    if(totalAttempts < 5){
        verdict = "The report is limited because this run has very few attempts. The engine needs more evidence before it can judge mastery with confidence.";
    } else if(noMajorWeakness){
        verdict = "No major weakness detected. That does not mean the learning is finished. It means the next useful signal comes from harder pressure: Legendary Mode first, Score Attack after that.";
    } else if(accuracy >= 0.90){
        verdict = "Strong command. You completed the run with high accuracy. The weak signals below show where the next pressure test should focus.";
    } else if(accuracy >= 0.75){
        verdict = "Battle-ready, but not bulletproof. The weak areas below are where points will leak on an exam.";
    } else {
        verdict = "Unstable command. You finished, but the engine exposed weak signals. Hit the listed areas before chasing speed or Legendary Mode.";
    }

    const nextSteps = [];

    if(noMajorWeakness){
        nextSteps.push("Enter Legendary Mode next. The current run did not expose a major weak point, so harder multi-step and trap-heavy questions are the right next test.");
        nextSteps.push("Use Score Attack after Legendary Mode feels stable. Speed pressure is useful only after mastery survives harder questions.");
    } else {
        if(hasObjectiveWeakness && weakestObjectives[0]){
            nextSteps.push(`Review ${weakestObjectives[0].label}. That objective showed the weakest mastery signal.`);
        }

        if(hasTypeWeakness && weakestTypes[0]){
            nextSteps.push(`Practice ${weakestTypes[0].label} questions. That question form caused the most trouble.`);
        }

        if(hasSkillWeakness && weakestSkills[0]){
            nextSteps.push(`Drill ${weakestSkills[0].label}. That skill needs cleaner repetition.`);
        }

        if(behavior.fastMisses >= 2){
            nextSteps.push("Slow down on traps and graph-style items. Fast misses are not fluency. They are just wrong answers with confidence.");
        } else if(behavior.slowCorrects >= 3){
            nextSteps.push("You can get answers right, but some correct responses were slow. Build speed only after the reasoning is automatic.");
        }
    }

    if(nextSteps.length === 0){
        nextSteps.push("Run a harder mode next. The current evidence does not show a major weak point. Use a harder mode to produce a stronger diagnostic signal.");
    }

    return {
        mode: getMasteryReportModeName(),
        accuracy,
        totalTimeMs,
        timeString: formatTime(totalTimeMs),
        totalAttempts,
        correctAnswers,
        maxStreak,
        score: modeUsesScoreAttack() ? scoreAttackScore : null,
        strongest,
        weakestObjectives,
        weakestTypes,
        weakestSkills,
        hasObjectiveWeakness,
        hasTypeWeakness,
        hasSkillWeakness,
        noMajorWeakness,
        behavior,
        verdict,
        nextSteps
    };
}

function copyMasteryReport(){
    const report = getMasteryReportData();

    const lines = [
        "Blank Mastery Quest — Mastery Report",
        `Student: ${username}`,
        `Mode: ${report.mode}`,
        `Accuracy: ${formatPercent(report.accuracy)} (${report.correctAnswers}/${report.totalAttempts})`,
        `Best Streak: ${report.maxStreak}`,
        `Time: ${report.timeString}`,
        report.score !== null ? `Score: ${report.score}` : null,
        "",
        "Strongest Signals:",
        ...(report.strongest.length ? report.strongest.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No clear strength signal yet."]),
        "",
        report.hasObjectiveWeakness ? "Weakest Learning Objectives:" : "Objective Signals:",
        ...(report.hasObjectiveWeakness && report.weakestObjectives.length ? report.weakestObjectives.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major objective weakness detected. Try Legendary Mode next."]),
        "",
        report.hasTypeWeakness ? "Weakest Question Forms:" : "Question Form Signals:",
        ...(report.hasTypeWeakness && report.weakestTypes.length ? report.weakestTypes.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major question-form weakness detected."]),
        "",
        report.hasSkillWeakness ? "Weakest Skills:" : "Skill Signals:",
        ...(report.hasSkillWeakness && report.weakestSkills.length ? report.weakestSkills.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major skill weakness detected."]),
        "",
        "Next Moves:",
        ...report.nextSteps.map(step => `- ${step}`)
    ].filter(line => line !== null);

    const text = lines.join("\n");

    function markCopied(){
        const btn = Array.from(document.querySelectorAll("button"))
            .find(button => button.innerText === "Copy Report" || button.innerText === "Copied!");

        if(!btn) return;
        const original = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = original; }, 1800);
    }

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(markCopied);
        return;
    }

    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    temp.remove();
    markCopied();
}


// =============================
// UTILITIES
// =============================
     
// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}     

// =============================================
// HIGH SCORE TRACKING — OPTIONAL FEATURE
// =============================================
// Stores top completion times in browser (localStorage)
//
// - Saves name, time, and date
// - Sorts fastest → slowest
// - Keeps top 5 results only
//
// SAFE TO EDIT:
// - number of scores kept (slice)
// - displayed fields (name/date)
//
// WARNING:
// Clearing browser data will erase scores.
// =============================================
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("blankBuilderHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("blankBuilderHighScores", JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================     
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

// =============================================
// RESULT SHARING — SAFE TO CUSTOMIZE
// =============================================
// Copies player performance summary to clipboard.
//
// Includes:
// - name
// - time
// - accuracy
// - streak
// - verification code
//
// SAFE TO EDIT:
// - text format
// - labels ("Adventurer", etc.)
// - button feedback message
//
// WARNING:
// Requires element IDs:
// - "vCode"
// - "shareBtn"
//
// Removing those will break this function.
// =============================================     
function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);

    const shareText = `Adaptive Review Learning Game Run
Student: ${username}
Time: ${timeString}
Accuracy: ${accuracy}%
Best Streak: ${maxStreak}
Total Questions: ${totalAttempts}
Code: ${code}
Generated by the Blank Builder Template`;

    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        const originalColor = btn.style.background;

        btn.innerText = "✅ Copied!";
        btn.style.background = "#059669";

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = originalColor;
        }, 2000);
    });
}
